ve its identity, strength, quality, purity, stability or bioavailability", "drug_type_multiplier_source_text": "Cystadrops (cysteamine ophthalmic solution) 0.37%", "facility_inspection_source_text": "Satisfactory resolution of these deficiencies is required if this facility remains in the application", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "CELLTRION Inc", "ps_summary": "Pre-license inspection of the manufacturing facility identified deficiencies requiring satisfactory resolution before approval. The applicant must address facility responses to FDA Form 483 and resolve all manufacturing concerns. The therapeutic biologic nature of this product necessitates rigorous facility compliance for patient safety.", "deficiency_severity_source_text": "FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "[REDACTED]", "facility_inspection_source_text": "Satisfactory responses from the facility are needed before this application can be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Spectrum Pharma Inc", "ps_summary": "Two manufacturing facilities were inspected with deficiencies conveyed to facility representatives. Both facilities must achieve satisfactory resolution of identified deficiencies before approval. The applicant must work with manufacturing partners to resolve quality and compliance issues at both sites.", "deficiency_severity_source_text": "our field investigator conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "SPI-2012 is a therapeutic biologic", "facility_inspection_source_text": "Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Teva Pharma USA", "ps_summary": "The manufacturing facility was not ready for FDA inspection, requiring rescheduling and satisfactory completion before approval. Buprenorphine/naloxone is a DEA-controlled substance with abuse and overdose risks requiring rigorous facility inspection and a REMS program. The applicant must notify FDA when the facility is inspection-ready and implement required medication guide and labeling changes.", "deficiency_severity_source_text": "the facility was not ready for inspection", "drug_type_multiplier_source_text": "buprenorphine and naloxone", "facility_inspection_source_text": "Our field investigator could not complete inspection of the Lohmann Therapy Systems manufacturing facility at West Caldwell, New Jersey, because the facility was not ready for inspection", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "medac Gesellschaft fur klinische Spezialpraparate mbH", "ps_summary": "The applicant has not provided substantial evidence of effectiveness due to missing clinical data critical to the primary efficacy endpoint. Missing CBC and marrow results prevent independent confirmation of event-free survival for treosulfan in hematopoietic stem cell transplantation. The applicant must submit complete clinical data, conduct an adequate and well-controlled trial with prespecified OS analysis, and address nonclinical genotoxicity concerns before approval.", "deficiency_severity_source_text": "Because all complete blood cell (CBC) and marrow results were not submitted, we were unable to independently confirm the results of the analysis of the primary endpoint", "drug_type_multiplier_source_text": "Grafapex (treosulfan) for allogeneic hematopoietic stem cell transplantation for adult and pediatric patients with AML or MDS", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Fresenius Kabi USA LLC", "ps_summary": "The applicant must address nonclinical and product quality deficiencies affecting drug identity, strength, quality, and stability. Critical analytical test methods and manufacturing process controls must be adequately validated and documented. The applicant should revise the established drug name and resubmit with comprehensive responses addressing all quality and analytical concerns.", "deficiency_severity_source_text": "nonclinical and product quality deficiencies not fully detailed in legible portions", "drug_type_multiplier_source_text": "amino acids with electrolytes, dextrose and lipid injectable emulsion", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Fidelity BioPharma Co", "ps_summary": "The applicant failed to adequately apply ICH guidance for elemental impurity assessment and did not provide sufficient nonclinical data supporting the proposed specification limits. The application also contains gaps in the adequacy of available safety information regarding impurity qualification. The applicant must establish appropriate acceptable intake limits through proper methodology, conduct additional safety studies to support specifications, and resubmit addressing all deficiencies identified in the letter.", "deficiency_severity_source_text": "Missing safety studies, elemental impurity guidance application, alternative methods needed for establishing acceptable intake limit", "drug_type_multiplier_source_text": "Oral solution formulation", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter - application cannot be approved in present form"}, {"company_name": "Conjupro Biotherapeutics Inc", "ps_summary": "The manufacturing facility for the injectable formulation has significant deficiencies that must be resolved before approval. The applicant must work with the facility to address all FDA Form 483 observations and obtain satisfactory FDA responses. Clinical inspections remain pending completion and will be evaluated upon resubmission.", "deficiency_severity_source_text": "Following pre-approval inspection, FDA conveyed deficiencies to the representative of the facility and determined that deficiencies represent significant issues that adversely impact the facility's ability", "drug_type_multiplier_source_text": "Irinotecan liposome injection - injectable route", "facility_inspection_source_text": "FDA conveyed deficiencies to the representative of the facility. The deficiencies represent significant issues that adversely impact the facility's ability to perform the designated functions", "outcome_severity_source_text": "Complete Response Letter - application cannot be approved in its present form"}, {"company_name": "Coherus BioSciences Inc", "ps_summary": "Multiple deficiencies in immunogenicity assessment and analytical similarity must be addressed, particularly inadequate neutralizing antibody assay validation and insufficient evidence that antibody differences between the biosimilar and reference product do not result in clinically meaningful differences. The applicant must fully revalidate neutralizing antibody assays using appropriate methodology and provide adequate potency data for all lots used in clinical studies.", "deficiency_severity_source_text": "Both neutralizing antibody assays submitted are inadequate and will not allow for meaningful evaluation of neutralizing antibodies in clinical samples", "drug_type_multiplier_source_text": "Pegfilgrastim biosimilar - standard biotechnology product", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter - application cannot be approved in its present form"}, {"company_name": "Laboratorios Farmaceuticos Rovi SA", "ps_summary": "The injectable formulation has critical deficiencies in product quality control, human factors validation, and facility compliance. The applicant must develop validated test methods for molecular weight monitoring, address dissolution variability, resolve facility inspection deficiencies, and demonstrate that users can reliably deliver the full dose through human factors testing and product redesign if necessary.", "deficiency_severity_source_text": "Due to intra- and inter-batch dissolution result variability, missing direct molecular weight monitoring test methods", "drug_type_multiplier_source_text": "Injectable suspension - risperidone extended-release injection (IM route)", "facility_inspection_source_text": "During a recent inspection of the manufacturing facility, FDA conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "Complete Response Letter - application cannot be approved in its present form"}, {"company_name": "Mallinckrodt Hospital Products IP Ltd", "ps_summary": "Safety concerns regarding respiratory failure risks outweigh the demonstrated efficacy benefits for this life-threatening condition. The applicant must conduct an adequate and well-controlled study demonstrating an acceptable risk-benefit profile, potentially utilizing the proposed risk mitigation strategy, with a primary endpoint and analytic plan agreed upon with FDA prior to study initiation.", "deficiency_severity_source_text": "Greater incidence of serious adverse events of respiratory failure in terlipressin (14%) compared to placebo (5%), with unresolved questions about clinical significance of primary endpoint", "drug_type_multiplier_source_text": "Terlipressin for treatment of hepatorenal syndrome (HRS) type 1 - life-threatening indication", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter - application cannot be approved in its present form"}, {"company_name": "AB Pharma LLC", "ps_summary": "The manufacturing facility for this critical anti-infective combination has objectionable conditions that must be resolved before approval. The applicant must address all facility inspection observations and demonstrate compliance with CGMP requirements for manufacturing this life-saving HIV treatment product.", "deficiency_severity_source_text": "During recent inspection, field investigator observed objectionable conditions at the facility and conveyed that information to the representative of the facility", "drug_type_multiplier_source_text": "Efavirenz/Lamivudine/Tenofovir combination - anti-infective for HIV treatment", "facility_inspection_source_text": "During a recent inspection, field investigator observed objectionable conditions at the facility. Satisfactory resolution of the observations is required", "outcome_severity_source_text": "Complete Response Letter - application cannot be tentatively approved in its present form"}, {"company_name": "MediWound Ltd", "ps_summary": "Multiple critical deficiencies include inadequate botanical raw material authentication and control, insufficient microbial control strategy in manufacturing, incomplete validation of analytical methods, and significant GCP compliance issues during clinical trials that compromise data reliability. The applicant must implement comprehensive authentication and microbial control strategies, complete facility inspections once travel restrictions allow, and address all clinical site inspection observations regarding protocol compliance.", "deficiency_severity_source_text": "Botanical raw material authentication based solely on morphology; missing genetic, chemical, and biological authentication methods with appropriate acceptance criteria", "drug_type_multiplier_source_text": "NexoBrid bromelain gel - topical enzymatic product", "facility_inspection_source_text": "Clinical site inspections revealed significant GCP noncompliance and unblinding events that impact reliability of efficacy assessments; facility inspections pending due to COVID-19 travel restrictions", "outcome_severity_source_text": "Complete Response Letter - application cannot be approved in its present form"}, {"company_name": "Ocular Therapeutix Inc", "ps_summary": "The manufacturing facility has inspection deficiencies that must be satisfactorily resolved before approval can be granted. The applicant must address all facility observations and provide documentation demonstrating compliance with current good manufacturing practice regulations for this ophthalmic drug delivery device.", "deficiency_severity_source_text": "During recent inspection of the Ocular Therapeutix manufacturing facility, field investigators conveyed deficiencies to the representatives of this facility. Satisfactory resolution is required", "drug_type_multiplier_source_text": "Dexamethasone insert for intracanalicular use - localized ophthalmic delivery", "facility_inspection_source_text": "During recent inspection of the manufacturing facility, field investigators conveyed deficiencies to the representatives of this facility. Satisfactory resolution of these deficiencies is required before approval", "outcome_severity_source_text": "Complete Response Letter - application cannot be approved in its present form"}, {"company_name": "REGENXBIO Inc", "ps_summary": "The study population has uncertain neuronopathic disease phenotype due to inadequate eligibility criteria and lack of expert consensus on phenotype differentiation in young patients. The proposed biomarker lacks established validity as a surrogate for clinical benefit, with insufficient external control comparability and intra-patient variability in measurements. The applicant must provide normalization of biomarkers or neurodevelopmental outcomes that deviate from natural history, use appropriate untreated comparable controls, and establish an expert adjudication committee to select the targeted population based on pre-defined factors.", "deficiency_severity_source_text": "Proposed CSF HS D2S6 biomarker threshold lacks support from published literature, has no established performance threshold to differentiate disease phenotypes, and insufficient correlation analysis with cognitive outcomes in young untreated patients", "drug_type_multiplier_source_text": "Gene therapy for mucopolysaccharidosis type II (Hunter syndrome) - rare life-threatening genetic disorder", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter - application cannot be approved in its present form"}, {"company_name": "Dow Pharma Sciences Inc", "ps_summary": "Critical nonclinical safety data gaps exist for this topical combination product, including missing genetic toxicology studies, embryofetal development studies, fertility and reproductive function studies, and carcinogenicity evaluations for both drug components. The applicant must provide a complete battery of nonclinical toxicology studies to adequately establish safety based on the higher bioavailability demonstrated for the combination product compared to individual listed drugs.", "deficiency_severity_source_text": "Insufficient nonclinical toxicology data provided to determine safety; adequate bridge to listed drugs not established based on relative bioavailability assessment showing higher bioavailability of combination product than individual monads", "drug_type_multiplier_source_text": "Halobetasol propionate and tazarotene lotion - topical dermatological combination", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter - application cannot be approved in its present form"}, {"company_name": "Seikagaku Corp", "ps_summary": "The facility inspection identified deficiencies that must be resolved before approval of this injection product. The applicant must work with the manufacturing facility to achieve satisfactory compliance with current good manufacturing practices. A complete response addressing all identified facility deficiencies is required prior to product approval.", "deficiency_severity_source_text": "Following pre-license inspection of listed in this application, conveyed deficiencies to the representative of the facility. Satisfactory responses from the facility are needed before this application can be approved.", "drug_type_multiplier_source_text": "for injection", "facility_inspection_source_text": "Following pre-license inspection of listed in this application, conveyed deficiencies to the representative of the facility. Satisfactory responses from the facility are needed before this application can be approved.", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "scPharmaceuticals Services Inc", "ps_summary": "Multiple critical deficiencies exist including unvalidated analytical methods for particulates testing, inadequate biocompatibility data, unresolved electrical safety and EMC labeling issues, and missing human factors validation for device modifications. Manufacturing facility deficiencies must also be resolved. The applicant must conduct comprehensive testing, revise labeling, and revalidate human factors studies before approval.", "deficiency_severity_source_text": "device changes, additional deficiencies may be identified once the final device design is submitted", "drug_type_multiplier_source_text": "on-body infusor within 12 inches of mobile phones, computers or wireless accessories", "facility_inspection_source_text": "During a recent inspection of the manufacturing facility for this application our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Shilpa Medicare Ltd", "ps_summary": "The proposed bortezomib formulation presents unresolved clinical safety concerns due to high osmolality that could cause vascular injury when administered as a bolus injection to peripheral veins. Clinical studies demonstrating comparable bioavailability and safety, or reformulation, is required. Manufacturing facility deficiencies must also be resolved before approval.", "deficiency_severity_source_text": "The scientific bridge between the proposed Bortezomib injection and the Listed Drug (LD) is not adequately established because of the unresolved clinical safety concerns related to the hyperosmolality of the proposed drug product.", "drug_type_multiplier_source_text": "Bortezomib injection", "facility_inspection_source_text": "During a recent inspection of the manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of deficiencies is required before this application may be approved.", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Immedica Pharma AB", "ps_summary": "The efficacy of AEB1102 has not been adequately established as clinical endpoints were not achieved in the pivotal trial despite significant plasma arginine reduction. The applicant should conduct a clinical trial validating plasma arginine as a surrogate endpoint, potentially via accelerated approval pathway. Dose adjustment and plasma arginine monitoring protocols are critical safety requirements.", "deficiency_severity_source_text": "Dose adjustment and monitoring of plasma arginine are required for the safe and effective use of AEB1102.", "drug_type_multiplier_source_text": "arginase 1 deficiency (ARG1-D) is a rare and serious disease", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "nnoPharma Licensing LLC", "ps_summary": "Critical nonclinical safety data are missing including a 28-day repeat-dose toxicology study, blood compatibility assessment, and adequate characterization of leachables from the container closure system. Multiple manufacturing facilities have identified deficiencies requiring resolution. Additional stability data and toxicological risk assessments for all leachables must be provided before approval.", "deficiency_severity_source_text": "You have not provided adequate nonclinical safety justification for the drug product formulation. Specifically, you did not conduct a 28-day repeat-dose toxicology study in an appropriate species to characterize the potential for systemic and local tissue toxicity nor did you conduct an adequate blood compatibility assessment.", "drug_type_multiplier_source_text": "Acetaminophen injection, 10 mg/mL", "facility_inspection_source_text": "During recent inspections of the Hikma Farmac\u00e9utica (Portugal), Lod manufacturing facilities for this application, our field investigators conveyed deficiencies to the representatives of the respective facilities. Satisfactory inspection reports for all facilities must be received before this application may be approved.", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Baxter Healthcare Corp", "ps_summary": "Five leachable compounds detected in the drug product lack adequate safety qualification data. Nonclinical studies including repeated-dose toxicology for leachables exceeding 5 mcg/day qualification threshold are required. The applicant must conduct additional (Q)SAR evaluations and provide comprehensive toxicological risk assessments before approval can be considered.", "deficiency_severity_source_text": "You have not adequately qualified the safety (i.e., general toxicity) of several of the leachables detected with your drug product.", "drug_type_multiplier_source_text": "daptomycin for Injection", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "AcelRx Pharma Inc", "ps_summary": "The safety database is inadequate with insufficient patients exposed to maximum proposed doses. Additionally, human factors validation demonstrated unacceptable risks from dropped tablets leading to accidental exposure and diversion. The applicant must collect safety data from 50 additional patients at maximum dosing and conduct revised human factors studies with implemented mitigation strategies.", "deficiency_severity_source_text": "The safety database, while suitable in number of patients, did not contain a sufficient number of patients dosed at the maximum amount described in the proposed labeling to assess the safety of Dsuvia.", "drug_type_multiplier_source_text": "DSUVIA (sufentanil sublingual tablet)", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Azurity Pharma Inc", "ps_summary": "Manufacturing facility deficiencies identified during inspection must be resolved with facility responses to FDA 483 findings. CGMP compliance must be demonstrated through satisfactory inspection reports and potential pre-approval inspection. The applicant should coordinate with the facility for timely resolution of identified deficiencies.", "deficiency_severity_source_text": "Following inspection of listed in this application, FDA conveyed deficiencies to the representative of the facility.", "drug_type_multiplier_source_text": "sitagliptin oral solution", "facility_inspection_source_text": "Following inspection of listed in this application, FDA conveyed deficiencies to the representative of the facility. The facility should provide satisfactory responses to these deficiencies to the FDA office indicated on the FDA 483 prior to your complete response.", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Trevena Inc", "ps_summary": "Critical safety concerns exist regarding dose-dependent QT prolongation with unclear mechanism and delayed onset. The submitted ECG monitoring was inadequate with limited sampling and no control arm. The applicant must conduct a randomized active-controlled study with 24-hour Holter monitoring and provide safety data from 350 patients at maximum proposed doses over the longest duration indicated.", "deficiency_severity_source_text": "You have not submitted adequate data to support the safety of oliceridine for the management of moderate-to-severe acute pain in adult patients for whom an intravenous (IV) opioid is warranted due to concerns related to QT prolongation.", "drug_type_multiplier_source_text": "oliceridine injection", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Sandoz Inc", "ps_summary": "Pharmacokinetic similarity between LA-EP2006 and US-licensed Neulasta has not been demonstrated, preventing establishment of biosimilarity. Product quality deficiencies include inadequate container closure integrity testing, insufficient microbial challenge data, and incomplete validation data for manufacturing processes. The applicant must conduct further root cause analyses and provide comprehensive revised validation and PK data.", "deficiency_severity_source_text": "The method validation study for the dye ingress container closure integrity (CCI) test method is not adequate because a vial instead of a prefilled syringe (PFS) was used as the positive control.", "drug_type_multiplier_source_text": "prefilled syringe (PFS)", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "RB Health (US) LLC", "ps_summary": "The applicant failed to provide sufficient clinical evidence supporting the proposed 12-hour dosing interval for the naproxen component in a fixed-dose combination product. The FDA remains concerned about potential loss of analgesic effects before the next dose. The applicant must either conduct clinical efficacy studies demonstrating 12-hour duration or establish a relative bioavailability bridge to an approved comparable product to address this deficiency.", "deficiency_severity_source_text": "You have not provided sufficient evidence to support the proposed 12-hour duration of action and dosing regimen", "drug_type_multiplier_source_text": "naproxen sodium tablet, oral formulation", "facility_inspection_source_text": "No inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter \u2014 application not approved"}, {"company_name": "Milestone Pharma USA Inc", "ps_summary": "The applicant must complete a preapproval inspection of its manufacturing facility to demonstrate compliance with current GMP requirements. Until the facility inspection is completed and any deficiencies resolved, the application cannot be approved. The applicant should coordinate with the facility to address all FDA Form 483 observations.", "deficiency_severity_source_text": "We reserve further comment on the proposed labeling until the application is otherwise adequate", "drug_type_multiplier_source_text": "nasal spray formulation, non-injectable route", "facility_inspection_source_text": "An inspection of the [REDACTED] is required before this application can be approved, as the FDA must assess the ability of that facility to conduct the listed manufacturing operations in compliance with Current Good Manufacturing Practices (CGMPs)", "outcome_severity_source_text": "Complete Response Letter \u2014 application not approved"}, {"company_name": "ViiV Healthcare Co", "ps_summary": "The applicant must resolve critical facility inspection deficiencies at the manufacturing site and obtain adequate Drug Master File support from the DMF holder. Both deficiencies must be satisfactorily addressed before the application can be approved. The applicant should work with both the manufacturing facility and DMF holder to provide updated documentation and verification of compliance.", "deficiency_severity_source_text": "DMF was found inadequate to support your submission and a DMF Deficiency Letter was sent to the DMF holder", "drug_type_multiplier_source_text": "cabotegravir extended release injectable suspension + rilpivirine extended release injectable suspension", "facility_inspection_source_text": "During a recent inspection of the GLAXO OPERATIONS UK LIMITED manufacturing facility, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "Complete Response Letter \u2014 application not approved"}, {"company_name": "Tanvex BioPharma USA Inc", "ps_summary": "The applicant must obtain satisfactory facility responses to FDA Form 483 deficiencies identified during the pre-license inspection before application approval. The FDA will evaluate approvability upon receipt of the facility's corrective actions and may conduct a re-inspection if necessary to verify compliance.", "deficiency_severity_source_text": "Following pre-license inspection of [REDACTED], the FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "biologics license application for biosimilar product", "facility_inspection_source_text": "Following pre-license inspection, the FDA conveyed deficiencies to the representative of the facility. The facility should provide satisfactory responses to these deficiencies to the FDA office indicated on the FDA 483", "outcome_severity_source_text": "Complete Response Letter \u2014 application not approved"}, {"company_name": "Tanvex BioPharma USA Inc", "ps_summary": "The applicant must provide reliable analytical data using qualified binding assays to demonstrate biosimilarity to the U.S.-licensed reference product, and resolve objectionable facility conditions identified during inspection. Both the comparative analytical assessment and facility compliance issues require satisfactory correction before approval can be granted.", "deficiency_severity_source_text": "issues were raised regarding data omission for the competitive binding ELISA assay and G-CSF receptor binding by SPR assay, impacting the reliability of the data provided to demonstrate that TX01 is highly similar to U.S.-licensed Neupogen", "drug_type_multiplier_source_text": "G-CSF (granulocyte colony-stimulating factor) for hematologic support in life-threatening conditions", "facility_inspection_source_text": "Following an evaluation of the last inspection performed at Tanvex BioPharma, Inc., our field investigator observed objectionable conditions at the facility and conveyed that information to the representative of the facility. Satisfactory resolution of the remaining objectionable conditions, and verification by the FDA, is required before this application may be approved", "outcome_severity_source_text": "Complete Response Letter \u2014 application not approved"}, {"company_name": "Jiangsu Hengrui Pharma Co Ltd", "ps_summary": "The applicant must obtain documented facility responses to FDA Form 483 inspection deficiencies and work with the facility to resolve all observations before approval. Bioresearch monitoring clinical inspections were deferred due to travel restrictions and will be completed during the resubmission review cycle.", "deficiency_severity_source_text": "Following pre-license inspection of [REDACTED], FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "SHR-1210 is an anti-PD-1 monoclonal antibody for oncology indications", "facility_inspection_source_text": "Following pre-license inspection, FDA conveyed deficiencies to the representative of the facility. Your complete response should include the date of the facility's response to the FDA Form 483", "outcome_severity_source_text": "Complete Response Letter \u2014 application not approved"}, {"company_name": "Accord Healthcare Inc", "ps_summary": "The applicant must resolve facility inspection deficiencies conveyed to manufacturing representatives at all production sites. The FDA requires satisfactory correction of these manufacturing compliance issues before the application for this cancer therapy can be approved.", "deficiency_severity_source_text": "Following surveillance inspection of [REDACTED] manufacturing facilities, our field investigator conveyed deficiencies to the representatives of the facilities. Satisfactory resolution of these deficiencies is required before this NDA may be approved", "drug_type_multiplier_source_text": "bendamustine hydrochloride injection is used for oncology/anti-cancer indications", "facility_inspection_source_text": "Following surveillance inspection of [REDACTED] manufacturing facilities, our field investigator conveyed deficiencies to the representatives of the facilities. Satisfactory resolution of these deficiencies is required before this NDA may be approved", "outcome_severity_source_text": "Complete Response Letter \u2014 application not approved"}, {"company_name": "NeuroDerm Ltd", "ps_summary": "The applicant must conduct a thorough QT study to assess potential cardiac effects of the higher carbidopa exposure from Engolce, as adequate safety bridge to the listed drug could not be established. Additionally, facility inspection deficiencies must be resolved, and the applicant should provide clear labeling instructions on conversion from other carbidopa/levodopa products.", "deficiency_severity_source_text": "The exposure of carbidopa from Engolce is substantially higher than that of Sinemet; therefore, it is not possible to rely on FDA's finding of safety for Sinemet for the safety of the carbidopa component for the approval of Engolce. The clinical studies of Engolce were not designed to characterize the effects on the QTc interval. In the absence of an adequate scientific bridge to Sinemet for the safety of the carbidopa component of Engolce, per ICH E14 section 1.3, you will need to conduct a thorough QT (TQT) study", "drug_type_multiplier_source_text": "carbidopa and levodopa injection via subcutaneous route", "facility_inspection_source_text": "Following pre-approval inspection of [REDACTED], FDA conveyed deficiencies to the representative of the facility. Satisfactory responses to these deficiencies prior to your complete response to your application are required", "outcome_severity_source_text": "Complete Response Letter \u2014 application not approved"}, {"company_name": "HQ Specialty Pharma Corp", "ps_summary": "The applicant must adequately characterize and qualify all leachables from the vial stopper above the Analytical Evaluation Threshold, including improved analytical methods, proper structural characterization with mass spectrometry standards, and appropriate toxicological qualification studies. Leachables exceeding safety thresholds require general toxicity or genotoxicity testing as recommended.", "deficiency_severity_source_text": "The leachables have not been adequately quantified or characterized. Qualify all leachables above the Analytical Evaluation Threshold (AET) for the proposed cefazolin drug product", "drug_type_multiplier_source_text": "cefazolin for injection is administered intravenously", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter \u2014 application not approved"}, {"company_name": "Actavis LLC an indirect wholly-owned subsidiary of Teva Pharma USA Inc", "ps_summary": "The injectable Pemetrexed formulation has critical deficiencies in microbiological test method validation and stability data that must be resolved before approval. The applicant must provide comprehensive method suitability studies for bacterial endotoxins and sterility tests across manufacturing facilities and submit additional stability data to demonstrate product safety and efficacy.", "deficiency_severity_source_text": "Provide a summary of the study performed to demonstrate the suitability of the bacterial endotoxins test method", "drug_type_multiplier_source_text": "Pemetrexed Injection", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Daiichi Sankyo Inc", "ps_summary": "Manufacturing facility deficiencies identified during inspection must be resolved before approval of Welchol chewable bar. The applicant should work with the facility to address identified compliance gaps and demonstrate successful resolution prior to resubmission.", "deficiency_severity_source_text": "During a recent inspection of the [REDACTED] drug product manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "drug_type_multiplier_source_text": "Welchol (colesevelam) chewable bar", "facility_inspection_source_text": "Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Xspray Pharma AB", "ps_summary": "The dasatinib tablet application faces critical safety concerns regarding medication error risk due to nomenclature and strength overlap with existing products. The applicant must either conduct successful label comprehension studies with modified labeling/boxed warnings, reformulate to create numerically distinct strengths, or pursue alternative mitigation strategies while resolving facility inspection deficiencies.", "deficiency_severity_source_text": "label comprehension studies that evaluated adding the descriptor [REDACTED] after [REDACTED] (dasatinib tablets) failed", "drug_type_multiplier_source_text": "dasatinib", "facility_inspection_source_text": "Following a CGMP inspection and pre-approval inspection of [REDACTED] listed in this application, FDA conveyed deficiencies to the representative of the facility. Satisfactory responses from the facility are needed before this application can be approved.", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "HQ Specialty Pharma Corp", "ps_summary": "Injectable Meropenem faces critical nonclinical safety deficiencies regarding leachable compounds from the primary closure system. The applicant must complete a 14-day repeat dose toxicity study in Beagle dogs to adequately qualify the safety of identified leachables and address overfill justification concerns before approval.", "deficiency_severity_source_text": "the risk assessment does not adequately qualify the safety of the identified leachables detected with your drug product", "drug_type_multiplier_source_text": "Meropenem for Injection", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Scholar Rock Inc", "ps_summary": "The biologic apitegromab has critical safety gaps regarding developmental risks in pregnancy and requires a postmarketing pregnancy safety study for a minimum of 10 years to monitor maternal and fetal outcomes. Facility GMP deficiencies must also be resolved prior to approval.", "deficiency_severity_source_text": "We have determined that there are no adequate data on the developmental risk associated with use of apitegromab in pregnant women", "drug_type_multiplier_source_text": "SRK-015 (apitegromab-mstn) injection, for intravenous use", "facility_inspection_source_text": "Following a CGMP inspection of [REDACTED] listed in this application, FDA conveyed deficiencies to the representative of the facility. Satisfactory responses to these deficiencies to the FDA office indicated on the FDA 483 prior to your complete response.", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Ricon Pharma LLC", "ps_summary": "The Cyclophosphamide injection application has facility inspection deficiencies that must be satisfactorily resolved before approval. The applicant must work with the manufacturing facility to address identified compliance issues and resubmit with supporting documentation of resolution.", "deficiency_severity_source_text": "During a recent inspection of the [REDACTED] manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "drug_type_multiplier_source_text": "Cyclophosphamide Injection", "facility_inspection_source_text": "Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Cipla USA Inc", "ps_summary": "A manufacturing facility surveillance inspection identified deficiencies that must be satisfactorily resolved before the application can be approved. The applicant should coordinate with the facility to address compliance gaps and provide evidence of remediation in the resubmission.", "deficiency_severity_source_text": "During a recent surveillance inspection of the [REDACTED] manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "drug_type_multiplier_source_text": "drug product application", "facility_inspection_source_text": "Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "CorMedix Inc", "ps_summary": "The taurolidine and heparin catheter lock solution has facility deficiencies at multiple manufacturing sites that must be resolved before approval. The applicant must work with both facilities to address identified GMP issues and provide evidence of satisfactory remediation prior to resubmission.", "deficiency_severity_source_text": "During a recent inspection of the [REDACTED] and Rovi Pharma Industrial Services S.A (FEI 3016688535) manufacturing facilities for this application, our field investigators conveyed deficiencies to the representatives of the facilities. Satisfactory resolution of these deficiencies is required before this application may be approved.", "drug_type_multiplier_source_text": "taurolidine 67.5 mg/5 mL (13.5 mg/mL) and heparin 5,000 USP Units/5 mL (1,000 Units/mL) catheter lock solution", "facility_inspection_source_text": "Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Fresenius Kabi USA LLC", "ps_summary": "Critical product quality and analytical test method deficiencies remain unresolved in this application. The applicant must address the redacted nonclinical and quality deficiencies with appropriate analytical validation and/or test method development before resubmission.", "deficiency_severity_source_text": "[REDACTED] nonclinical and product quality sections contain substantial redacted information indicating missing analytical test methods or data", "drug_type_multiplier_source_text": "drug product", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Orphazyme A/S", "ps_summary": "Arimoclomol lacks substantial evidence of effectiveness due to critical validity concerns with the primary endpoint measure (5DNPCCSS) and weak, contradictory confirmatory evidence from nonclinical studies. The applicant must provide comprehensive validity evidence for the efficacy endpoint and bolster confirmatory pharmacodynamic data before resubmission, with advisory committee discussion recommended.", "deficiency_severity_source_text": "we are unable to conclude that there is substantial evidence of effectiveness", "drug_type_multiplier_source_text": "arimoclomol for the treatment of Neimann-Pick disease Type C (NPC)", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Alvotech USA Inc", "ps_summary": "The BLA for AVT06 received a Complete Response letter due to prescribing information labeling deficiencies and unresolved facility inspection deficiencies. The applicant must submit revised labeling conforming to regulatory format requirements and ensure the manufacturing facility provides satisfactory responses to FDA Form 483 observations before resubmission.", "deficiency_severity_source_text": "Submit draft labeling that is responsive to our electronic communication", "drug_type_multiplier_source_text": "biologics license application (BLA) for AVT06", "facility_inspection_source_text": "FDA conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Shilpa Medicare Ltd", "ps_summary": "The NDA for Pemetrexed Injection received a Complete Response due to inadequate product quality data including missing long-term stability and leachables studies. The applicant must provide at least 12 months of stability data and acceptable leachables testing before approval can be considered.", "deficiency_severity_source_text" issing impurity characterization and inadequate stability/photostability data. The applicant must address facility inspection findings and provide comprehensive CMC data before approval.", "deficiency_severity_source_text": "Provide information pertaining to the characterization of impurities in the drug product", "drug_type_multiplier_source_text": "oral film dosage form", "facility_inspection_source_text": "During a recent inspection of the facility for this application, our field investigator conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Amneal EU Ltd", "ps_summary": "The NDA received a Complete Response with primarily administrative deficiencies requiring safety updates and labeling revisions. The applicant must provide comprehensive safety data from all nonclinical and clinical studies and ensure compliance with labeling format requirements.", "deficiency_severity_source_text": "NONCLINICAL and PRODUCT QUALITY sections appear redacted", "drug_type_multiplier_source_text": "new drug application", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Baxter Healthcare Corp", "ps_summary": "The NDA received a Complete Response with product quality deficiencies that are redacted in the available document. The applicant must address underlying quality concerns and provide updated labeling and comprehensive safety updates for resubmission.", "deficiency_severity_source_text": "PRODUCT QUALITY section appears redacted", "drug_type_multiplier_source_text": "new drug application", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Ferring Pharma Inc", "ps_summary": "The NDA for Nocdurna (desmopressin) received a Complete Response due to insufficient clinical efficacy data and unacceptable safety concerns including hyponatremia risk. The applicant must conduct a new trial demonstrating clinically meaningful efficacy to offset the persistent safety concerns.", "deficiency_severity_source_text": "modest treatment effect and a persistent risk for hyponatremia", "drug_type_multiplier_source_text": "oral disintegrating sublingual tablets", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Verrica Pharma Inc", "ps_summary": "The NDA for cantharidin topical solution received a Complete Response due to facility inspection deficiencies that require satisfactory resolution before approval. The applicant must address facility findings and resubmit labeling and proprietary name information.", "deficiency_severity_source_text": "revise the proposed proprietary name when you respond to the application deficiencies", "drug_type_multiplier_source_text": "topical solution", "facility_inspection_source_text": "During a recent inspection of the facility for this application, our field investigator convey deficiencies to the representative of the facility", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "TherapeuticsMD Inc", "ps_summary": "The NDA for estradiol vaginal insert received a Complete Response due to inadequate long-term endometrial safety data for unopposed estrogen use. The applicant must conduct a long-term endometrial safety trial of sufficient size and duration to characterize safety with chronic use in postmenopausal women.", "deficiency_severity_source_text": "Unopposed estrogen use in a postmenopausal woman with a uterus increases the risk of endometrial hyperplasia/cancer", "drug_type_multiplier_source_text": "estradiol vaginal insert", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Teva Pharma USA", "ps_summary": "Romidepsin i ide comprehensive safety updates to demonstrate adequate long-term safety characterization.", "deficiency_severity_source_text": "safety database is insufficient to adequately characterize the long-term safety of Kisunla in the treatment of Alzheimer's disease", "drug_type_multiplier_source_text": "treatment of Alzheimer's disease", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Galephar Pharma Research Inc", "ps_summary": "Legubeti (lysine salt of acetylcysteine) lacks adequate palatability and tolerability data at clinically relevant doses, and safety data for pediatric patients down to 1 kg is insufficient. Applicant must conduct palatability/tolerability studies using validated patient-reported outcome instruments and provide additional safety justification for pediatric populations.", "deficiency_severity_source_text": "You have not provided data to demonstrate the tolerability of Legubeti, the lysine salt of acetylcysteine, for the full range of loading and maintenance doses for patients with all body weights proposed in labeling", "drug_type_multiplier_source_text": "Legubeti (acetylcysteine) for oral solution", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Botanix SB Inc", "ps_summary": "Sofpironium bromide applicator has significant human factors validation failures including risks of underdose, overdose, and inadvertent exposure to others causing local reactions and systemic effects. Applicant must implement additional design modifications, revise instructions for use, and conduct another human factors validation study to ensure safe and effective use.", "deficiency_severity_source_text": "results of the HF validation study demonstrated several use errors/close calls/use difficulties with critical tasks that may result in harm to the patient or others, or compromised efficacy", "drug_type_multiplier_source_text": "sofpironium bromide", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "UGB Inc", "ps_summary": "UCB4940 (CDP4940) has unresolved manufacturing facility deficiencies that must be corrected before application approval. Applicant must provide a comprehensive safety update addressing adverse events, serious adverse events, and worldwide safety experience.", "deficiency_severity_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "drug_type_multiplier_source_text": "indication for inflammatory diseases, immunology", "facility_inspection_source_text": "During a recent inspection of the UCB Pharma SA (FEI: 3003909356) manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Applied Therapeutics Inc", "ps_summary": "Govorestat lacks substantial evidence of effectiveness due to critical data quality issues in the primary trial and failure to meet statistical significance on prespecified endpoints. Applicant must conduct at least one new adequate and well-controlled trial with clinically meaningful endpoints in classic galactosemia patients and provide robust nonclinical efficacy data.", "deficiency_severity_source_text": "major systemic data quality issues related to study conduct, data management, and data replicability for the Clinical Outcome Assessments (COAs)", "drug_type_multiplier_source_text": "govorestat for the treatment of classic galactosemia (CG)", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Alvotech USA Inc", "ps_summary": "AVT04 (biosimilar) has facility inspection deficiencies at the Iceland manufacturing site that must be resolved before approval. The applicant must address manufacturing quality concerns including microbial method qualification, endotoxin assay validation, and sterile filtration pressure monitoring.", "deficiency_severity_source_text": "Following inspection of Alvotech hf, Reykjavik, Iceland (FEI: 3013702557) listed in this application, FDA conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "drug_type_multiplier_source_text": "AVT04 injection (biosimilar product)", "facility_inspection_source_text": "Following inspection of Alvotech hf, Reykjavik, Iceland (FEI: 3013702557) listed in this application, FDA conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Xspray Pharma AB", "ps_summary": "Dasatinib tablets have critical medication error risks due to insufficient labeling comprehension and inability to safely distinguish between different dasatinib products. Applicant must develop alternative risk mitigation strategies for nomenclature and labeling, resolve facility inspection deficiencies, and conduct meeting with FDA before proceeding with additional studies.", "deficiency_severity_source_text": "labeling comprehension studies showed the risk mitigation strategy of adding a descriptor like [REDACTED] after [REDACTED] (dasatinib tablets)' did not prevent medication errors", "drug_type_multiplier_source_text": "dasatinib tablets for oncology indications", "facility_inspection_source_text": "FDA conveyed deficiencies to the representative of the facility. The FDA conducted an expedited, risk-based review of the available information from the inspection and determined that the deficiencies represent significant issues that adversely impact the facility's ability to perform the designated functions", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Aldeyra Therapeutics Inc", "ps_summary": "Reproxalap ophthalmic solution failed to demonstrate efficacy for dry eye symptoms due to methodological issues with Study 030 including baseline imbalances, accustomization effects, and problematic statistical analysis. Applicant must conduct at least one additional adequate and well-controlled study without post-enrollment protocol modifications to demonstrate positive treatment effect.", "deficiency_severity_source_text": "lack of substantial evidence consisting of adequate and well-controlled investigations, as defined in \u00a7 314.126, that the drug product will have the effect it purports or is represented to have", "drug_type_multiplier_source_text": "Reproxalap Ophthalmic Solution for dry eye disease", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Salamandra LLC", "ps_summary": "The Sun Pharmaceutical facility in India has manufacturing deficiencies that must be resolved before NDA approval for rosuvastatin capsules. The applicant should work directly with the facility to correct all cited deficiencies and ensure compliance with current good manufacturing practices. Resolution of these facility issues is a prerequisite for application approval.", "deficiency_severity_source_text": "During a recent inspection of Sun Pharmaceutical Industries Limited, Halol-Baroda 389350, Gujarat, India, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "drug_type_multiplier_source_text": "rosuvastatin capsules, 5mg, 10mg, 20mg, and 40mg", "facility_inspection_source_text": "Satisfactory resolution of these deficiencies is required before this application may be approved.", "outcome_severity_source_text": "We have determined that we cannot approve this application in its present form."}, {"company_name": "Kyowa Pharma Inc", "ps_summary": "Istradefylline lacks adequate clinical evidence of benefit with concerning nonclinical findings including brain mineralization in animal studies and lack of effect on secondary outcomes compared to existing treatments for Parkinson's disease. The applicant must provide expanded histopathology analysis and additional clinical data demonstrating meaningful benefit before approval can be considered. Safety concerns regarding the drug's efficacy profile relative to established treatments must be resolved.", "deficiency_severity_source_text": "Mineralization in the brain was first detected in the 2-year carcinogenicity study in the rat. You provided no overall summary of the methodology used and the results of the original and re-examination of brain samples, or expert opinions regarding the nature of the mineralization and possible relationship or lack of relationship to drug.", "drug_type_multiplier_source_text": "istradefylline for the adjunctive use in patients with advanced Parkinson's Disease (PD)", "facility_inspection_source_text": "No facility inspection issues mentioned in letter.", "outcome_severity_source_text": "The application is not approvable under section 505(d) of the Act and 21 CFR 314.125(b)."}, {"company_name": "EMD Serono Inc", "ps_summary": "Cladribine presents an unacceptable safety risk due to a significant increase in malignancy cases compared to placebo (33 cases vs. 2 cases), far exceeding the ICH qualification threshold. The applicant must provide comprehensive analyses of malignancy risk stratified by patient subgroups, detailed investigation of risk factors, and enhanced safety monitoring protocols including the PREMIERE registry. A robust understanding of this critical safety signal is mandatory before approval can be reconsidered.", "deficiency_severity_source_text": "The presence of a disproportionate number of malignancies in cladribine-treated subjects represents an unacceptable risk. Cladribine clearly appears to be associated with an increased risk of malignancy. In the CLARITY trial, there were four cases of malignancy in cladribine-treated subjects and none in placebo-treated subjects. When considering the entire safety database, in completed studies of cladribine and ongoing controlled studies of cladribine, there were 33 cases of malignancy in cladribine-treated subjects and two in placebo-treated subjects.", "drug_type_multiplier_source_text": "cladribine for patients with relapsing remitting multiple sclerosis (RRMS), a serious disease", "facility_inspection_source_text": "No facility inspection issues mentioned in letter.", "outcome_severity_source_text": "We cannot approve this application in its present form. These benefits of cladribine, however, are outweighed by its risks."}, {"company_name": "Armstrong Pharma", "ps_summary": "The epinephrine HFA inhalation aerosol OTC product has significant usability deficiencies that could compromise patient safety in acute asthma treatment. Patients reported high device malfunction rates including clogging, and behavioral studies identified critical gaps in consumer understanding of priming, cleaning, and dose indicator use. Additionally, the excipient thymol requires nonclinical safety data for chronic inhalation use. The applicant must conduct iterative label comprehension and actual-use studies, address device design issues, and provide evidence of safe manufacturing practices before approval can be considered.", "deficiency_severity_source_text": "The data from patient diaries and assessment of device and dose indicator performance in your clinical trials indicate that consumers may have difficulty using the proposed product correctly. Specifically, patients reported a high number of device malfunctions in your phase 3 clinical trials. One third of the reports (clogging and not dispensing properly) raise concerns regarding potential clogging.", "drug_type_multiplier_source_text": "Epinephrine HFA Inhalation Aerosol 125 mceg/actuation for over-the-counter use", "facility_inspection_source_text": "During a recent inspection of the manufacturing facility for this application, our field investigator conveyed current Good Manufacturing Practices (cGMP) deficiencies to the representative of the facility.", "outcome_severity_source_text": "We cannot approve this application in its present form."}, {"company_name": "Azurity Pharma Inc", "ps_summary": "The product quality control strategy is insufficient to assure adequate strength and purity of both active ingredients throughout shelf-life and in-use periods. The sodium bicarbonate assay method shows wide recovery ranges that may overestimate or underestimate the active ingredient, and stability data do not demonstrate consistent compliance with acceptance criteria. The applicant must revise analytical methods, validate assay procedures for both active ingredients, and provide comprehensive stability data from commercial-scale batches before approval.", "deficiency_severity_source_text": "The strength of the active ingredient, sodium bicarbonate, in the drug product throughout the product shelf-life and during the in-use period is not adequately assured. The suitability of proposed assay method for the active ingredient sodium bicarbonate has not been fully demonstrated.", "drug_type_multiplier_source_text": "omeprazole and sodium bicarbonate for oral suspension", "facility_inspection_source_text": "No facility inspection issues mentioned in letter.", "outcome_severity_source_text": "We cannot approve this application in its present form."}, {"company_name": "Ocular Therapeutix Inc", "ps_summary": "Manufacturing facility deficiencies identified during inspection at Ocular Therapeutix must be resolved before DEXTENZA approval. The applicant should address all observations detailed in the July 10, 2017 FDA correspondence and implement updated manufacturing controls and procedures. Satisfactory resolution of these GMP deficiencies and potential pre-approval inspection findings are required for application approval.", "deficiency_severity_source_text": "During a recent inspection of the Ocular Therapeutix, Inc., FEI#3008477155, manufacturing facility for this application, our field investigators conveyed deficiencies to the representatives of this facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "drug_type_multiplier_source_text": "DEXTENZA (dexamethasone ophthalmic insert), 0.4 mg, for intracanalicular use", "facility_inspection_source_text": "During a recent inspection of the Ocular Therapeutix, Inc., FEI#3008477155, manufacturing facility for this application, our field investigators conveyed deficiencies to the representatives of this facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "outcome_severity_source_text": "We cannot approve this application in its present form."}, {"company_name": "AB Pharma LLC", "ps_summary": "Objectionable conditions at the Macleods Pharmaceuticals Limited manufacturing facility must be rectified before the antiretroviral drug combination can be approved. The applicant must work with the facility to resolve all inspection observations and ensure full compliance with current good manufacturing practices. Satisfactory facility correction and potential re-inspection are prerequisites for application approval.", "deficiency_severity_source_text": "During a recent inspection of the Macleods Pharmaceuticals Limited (FEI # 3007517881) manufacturing facility for this NDA, our field investigator observed objectionable conditions at the facility and conveyed that information to the representative of the facility at the close of the inspection.", "drug_type_multiplier_source_text": "Efavirenz, Lamivudine and Tenofovir Disoproxil Fumarate Tablets for HIV treatment, life-threatening indication", "facility_inspection_source_text": "Satisfactory resolution of the observations is required before this NDA may be approved.", "outcome_severity_source_text": "We cannot tentatively approve this application in its present form."}, {"company_name": "Par Sterile Products LLC", "ps_summary": "Micafungin for injection has unqualified impurities at levels above ICH thresholds without adequate toxicology justification, and in-use stability data shows significantly low assay values that could compromise efficacy. The applicant must conduct root cause analysis of low assay values, tighten or justify impurity specifications with toxicology data, submit comprehensive stability data, and resolve facility inspection findings. Facility inspection is mandatory before application approval.", "deficiency_severity_source_text": "The proposed acceptance criterion for Impurity [REDACTED] is NMT 4%. Tighten the limit to NMT 0.2% per ICH Q3B or provide toxicology data to justify the limit. The limit is above the qualification threshold.", "drug_type_multiplier_source_text": "Micafungin for Injection, 50 mg/vial and 100 mg/vial administered intravenously", "facility_inspection_source_text": "An inspection of the [REDACTED] facility is required before the application can be approved. You may respond to the other deficiencies in this Complete Response letter while the travel restrictions remain in effect. However, even if all other deficiencies are addressed, the application cannot be approved until the required FDA inspection is conducted.", "outcome_severity_source_text": "We cannot approve this application in its present form."}, {"company_name": "Zealand Pharma US Inc", "ps_summary": "Dasiglucagon has nonclinical safety concerns ntains adequate in vivo adhesion properties requisite for safe and effective use.", "deficiency_severity_source_text": "During a recent inspection of the Corium International Inc. (FEI 3003693015) manufacturing facility for this NDA, our field investigator observed objectionable conditions at the facility and conveyed that information to the representative of the facility at the close of the inspection.", "drug_type_multiplier_source_text": "levonorgestrel/ethinyl estradiol transdermal contraceptive delivery system - oral/topical/standard route", "facility_inspection_source_text": "our field investigator observed objectionable conditions at the facility and conveyed that information to the representative of the facility", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Clarus Therapeutics Inc", "ps_summary": "The application cannot be approved because the product fails to consistently achieve safe and reliable testosterone replacement due to variable food effects and produces supraphysiological DHT concentrations and unfavorable DHT-to-testosterone ratios. The applicant must conduct new clinical trials assessing optimized food timing and modified dosing regimens to ensure normalized hormone concentrations and address safety concerns regarding blood pressure, hematocrit, and cardiovascular risk markers.", "deficiency_severity_source_text": "You have not shown that your product can reliably and safely replace testosterone in hypogonadal men...exposures to TU and DHT, and DHT-to-testosterone ratios that are within the normal range", "drug_type_multiplier_source_text": "testosterone undecanoate (oral) - oral/topical/standard route", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in this letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Acacia Pharma Ltd", "ps_summary": "The application cannot be approved due to manufacturing facility inspection deficiencies that must be satisfactor vidence of facility compliance and resolve all outstanding inspection findings before the application can proceed to approval.", "deficiency_severity_source_text": "during recent inspections of the Sun Pharmaceutical Industries, Limited (Sun Pharma) (FEI # 3002809586), facilities for this application, our field investigator conveyed deficiencies to the representative of the facilities. Satisfactory resolution of these deficiencies is required before this application may be approved", "drug_type_multiplier_source_text": "Elepsia XR levetiracetam neurological indication", "facility_inspection_source_text": "The deficiencies associated with your manufacturing facilities remain unresolved. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Mylan Labs Ltd", "ps_summary": "The acetaminophen injection application cannot be approved due to inadequate safety assessment of leachable compounds from the container closure system. The applicant must conduct studies to establish a NOAEL for leachable compounds, calculate safety margins based on human exposure, and provide comprehensive quantitative analysis to ensure patient safety.", "deficiency_severity_source_text": "You have not provided an adequate safety assessment of the leachable compounds from the drug product formulation. An adequate safety justification was not submitted", "drug_type_multiplier_source_text": "acetaminophen for injection", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Institut Biochimique SA (IBSA)", "ps_summary": "The diclofenac epolamine topical system cannot be approved due to inadequate identification and safety justification of unknown leachable compounds detected above the 5 mcg/day threshold. The applicant must identify all unknown leachables, provide comprehensive toxicological risk assessments, and conduct clinical efficacy studies using the to-be-marketed product manufactured at the proposed commercial site.", "deficiency_severity_source_text": "Your application did not include an adequate justification to support the safety of the leachable compounds whose structures were not fully elucidated in the leachables studies but were detected at levels exceeding the qualification threshold of 5 mcg/day", "drug_type_multiplier_source_text": "diclofenac epolamine topical system", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Teva Neuroscience Inc", "ps_summary": "The risperidone extended-release injectable suspension application cannot be approved due to critical clinical data integrity issues including undocumented dosing errors, lack of dose administration documentation, and patient enrollment violations. The applicant must conduct an independent third-party audit of all sites and subjects to establish data reliability or submit a new adequately-designed clinical efficacy and safety study.", "deficiency_severity_source_text": "Because of these data quality issues, the dosing data from Study TV-46000-CNS-30072 and Study TV-46000-CNS-30078 cannot be relied upon based on the information contained in the application. The application does not contain adequate evidence for the Agency to make an efficacy finding for this new formulation", "drug_type_multiplier_source_text": "risperidone extended-release injectable suspension psychiatric indication", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Sun Pharma Industries Ltd", "ps_summary": "The gemcitabine hydrochloride injection application cannot be approved due to unresolved manufacturing facility deficiencies identified during FDA inspection. The applicant must co m"}, {"company_name": "Armstrong Pharma Inc", "ps_summary": "Human factors validation studies show significant user errors in critical tasks (priming, cleaning, routine use) occurring in 30% of participants, which could result in under-dosing or supra-therapeutic dosing of epinephrine. Comprehensive device redesign or enhanced labeling with human factors revalidation is required to ensure safe and effective over-the-counter use.", "deficiency_severity_source_text": "approximately 30% of participants in the HF study failed at least one of the three primary tasks (critical use tasks), with errors that could lead to clinically important under or supra-therapeutic dosing", "drug_type_multiplier_source_text": "epinephrine inhalation aerosol, OTC", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Dr Reddy\u2019s Labs SA", "ps_summary": "Manufacturing facility inspection identified deficiencies that must be satisfactorily resolved before approval. The applicant must address all facility compliance issues and resubmit documentation of corrective actions to demonstrate compliance with current Good Manufacturing Practices.", "deficiency_severity_source_text": "During a recent inspection of the Dr. Reddy's Lab Ltd. CTO Unit VI (FEI 3002949085) manufacturing facility for this NDA, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this NDA may be approved.", "drug_type_multiplier_source_text": "abametapir lotion, topical product", "facility_inspection_source_text": "During a recent inspection of the Dr. Reddy's Lab Ltd. CTO Unit VI manufacturing facility for this NDA, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this NDA may be approv ection", "facility_inspection_source_text": "FDA identified deficiencies and communicated them to the representative of the facility", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "CELLTRION Inc", "ps_summary": "The application meets interchangeability criteria but cannot be approved due to unexpired first interchangeable biosimilar exclusivity. A postmarketing commitment requires repeat bacterial retention study to verify drug product compatibility is not impacted by contact with the solution. Applicant should submit approval request no more than six months prior to exclusivity expiration.", "deficiency_severity_source_text": "provisional determination with no deficiencies identified at this time", "drug_type_multiplier_source_text": "ustekinumab biosimilar with potential narrow therapeutic considerations", "facility_inspection_source_text": "no inspection deficiencies noted in correspondence", "outcome_severity_source_text": "provisional determination that interchangeability criteria are met"}, {"company_name": "Gan & Lee Pharma", "ps_summary": "Pre-license facility inspection identified deficiencies that must be resolved before approval. Multiple product quality issues require comprehensive data submissions and facility response to FDA Form 483 observations. Potential facility re-inspection will be conducted upon receipt of complete response addressing all inspection deficiencies.", "deficiency_severity_source_text": "product quality data from manufacturing information provided during pre-license inspection", "drug_type_multiplier_source_text": "insulin aspart - standard injectable", "facility_inspection_source_text": "pre-license inspection conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Dr Reddy\u2019s Labs SA", "ps_summary": "Pre-license inspection of manufacturing facility identified deficiencies requiring satisfactory resolution befor
