y and product quality control strategy issues, and await mandatory FDA facility inspection. Oncology biosimilars require flawless analytical and manufacturing controls to ensure patient safety.", "deficiency_severity_source_text": "the PK data from Study BAT1706-001-CR could not be used to support a demonstration of biosimilarity or establish the PK component of the scientific bridge", "drug_type_multiplier_source_text": "BAT1706 is an oncology product (bevacizumab biosimilar)", "facility_inspection_source_text": "An inspection of the Bio-Thera Solutions, Ltd. facility at Guangzhou, China is required before this application can be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Organon Inc", "ps_summary": "The application for gepirone ER tablets lacks adequate efficacy data demonstrating that the drug is effective for major depressive disorder and lacks sufficient long-term safety exposure data at clinically relevant doses. The applicant should conduct additional adequate and well-controlled efficacy studies demonstrating gepirone ER effectiveness and augment the safety database to meet ICH guidelines for long-term exposure at effective doses before resubmission.", "deficiency_severity_source_text": "lack of adequate efficacy data to support a claim in major depressive disorder as well as the inadequate amount of long-term safety data", "drug_type_multiplier_source_text": "Gepirone hydrochloride Extended-Release Tablets for major depressive disorder - oral formulation", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "application is not approvable under section 505(d) of the Act"}, {"company_name": "Hugel Inc", "ps_summary": "Manufacturing facility deficiencies were identified during inspection and must be resolved before approval of the letibotulinumtoxinA (injectable) application. The facility should provide satisfactory responses addressing all identified deficiencies and may require re-inspection to verify compliance before the application can be approved.", "deficiency_severity_source_text": "During a recent inspection of the Hugel, Inc (FEI 3012163998) manufacturing and testing facility of drug substance and drug product for this application, our field investigator conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "letibotulinumtoxinA is an injectable botulinum toxin product", "facility_inspection_source_text": "Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Lexicon Pharma Inc", "ps_summary": "Sotagliflozin presents an unacceptably high risk of diabetic ketoacidosis (DKA) in patients with type 1 diabetes and chronic kidney disease, with one excess DKA case estimated for every 26 patients treated for one year. The applicant should conduct prospective clinical data demonstrating that appropriate patient selection, monitoring, and risk mitigation strategies can reduce DKA incidence below that observed in the Tandem trials.", "deficiency_severity_source_text": "Diabetic ketoacidosis (DKA) was observed in the sotagliflozin dose groups compared to placebo in all three of the phase 3 clinical trials conducted in patients with T1D", "drug_type_multiplier_source_text": "Sotagliflozin tablets for type 1 diabetes mellitus - oral formulation", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "AFT Pharma Ltd", "ps_summary": "The sirolimus cream application has manufacturing facility deficiencies and unresolved product quality issues that require satisfactory resolution before approval. The applicant must address facility inspection observations and complete additional clinical trials as necessary to resolve product quality concerns.", "deficiency_severity_source_text": "Following surveillance inspection of the manufacturing facility, FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "Sirolimus cream - topical formulation", "facility_inspection_source_text": "Satisfactory resolution of the observations is required before the NDA may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "AuroMedics Pharma LLC", "ps_summary": "Cyclophosphamide injection has unqualified elemental impurities exceeding ICH Q3B thresholds with inadequate safety justification. The applicant must submit a GLP repeat-dose toxicology study in rodents to adequately qualify the proposed impurity levels before resubmission.", "deficiency_severity_source_text": "The proposed specified levels of Related Compound and Related Compound exceed the ICH Q3B qualification threshold", "drug_type_multiplier_source_text": "Cyclophosphamide is an oncology drug (alkylating agent chemotherapy)", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "LIB Therapeutics Inc", "ps_summary": "The efficacy trial for Lerochol in homozygous familial hypercholesterolemia failed to demonstrate non-inferiority to evolocumab, with insufficient LDL-C reduction. The applicant should provide additional data demonstrating Lerochol effectiveness for the proposed indication through additional adequate and well-controlled clinical trials.", "deficiency_severity_source_text": "The phase 3 trial, Trial 003, in the HoFH population failed to demonstrate efficacy for the proposed indication", "drug_type_multiplier_source_text": "Lerochol (lerodalcibep-liga) injection for hypercholesterolemia - injectable biologic", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Heritage Pharma Inc d/b/a/ Avet Pharma Inc", "ps_summary": "Manufacturing facility CGMP deficiencies and data reliability concerns regarding the original manufacturing site require satisfactory resolution and potential re-inspection before approval. The applicant must conduct a new bioequivalence study using batches from the new manufacturing facility and ensure the facility achieves CGMP compliance.", "deficiency_severity_source_text": "Following a CGMP inspection of the facility, FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "Atazanavir and Ritonavir is an anti-infective combination for HIV treatment", "facility_inspection_source_text": "The facility should provide satisfactory responses to these deficiencies to the FDA office indicated on the FDA Form 483 prior to your complete response submission", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "CorMedix Inc", "ps_summary": "The Defencath catheter lock solution application has manufacturing facility objectionable conditions and inadequate in-process controls for drug product extraction that require satisfactory resolution. The applicant must conduct extraction studies demonstrating consistent 5 mL withdrawal and resolve facility inspection findings before approval.", "deficiency_severity_source_text": "conduct and provide results of an extraction study to demonstrate that the labeled volume of the drug product solution (5 mL) can be consistently withdrawn from vials", "drug_type_multiplier_source_text": "Defencath is a catheter lock solution containing taurolidine and heparin - injectable route", "facility_inspection_source_text": "the FDA noted objectionable conditions. These objectionable conditions will be conveyed to the representative of the facility within 10 business days", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "University of California San Francisco", "ps_summary": "Floretyrosine F 18 failed to demonstrate substantial evidence of effectiveness with borderline diagnostic performance (sensitivity 58-73%, specificity 36-51%) in a single-center study with potential bias. The applicant should conduct a second adequate and well-controlled efficacy study in the same or closely related patient population or provide other robust confirmatory evidence of effectiveness.", "deficiency_severity_source_text": "The efficacy study, 18F-TLX101-CDx-203, was considered adequate and well-controlled but demonstrated borderline diagnostic performance with lower bounds of the 95% confidence intervals ranging from 58% to 73% for sensitivity and from 36% to 51% for specificity", "drug_type_multiplier_source_text": "Floretyrosine F 18 Injection is a diagnostic radiopharmaceutical - injectable route", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Hospira Inc", "ps_summary": "Facility inspection deficiencies were cited and must be resolved before approval of the bortezomib injection NDA. The applicant must address all identified facility issues and conduct a comprehensive safety update incorporating new clinical and nonclinical data. Revised labeling and container/carton labeling must be submitted to address deficiencies identified during the review.", "deficiency_severity_source_text": "our field investigator conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "Bortezomib for Injection", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this NDA may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Braeburn Inc", "ps_summary": "Critical facility inspection deficiencies at two manufacturing sites must be resolved and elemental impurity/leachable concerns from the container closure system must be addressed through validated testing. Postmarketing studies are required to evaluate precipitation risks during dose initiation and assess leachable exposure over the product shelf-life. Updated prescribing information and risk mitigation strategies must be submitted.", "deficiency_severity_source_text": "unexpected risk of serious systemic histopathological changes, reproductive and developmental effects or cancer due to elemental impurities or leachables from the container closure", "drug_type_multiplier_source_text": "extended-release injection for subcutaneous use", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representatives of each facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Sun Pharma Advanced Research Co Ltd", "ps_summary": "Facility inspection deficiencies must be corrected before approval of the levetiracetam extended-release application. The applicant must revise labeling to incorporate approved changes and submit updated prescribing information in proper format. A resubmission addressing all facility observations is required.", "deficiency_severity_source_text": "our field investigator conveyed deficiencies to the representative of the facilities. Satisfactory resolution of these deficiencies is required before this application may be approved", "drug_type_multiplier_source_text": "Elepsia XR (levetiracetam) extended-release tablets", "facility_inspection_source_text": "During recent inspections of the Sun Pharmaceutical Industries, Limited facilities, our field investigator conveyed deficiencies to the representative of the facilities. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Sun Pharma Advanced Research Co Ltd", "ps_summary": "Manufacturing facility deficiencies must be satisfactorily resolved before approval of the latanoprost ophthalmic emulsion application. Updated safety data and revised prescribing information must be provided. All identified inspection observations must be addressed in a complete resubmission.", "deficiency_severity_source_text": "our field investigators conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "drug_type_multiplier_source_text": "latanoprost ophthalmic emulsion", "facility_inspection_source_text": "During a recent inspection of the Sun Pharmaceutical Industries, Ltd. manufacturing facility, our field investigators conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Mylan Labs Ltd", "ps_summary": "Critical elemental impurity and leachables data gaps must be resolved through validated analytical methods and comprehensive toxicological risk assessments. Inconsistencies between extraction and leachable study parameters must be explained and corrected. Unknown compounds exceeding qualification thresholds must be identified and assessed for safety.", "deficiency_severity_source_text": "You have not provided an adequate assessment of the presence of possible extractables from the container closure system in the final drug product formulation", "drug_type_multiplier_source_text": "Acetaminophen for Injection", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "United Therapeutics Corp", "ps_summary": "The companion device component has received a Not Approvable letter and must achieve approval status before the drug-device combination can be approved. Microbial contamination risks associated with low preservative concentration during drug delivery through the implantable pump system must be fully characterized. Validation of the closed-system design integrity at the catheter tip is essential to ensure patient safety.", "deficiency_severity_source_text": "There are insufficient data to evaluate the risk of potential patient exposure to microbial contaminants when the Remodulin drug product is used in the proposed implantable pump system", "drug_type_multiplier_source_text": "Remodulin (treprostinil) Implantable System for injection", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "InnoPharma Licensing LLC", "ps_summary": "Comprehensive validated leachables testing and toxicological risk assessments are required to characterize all compounds above the safety threshold, including acetaminophen adducts formed in the drug product. Analytical methods must be fully validated with appropriate sensitivity and the 50% uncertainty factor must be incorporated. Stability data at all timepoints must be reanalyzed using validated methods to support the safety profile.", "deficiency_severity_source_text": "You have not provided adequate validated leachable data to permit a substantive toxicological risk assessment for the proposed container closure system", "drug_type_multiplier_source_text": "Acetaminophen Injection, 10 mg/mL", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Amphastar Pharma Inc", "ps_summary": "Device manufacturing deficiencies must be corrected and human factors validation studies must demonstrate safe and effective use across all intended patient populations including pediatric patients down to birth. Product reformulation may be necessary to address potential aspiration and absorption concerns in young patients. Delivery performance specifications must be revised to ensure consistent naloxone dose accuracy at product expiration.", "deficiency_severity_source_text": "Based on the results of the human factors validation study, the product user interface does not support a conclusion that all intended users can use this product safely and effectively", "drug_type_multiplier_source_text": "Naloxone Nasal Spray for emergency treatment of opioid overdose", "facility_inspection_source_text": "During a recent inspection of the International Medication Systems Limited manufacturing facility, our field investigator conveyed device (21 CFR 820) deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Atara Biotherapeutics Inc", "ps_summary": "Pre-license inspection deficiencies at the manufacturing facility remain unresolved and must be fully corrected before final approval of the biologics license application. Current good manufacturing practice compliance cannot be confirmed until all facility observations are satisfactorily addressed in a follow-up inspection. CBER cannot determine that the product meets manufacturing standards.", "deficiency_severity_source_text": "Corrections to FDA's inspectional observations issued to [REDACTED] at the conclusion of the pre-license inspection have not been adequately demonstrated, may require additional review during a follow-up inspection, and, therefore, remain unresolved", "drug_type_multiplier_source_text": "tabelecleucel for cellular therapy oncology application", "facility_inspection_source_text": "Corrections to FDA's inspectional observations issued to [REDACTED] at the conclusion of the pre-license inspection have not been adequately demonstrated, may require additional review during a follow-up inspection, and therefore, remain unresolved", "outcome_severity_source_text": "we cannot grant final approval because of the deficiency outlined below"}, {"company_name": "CELLTRION Inc", "ps_summary": "Manufacturing facility deficiencies must be resolved and comprehensive process characterization data must support all proposed parameter ranges to ensure consistent product quality. Critical quality attributes for product fragments and deamidation require improved control strategies and analytical validation. Clinical data from the follicular lymphoma study must be further justified to demonstrate no clinically meaningful differences from the reference product in safety and efficacy.", "deficiency_severity_source_text": "During a recent inspection of the Celltrion, Inc. manufacturing facility, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of the deficiencies is required before this BLA may be approved", "drug_type_multiplier_source_text": "CT-P10 (Truxima) rituximab biosimilar for oncology indication follicular lymphoma", "facility_inspection_source_text": "During a recent inspection of the Celltrion, Inc. manufacturing facility, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of the deficiencies is required before this BLA may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Almatica Pharma LLC", "ps_summary": "The application cannot be approved due to unidentified elemental impurities in the drug product and missing analytical methods and validations. The applicant must establish comprehensive testing protocols for elemental impurities, provide validated analytical methods, conduct stability studies on multiple batches, and address prescribing information deficiencies. Additionally, a complete safety update must accompany the resubmission.", "deficiency_severity_source_text": "provide updated release and stability specifications to include any identified and unidentified elemental impurities likely present in the drug product", "drug_type_multiplier_source_text": "zolpidem tartrate capsules", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Zydus Worldwide DMCC", "ps_summary": "The application cannot be approved due to uncontrolled impurity levels in sitagliptin tablets that exceed acceptable limits. The applicant must develop and implement a comprehensive plan to reduce impurity during both release and shelf-life testing, validate the approach with stability data, and update labeling accordingly.", "deficiency_severity_source_text": "provide a plan to take measures to reduce impurity during release and during shelf-life", "drug_type_multiplier_source_text": "sitagliptin tablets", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Pfizer Ireland Pharma", "ps_summary": "The application cannot be approved due to serious safety concerns regarding high rates of anti-drug antibody formation that may cause loss of efficacy and potential cross-reactivity with other growth hormone products. Mandatory facility inspections must be completed, and the applicant must provide reassurance or robust data demonstrating that neutralizing antibodies do not impair long-term growth or interfere with alternative hGH treatments.", "deficiency_severity_source_text": "high rate of anti-drug antibody formation (ADA) due to MOD-4023 exposure in clinical studies versus the active comparator (Genotropin): 77% of MOD-4023-treated subjects were ADA-positive compared to 16% of Genotropin-treated subjects", "drug_type_multiplier_source_text": "growth hormone deficiency in pre-pubertal children", "facility_inspection_source_text": "Inspections of the Pfizer Ireland Pharmaceuticals, Dublin, Ireland and Pfizer Manufacturing Belgium NV facilities are required before this application can be approved", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Adamis Pharma Corp", "ps_summary": "The application for naloxone injection cannot be approved due to multiple product quality deficiencies including unvalidated analytical methods for leachables and particulate matter, inadequate container-closure system safety assessment, and device reliability below required standards. The applicant must establish proper extractables/leachables correlations, validate all analytical methods, improve device reliability to 99.99%, and conduct additional stability testing under varied storage conditions.", "deficiency_severity_source_text": "There is no correlation established between the extractable and leachable studies. The extractables studies failed to detect any extractables and specifically failed to detect the leachables observed in the leachable study", "drug_type_multiplier_source_text": "Naloxone hydrochloride injection, 5 mg/0.5 mL", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Akeso Biopharma Co Ltd", "ps_summary": "The application cannot be approved due to inadequate cell bank qualification, unvalidated quality control methods, insufficient process control data, and unresolved manufacturing facility deficiencies. The applicant must qualify new cell banks with comprehensive safety and analytical data, validate process control methods, establish adequate process control ranges, and ensure the manufacturing facility resolves all CGMP deficiencies.", "deficiency_severity_source_text": "The totality of information and data provided is inadequate to support the suitability of the following quality control methods for their intended use", "drug_type_multiplier_source_text": "penpulimab-kcqx for metastatic nasopharyngeal carcinoma", "facility_inspection_source_text": "FDA conveyed deficiencies to the representative of the facility. FDA has reviewed the responses from the facility, and not all deficiencies have been satisfactorily resolved", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "AFT Pharma Ltd", "ps_summary": "The application cannot be approved due to inadequate toxicological risk assessments for leachable compounds exceeding the 5 mcg/day threshold. The applicant must provide confirmed structural identification and validated quantification of all leachables, conduct comprehensive toxicological risk assessments based on maximum expected levels, and submit all supporting studies with adequate detail for independent evaluation.", "deficiency_severity_source_text": "You have not provided adequate toxicological risk assessments for leachables over the 5 mcg/day qualification threshold", "drug_type_multiplier_source_text": "acetaminophen/ibuprofen solution for injection", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Belcher Pharma LLC", "ps_summary": "The application cannot be approved due to unresolved chemistry, manufacturing, and controls deficiencies including inadequate drug product specifications, insufficient stability data with validated analytical methods, incomplete microbiological validation, and incomplete facility inspection. The applicant must address all CMC deficiencies, provide complete validation data, ensure facility readiness for inspection, and conduct required postmarketing registry studies.", "deficiency_severity_source_text": "unresolved CMC deficiencies, resulting in the 'withhold' recommendation issued by the Office of Process and Facility for the drug substance manufacturing facility", "drug_type_multiplier_source_text": "Dehydrated Alcohol Injection, USP", "facility_inspection_source_text": "Our field investigator could not complete inspection of the facility because the facility was not ready for inspection. Satisfactory inspection is required before this application may be approved", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Vero Biotech LLC", "ps_summary": "The application cannot be approved due to inadequate device design validation, missing electromagnetic compatibility testing, incomplete human factors validation study, and unresolved manufacturing facility deficiencies. The applicant must provide conformance to IEC standards, validate closed-loop control system stability, conduct RFID immunity testing, complete a comprehensive human factors validation study with all final user interface components, and resolve all facility inspection deficiencies.", "deficiency_severity_source_text": "evidence of conformity to the following clauses/sub-clauses [and] performance testing to demonstrate that under various disturbances or variabilities the device meets the following", "drug_type_multiplier_source_text": "GENOsyl Delivery System (Nitric Oxide) injection", "facility_inspection_source_text": "During a recent inspection of the Vero Biotech manufacturing facility, our field investigators conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this NDA may be considered for approval", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Sandoz Inc", "ps_summary": "The application cannot be approved due to unspecified microbiology quality control deficiencies and unresolved manufacturing facility inspection findings. The applicant must address all CGMP and CMC microbiology deficiencies, ensure satisfactory facility responses to FDA Form 483, and provide confirmatory reinspection data demonstrating compliance before approval.", "deficiency_severity_source_text": "[REDACTED] CMC Microbiology", "drug_type_multiplier_source_text": "EG12014", "facility_inspection_source_text": "Following a CGMP inspection and pre-license inspection of drug product manufacturing facility, the FDA conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Daiichi Sankyo Inc", "ps_summary": "The application cannot be approved due to unresolved manufacturing facility inspection deficiencies and prescribing information inadequacies. The applicant must ensure the manufacturing facility provides satisfactory responses to FDA Form 483 deficiencies, address all labeling format and content issues, and conduct additional confirmatory clinical trials to verify clinical benefit following a potential accelerated approval pathway.", "deficiency_severity_source_text": "We reserve comment on the proposed labeling until the application is otherwise adequate", "drug_type_multiplier_source_text": "HER3-Dxd for oncology indication", "facility_inspection_source_text": "Following pre-license inspection of facility listed in this application, FDA conveyed deficiencies to the representative of the facility. The facility should provide satisfactory responses to these deficiencies", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Elevar Therapeutics Inc", "ps_summary": "The application cannot be approved because rivoceranib's safety and effectiveness have only been established in combination with SHR-1210, which itself lacks regulatory approval. The applicant must obtain approval for SHR-1210 and provide updated safety data before resubmission can be considered for approval.", "deficiency_severity_source_text": "safety and effectiveness of om (rivoceranib) has only been established in combination with SHR-1210", "drug_type_multiplier_source_text": "tablet", "facility_inspection_source_text": "Due to restrictions on travel, we were unable to complete all Bioresearch Monitoring (BIMO) clinical inspections", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "NeuroDerm Ltd", "ps_summary": "The manufacturing facility has critical CGMP compliance deficiencies that must be resolved before approval. The applicant must coordinate with the facility to address FDA 483 observations and demonstrate compliance through re-inspection, as satisfactory facility outcomes are required prior to application approval.", "deficiency_severity_source_text": "provide satisfactory responses to these deficiencies to the FDA office indicated on the FDA 483 prior to your complete response", "drug_type_multiplier_source_text": "(carbidopa and levodopa) injection", "facility_inspection_source_text": "The facility's satisfactory responses are dependent on FDA's determination that the facility has come into compliance with CGMP and may require re-inspection of the facility", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Nanocopoeia LLC", "ps_summary": "The proposed nilotinib ODT formulation presents significant safety concerns due to 34% higher peak drug exposure and observed QT prolongation in study subjects compared to the approved reference product. The applicant must conduct additional bioequivalence and QT prolongation studies and resolve facility inspection deficiencies before resubmission.", "deficiency_severity_source_text": "two healthy subjects in the BE study experienced QT prolongation after taking nilotinib ODT but none of the healthy subjects experienced QT prolongation when administered the LD. Given the known QT prolongation risk due to higher nilotinib Cmax, there are safety concerns", "drug_type_multiplier_source_text": "nilotinib", "facility_inspection_source_text": "FDA conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Teva Women\u2019s Health Inc", "ps_summary": "Critical product quality deficiencies including foreign particulate contamination found in all transfer batches, inadequate particle size distribution testing, and unvalidated analytical methods must be corrected. Manufacturing facilities must also resolve all GMP inspection deficiencies before the application can be approved.", "deficiency_severity_source_text": "Analytical methods for the drug product are inadequate. To address this deficiency: Validate the accuracy of the HPLC test method for detection of impurity/degradation products in the drug substance", "drug_type_multiplier_source_text": "vaginal ring", "facility_inspection_source_text": "During recent inspections of the Northvale, NJ, testing facility and the Cincinnati, OH, manufacturing facility, our field investigator(s) conveyed deficiencies to the representatives of the facilities. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Glenmark Pharma Inc", "ps_summary": "The application has deficiencies in elemental impurity control and extractables/leachables assessment from the container closure system. The manufacturing facility has significant GMP compliance issues that require resolution and re-inspection before the application can proceed to approval.", "deficiency_severity_source_text": "Provide the stability results for the 30-month (25\u00b0C/60% RH) time-point for your registration batches to assure that all acceptance criteria are met all potential le ided adequate information to characterize the effects of your product on the QT interval. To resolve this deficiency: Submit the results of a thorough QT study", "drug_type_multiplier_source_text": "Cocaine Hydrochloride", "facility_inspection_source_text": "no facility inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "B Braun Medical Inc", "ps_summary": "The carton and container labeling requires significant revisions to improve prominence and clarity of critical safety statements to prevent medication errors. Manufacturing facility has product-specific and GMP compliance issues that must be satisfactorily resolved before approval.", "deficiency_severity_source_text": "Relocate the statement, \"CAUTION: DO NOT ADD SUPPLEMENTARY MEDICATION\" from the side panel to a prominent location on the principal display panel to minimize the risk of healthcare professionals overlooking this important information", "drug_type_multiplier_source_text": "Acetaminophen Injection", "facility_inspection_source_text": "During a recent inspection of the B. Braun Medical, Inc. manufacturing facility (FEI 2021236), our field investigator observed product specific and GMP compliance issues at the facility and conveyed that information to the representative of the facility at the close of the inspection. Satisfactory resolution of the observations is required", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "scPharmaceuticals Inc", "ps_summary": "The Furoscix infusion pump application has multiple critical safety deficiencies including missing alarms for occlusion detection and underdosing, inadequate risk analysis with underestimated severity ratings, and unmet pivotal study endpoints. The applicant must re-engineer the device, conduct comprehensive human factors validation studies, and provide adequate software documentation before resubmission.", "deficiency_severity_source_text": "Hazard \u2014 Underd
