dequate biopharmaceutic data to support the proposed bioavailability of hydroxychloroquine sulfate tablets. The applicant must either address deficiencies through additional studies or conduct bioavailability/bioequivalence studies to bridge to the listed drug. A comprehensive safety update covering all nonclinical and clinical data is required upon resubmission.", "deficiency_severity_source_text": "safety data gaps, nonclinical concerns", "drug_type_multiplier_source_text": "Hydroxychloroquine Sulfate Tablets, oral formulation", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "Complete Response Letter, cannot approve this application in its present form"}, {"company_name": "Vyluma Inc", "ps_summary": "The CHAMP clinical study failed to demonstrate efficacy of atropine 0.01% for myopia treatment in children due to multiple critical statistical deficiencies including failure of hierarchical testing, substantial imbalanced missing data, and inadequate correlation models. The applicant must conduct additional studies to adequately characterize effectiveness and address facility inspection deficiencies before approval can be granted.", "deficiency_severity_source_text": "lack of substantial evidence of effectiveness, clinical studies contained in this submission do not support the effectiveness", "drug_type_multiplier_source_text": "atropine sulphate ophthalmic solution, topical ocular application", "facility_inspection_source_text": "FDA conveyed deficiencies to the representative of the facility. The facility should provide satisfactory responses to these deficiencies", "outcome_severity_source_text": "Complete Response Letter, cannot approve this application in its present form"}, {"company_name": "Ironshore Pharma & Development Inc", "ps_summary": "The application demonstrates unacceptable safety concerns with HLD 200 showing insomnia rates of 33% compared to 2-13% in other approved methylphenidate products, with higher rates in younger children ages 6-9 (43%). The applicant must conduct additional double-blind, placebo-controlled studies to identify a safe and effective dose before resubmission.", "deficiency_severity_source_text": "safety findings from the Phase 3 studies did not confirm these predictions, approximately 33% of patients treated with HLD 200 experienced insomnia", "drug_type_multiplier_source_text": "methylphenidate hydrochloride Modified Release Capsules, oral formulation", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter, cannot approve this application in its present form"}, {"company_name": "Althera Life Sciences LLC", "ps_summary": "Critical method validation deficiencies were identified during pre-approval inspection requiring complete revalidation of analytical methods for assay, purity, and dissolution testing. The applicant must reanalyze stability samples with validated methods and provide additional long-term stability data before approval. Facility inspection deficiencies must also be resolved.", "deficiency_severity_source_text": "method validation information provided in the NDA application as not reliable, revalidate the analytical method used for assay, chromatographic purity, content uniformity, and dissolution", "drug_type_multiplier_source_text": "rosuvastatin and ezetimibe tablet, oral formulation", "facility_inspection_source_text": "During a recent inspection, our field investigator conveyed deficiencies to the representatives of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "Complete Response Letter, cannot approve this application in its present form"}, {"company_name": "GeNO LLC", "ps_summary": "Multiple product quality deficiencies were identified including inadequate cartridge release specifications, missing stability data for proper expiration dating, and insufficient data on cartridge capacity and filter effectiveness. Manufacturing facilities were not ready for inspection. The applicant must establish validated quality control methods, provide comprehensive stability data from multiple batches, and prepare facilities for inspection.", "deficiency_severity_source_text": "quality control method used to determine batch release and used to set cartridge expiration dating based on the current method is not acceptable, provide data on the cartridges using the conversion of 800 ppm nitrogen dioxide", "drug_type_multiplier_source_text": "GENOsyl nitric oxide for inhalation, inhaled gas formulation", "facility_inspection_source_text": "inspections could not be completed as these sites were not ready for inspection, inspections of the following manufacturing facilities included in this application were attempted", "outcome_severity_source_text": "Complete Response Letter, cannot approve this application in its present form"}, {"company_name": "Laboratorios Farmac\u00e9uticos ROVI SA", "ps_summary": "Pre-approval inspection identified deficiencies at the manufacturing facility that must be resolved before approval. Carton and container labeling requires revision including addition of a bolded medication guide statement. The applicant must address all facility inspection findings and provide updated labeling in SPL format.", "deficiency_severity_source_text": "We reserve comment on the proposed labeling until the application is otherwise adequate", "drug_type_multiplier_source_text": "risperidone ISM intramuscular injectable suspension, injectable route of administration", "facility_inspection_source_text": "Following pre-approval inspection, FDA conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "Complete Response Letter, cannot approve this application in its present form"}, {"company_name": "DURECT Corp", "ps_summary": "Safety concerns include adverse events affecting the shoulder joint and surrounding tissues, increased bruising and hematoma, and marked neurological adverse events including dizziness and paresthesia occurring substantially more frequently than with comparator products. The applicant must conduct additional randomized, double-blind safety studies evaluating POSIMIR versus comparators across multiple surgical procedures to adequately characterize the risk profile.", "deficiency_severity_source_text": "adverse events related to the shoulder joint and surrounding tissues, marked increased risk of neurologically related adverse events, risk of bruising, hematoma, pruritus, and dehiscence occurred substantially more often", "drug_type_multiplier_source_text": "bupivacaine extended-release solution for instillation, injectable formulation for surgical use", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter, cannot approve this application in its present form"}, {"company_name": "Recro Pharma Inc", "ps_summary": "Inadequate extractables/leachables evaluation presents significant safety concerns with unidentified compounds detected above qualification thresholds of 5 mcg/day. The applicant must monitor all identified and unidentified compounds from extraction studies through leachable stability testing of at least three batches at multiple timepoints. Additionally, clinical data demonstrate inadequate analgesic effect with approximately six hours of inadequate pain control and delayed onset of action.", "deficiency_severity_source_text": "The NDA did not include an adequate extractables/leachables evaluation to justify the safety of potential leachables in the drug product. The structures of six potential leachable compounds were not fully elucidated, but were detected at above the Analytical Evaluation Threshold and at levels exceeding the requested qualification threshold of 5 mcg/day", "drug_type_multiplier_source_text": "meloxicam injection 30 mg/mL, intravenous injectable route of administration", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter, cannot approve this application in its present form"}, {"company_name": "Metacel Pharma LLC", "ps_summary": "Analytical method validation is incomplete requiring either retesting of available stability samples or repetition of stability studies with two additional batches placed on ICH Q1A(R2) stability protocol. The applicant must provide sufficient long-term stability data to support the proposed shelf life before approval can be granted.", "deficiency_severity_source_text": "if the identity, assay, or related substance method has to be modified to be fully validated, drug product samples may require retesting. If there are no samples available for retesting, drug product stability studies need to be repeated", "drug_type_multiplier_source_text": "baclofen oral solution 1mg/mL, oral formulation", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter, cannot approve this application in its present form"}, {"company_name": "Sarepta Therapeutics Inc", "ps_summary": "Serious life-threatening safety concerns include device-related infections with 2.3% frequency observed in eteplirsen postmarketing data (11 cases of sepsis/septic shock in 469 patients) and unmonitorable renal toxicity with nonclinical evidence of severe renal impairment and irreversible damage. Serum creatinine cannot reliably monitor renal function in DMD patients. The applicant must provide substantial clinical evidence of benefit and develop a practicable renal monitoring paradigm before resubmission.", "deficiency_severity_source_text": "serious infections related to delivery of the drug, renal toxicity, nonclinical studies showed evidence of significant renal toxicity with severe renal impairment and evidence of irreversible renal damage in juvenile animals", "drug_type_multiplier_source_text": "golodirsen injection, antisense oligonucleotide administered intravenously via implanted infusion port", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter, cannot approve this application in its present form"}, {"company_name": "Kashiv BioSciences LLC", "ps_summary": "The application faces critical deficiencies in product quality including missing source data traceability for analytical testing, sequence variants without proper explanation, and incomplete stability protocols for reference standards. The facility requires FDA inspection before approval. The applicant must resolve all data traceability issues, explain sequence variants, establish proper reference standard controls, and conduct facility inspection to address the regulatory concerns.", "deficiency_severity_source_text": "source data traceability issues in the comparative analytical assessment including lots used in clinical studies", "drug_type_multiplier_source_text": "filgrastim-ayow, are conditionally accepted until such time that the application is approved", "facility_inspection_source_text": "An inspection of the Kashiv Biosciences LLC DS manufacture facility is required before this application can be approved", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Accord Healthcare Inc", "ps_summary": "The application has critical facility inspection deficiencies at multiple manufacturing sites that must be resolved before approval. The injectable formulation of bendamustine requires satisfactory corrective actions at all listed facilities. The applicant must coordinate with manufacturing facilities to resolve all conveyed deficiencies and provide evidence of compliance before resubmission.", "deficiency_severity_source_text": "Following surveillance inspection of the manufacturing facility listed in this application, FDA conveyed deficiencies to the representative of the facility. Satisfactory resolution of the observations is required before this NDA may be approved.", "drug_type_multiplier_source_text": "Bendamustine Hydrochloride injection", "facility_inspection_source_text": "FDA conveyed deficiencies to the representative of the facility. Satisfactory resolution of the observations is required before this NDA may be approved.", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Zhejiang Novus Pharma Co Ltd", "ps_summary": "The application contains container labeling deficiencies and significant facility inspection findings that must be resolved. The manufacturing facility in China has objectionable conditions requiring satisfactory resolution and FDA verification before approval. The applicant must correct labeling formatting errors and ensure the facility resolves all inspection observations.", "deficiency_severity_source_text": "add the Fahrenheit symbol (F) following 68\u00b0 within the storage statement on the 5 gram/vial container label", "drug_type_multiplier_source_text": "Vancomycin Hydrochloride for Injection", "facility_inspection_source_text": "our field investigator observed objectionable conditions at the facility and conveyed that information to the representative of the facility at the close of the inspection. Satisfactory resolution of the remaining objectionable conditions, and verification by the FDA, is required before this application may be approved.", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Esteve Pharma SA", "ps_summary": "The application cannot proceed without successful facility inspection and complete prescribing information review. The manufacturing facility must be ready for inspection to proceed with the approval process. The applicant must coordinate facility readiness and submit revised labeling addressing all regulatory comments before resubmission.", "deficiency_severity_source_text": "We reserve additional comments on the proposed labeling and medication guide until the application is otherwise adequate.", "drug_type_multiplier_source_text": "celecoxib and tramadol hydrochloride tablets", "facility_inspection_source_text": "Our field investigator could not complete inspection of the manufacturing facility because the facility was not ready for inspection. Satisfactory inspection is required before this application may be approved.", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Dr Reddy\u2019s Labs Inc", "ps_summary": "The application faces facility inspection deficiencies and missing test method validations for the oncology injectable product cyclophosphamide. The manufacturing facility must resolve all conveyed deficiencies before approval. The applicant must address facility issues and provide revised prescribing information in proper format to proceed with review.", "deficiency_severity_source_text": "We reserve comment on the proposed labeling until the application is otherwise adequate. Upon resubmission of your application, you must submit a revised proposed label.", "drug_type_multiplier_source_text": "Cyclophosphamide Injection used for oncology indications", "facility_inspection_source_text": "During a recent inspection of the Dr. Reddy's Laboratories Limited manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "outcome_severity_source_text": "Complete Response"}, {"company_name": "lterum Therapeutics US Ltd", "ps_summary": "The application lacks sufficient clinical evidence of effectiveness with only one positive trial in a resistant population and multiple failed trials in other populations. The applicant must conduct at least one additional adequate and well-controlled clinical trial using an appropriate comparator drug and investigate optimal dosing regimens. Nonclinical PK/PD studies also need additional investigation to properly support dose selection.", "deficiency_severity_source_text": "There is a lack of substantial evidence consisting of adequate and well-controlled investigations that the drug product will have the effect it purports or is represented to have under the conditions of use prescribed, recommended, or suggested in its proposed labeling", "drug_type_multiplier_source_text": "sulopenem etzadroxil and probenecid tablets administered as oral formulation for uncomplicated urinary tract infections", "facility_inspection_source_text": "No inspection deficiencies are mentioned in the letter", "outcome_severity_source_text": "Complete Response"}, {"company_name": "AbbVie Inc", "ps_summary": "The application requires resolution of CGMP facility inspection deficiencies and revisions to prescribing information and labeling. The manufacturing facility must provide satisfactory responses to FDA Form 483 observations and may require pre-approval inspection. The applicant must coordinate with the facility and submit revised labeling addressing medication guide prominence and instructions for use before resubmission.", "deficiency_severity_source_text": "Submit draft labeling that is responsive to our electronic communication dated June 17, 2024", "drug_type_multiplier_source_text": "Vyalev (foscarbidopa and foslevodopa) injection for subcutaneous use", "facility_inspection_source_text": "Following a CGMP inspection, FDA conveyed deficiencies to the representative of the facility. The facility should provide satisfactory responses to these deficiencies to the FDA office indicated on the FDA 483 prior to your complete response.", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Fresenius Kabi USA LLC", "ps_summary": "The application faces facility inspection deficiencies at multiple manufacturing locations and analytical test method deficiencies related to oxidized variants and device performance. Manufacturing facilities must provide satisfactory responses to inspection findings before approval. The applicant must address facility issues, re-evaluate acceptance criteria based on additional batch data, and resolve container closure integrity testing concerns.", "deficiency_severity_source_text": "acceptance criteria for oxidized variants by RP-UPLC, degree of coloration, and device performance attributes", "drug_type_multiplier_source_text": "MSB11456, single-dose prefilled syringe and single-dose prefilled autoinjector and single-dose vials", "facility_inspection_source_text": "Following inspections of Fresenius Kabi Austria GmbH and listed facilities, FDA conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Ferring Pharma Inc", "ps_summary": "The application cannot be approved until facility inspection deficiencies are satisfactorily resolved through responses to the FDA Form 483. A pre-license inspection identified critical deficiencies that the manufacturing facility must address. The applicant must coordinate with the facility to obtain satisfactory responses and provide evidence of compliance, with possible re-inspection required.", "deficiency_severity_source_text": "Following a pre-license inspection of the facility listed in this application, conveyed deficiencies to the representative of the facility.", "drug_type_multiplier_source_text": "FE 999049 is an injectable biological product", "facility_inspection_source_text": "Following a pre-license inspection of the facility listed in this application, conveyed deficiencies to the representative of the facility. The facility should provide satisfactory responses to these deficiencies to the FDA office indicated on the FDA Form 483 prior to your complete response.", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Dr Reddy\u2019s Labs Ltd-", "ps_summary": "The application has significant product quality concerns including manufacturing process changes that may have impacted drug product quality, missing manufacturing steps in documentation, and slower reconstitution times approaching specification limits. The facility has conveyed inspection deficiencies requiring satisfactory resolution. The applicant must provide additional stability data, justify manufacturing changes, complete the manufacturing flow diagram, and address all facility inspection findings.", "deficiency_severity_source_text": "The manufacturing flow diagram does not include the lyophilization, capping, and packaging steps. Submit a revised flow diagram for all steps involved in the manufacturing process.", "drug_type_multiplier_source_text": "bortezomib for injection used for treatment of patients with multiple myeloma and mantle cell lymphoma", "facility_inspection_source_text": "During a recent inspection of the Dr. Reddy's Laboratories Limited manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Evolus Inc", "ps_summary": "The application lacks adequate analytical test method validation for multiple critical microbiology parameters and product quality attributes of this injectable botulinum toxin product. The applicant must provide comprehensive validation data for bioburden, endotoxin testing, container closure integrity, and stability protocols to demonstrate product safety and efficacy. Additionally, unsolicited amendments with undocumented changes require clarification to ensure all modifications are properly assessed before approval.", "deficiency_severity_source_text": "missing or unvalidated analytical test methods", "drug_type_multiplier_source_text": "botulinum toxin Type A injection", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Amneal EU Ltd", "ps_summary": "Facility CGMP inspection revealed deficiencies that must be resolved and the manufacturing facility must achieve satisfactory compliance before approval. The applicant must coordinate with the facility for timely resolution of inspection findings and support satisfactory outcomes of both CGMP surveillance and preapproval inspections. Updated labeling and carton/container labeling revisions are also required to address regulatory format and content deficiencies.", "deficiency_severity_source_text": "labeling / prescribing info", "drug_type_multiplier_source_text": "phenylephrine hydrochloride in sodium chloride injection", "facility_inspection_source_text": "deficiencies to the representative of the facility. The facility should provide satisfactory responses to these deficiencies", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Bioverativ USA Inc", "ps_summary": "Facility inspection deficiencies must be satisfactorily resolved before approval of this biologic therapy for life-threatening complement-mediated hemolytic anemias. The applicant must revise prescribing information and carton/container labeling to conform with regulatory format and content requirements, including addition of a medication guide statement.", "deficiency_severity_source_text": "labeling / prescribing info", "drug_type_multiplier_source_text": "sutimlimab for complement-mediated hemolytic anemias, life-threatening hematologic indication", "facility_inspection_source_text": "During a recent inspection of the facility for this application, our field investigators conveyed deficiencies to the representative of the facility at the close of the inspection. Satisfactory resolution of the observations is required before this application may be approved.", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Laboratorios Farmaceuticos Rovi SA", "ps_summary": "Multiple facility deficiencies must be resolved for this injectable antipsychotic formulation, including issues with microbiology validation studies for sterilization processes and solvent handling. The applicant must provide additional validation data for endotoxin reduction, correct human factors deficiencies in the instructions for use, and ensure the facility achieves full CGMP compliance before approval.", "deficiency_severity_source_text": "Missing or unvalidated analytical test methods", "drug_type_multiplier_source_text": "risperidone ISM intramuscular injectable suspension", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Rocket Pharma Inc", "ps_summary": "Significant Chemistry, Manufacturing, and Controls deficiencies exist including unreported revisions, typographical errors in method SOPs, data/calculation errors, and unvalidated specification ranges discussed during review but not formally updated in BLA documents. The applicant must submit all corrected and revised information with detailed documentation of changes, including red-lined versions and a comprehensive summary table of all modifications to ensure accurate characterization of this gene therapy product safety and quality.", "deficiency_severity_source_text": "Missing or unvalidated analytical test methods, Chemistry Manufacturing Controls data errors and inconsistencies", "drug_type_multiplier_source_text": "marnetegragene autotemcel, gene therapy for life-threatening genetic disorder", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Chiesi USA Inc", "ps_summary": "Human factors validation studies identified critical use errors and safety concerns with the Mannitol Tolerance Test that could result in patient harm including severe bronchospasm, hypoxia, and pulmonary compromise in susceptible individuals. The applicant must revise the product user interface to address identified risks and conduct supplemental human factors validation studies to demonstrate effectiveness of risk mitigations before approval can be considered.", "deficiency_severity_source_text": "use errors and use difficulties with critical tasks in administering the MTT, which could result in healthcare providers prescribing the medication to patients who cannot tolerate mannitol inhalation powder. As inhaled mannitol is known to cause severe bronchospasm in susceptible individuals, this could result in patient harm (e.g. bronchospasm, hypoxia, pulmonary compromise)", "drug_type_multiplier_source_text": "mannitol inhalation powder", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Delcath Systems Inc", "ps_summary": "Serious nonclinical and product quality safety gaps exist including inadequate toxicological risk assessments of leachables from device components, incomplete biocompatibility testing, and insufficient characterization of extractables and colorants used in blood-contacting components. Additionally, facility inspection deficiencies must be resolved, and human factors validation studies must demonstrate safe use with at least 15 representative US users in major user groups before approval can be considered for this combination product with significant toxicity risks.", "deficiency_severity_source_text": "risks of Melblez Kit treatment obtained with an earlier version of the product which you do not intend to market, outweigh its benefits for the proposed indication of treatment of patients with hepatic-dominant metastatic ocular melanoma. 7% incidence of toxic death and observed risks of serious cardiovascular, hepatic, gastrointestinal, and bone marrow toxicities", "drug_type_multiplier_source_text": "Melblez Kit with melphalan for intravenous regional chemotherapy for hepatic-dominant metastatic ocular melanoma, life-threatening cancer indication", "facility_inspection_source_text": "During a recent inspection of the Queensbury, New York, manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "HQ Specialty Pharma Corp", "ps_summary": "Critical product quality deficiencies exist including uncharacterized leachables exceeding safety qualification thresholds with unvalidated chemical structures, unqualified impurities above identification and qualification thresholds, and analytical methods not validated for specified impurities. The applicant must provide proper chemical characterization, toxicological assessments, and method validation for all identified leachables and impurities before this antibiotic product can be approved.", "deficiency_severity_source_text": "You have not provided adequate support for the assigned structures of the leachables. The original program assigned CAS numbers to both leachables that could not be found in the literature or databases. In your response dated September 14, 2018, you confirmed that the program used in the leachables study erroneously provided the CAS numbers, and that both leachables do not have CAS numbers.", "drug_type_multiplier_source_text": "Cefazolin for Injection USP, 2 g/vial, oral anti-infective", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "GlaxoSmithKline LLC", "ps_summary": "Study DREAMM-8 did not demonstrate overall survival benefit and revealed significant safety concerns including high rates of ocular toxicity requiring dose modifications, raising serious questions about the safety and appropriateness of the intended dosage for multiple myeloma patients. The applicant must conduct further dose optimization to identify an acceptable safety and tolerability profile and provide randomized efficacy and safety data applicable to the U.S. population before resubmission.", "deficiency_severity_source_text": "high rates of ocular toxicity, including high grade events, and high rates of dose modifications, the majority of which were due to ocular toxicity. These toxicity and tolerability issues raise concerns regarding the safety and appropriateness of the intended dosage of belantamab mafodotin.", "drug_type_multiplier_source_text": "belantamab mafodotin-blmf for relapsed or refractory multiple myeloma, life-threatening oncology indication", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Actavis LLC", "ps_summary": "Manufacturing facility inspection identified CGMP deficiencies that must be satisfactorily resolved before this oncology injectable product can be approved. The applicant must coordinate with Sindan-Pharma to address all identified deficiencies and demonstrate full facility compliance with manufacturing and quality standards.", "deficiency_severity_source_text": "During recent inspection of Sindan-Pharma S.R.L manufacturing facility for this application, our field investigators conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "drug_type_multiplier_source_text": "Pemetrexed Injection 25 mg/mL for intravenous infusion, chemotherapy agent for life-threatening malignancies", "facility_inspection_source_text": "During recent inspection of Sindan-Pharma S.R.L (FEI: 3005566806) manufacturing facility for this application, our field investigators conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Cadence Pharma", "ps_summary": "The Baxter Healthcare manufacturing facility in Cleveland, MS had inspectional deficiencies that must be resolved before approval. The applicant must address facility compliance with Current Good Manufacturing Practices and provide a comprehensive safety update incorporating all nonclinical and clinical data from the proposed acetaminophen injection.", "deficiency_severity_source_text": "our investigator conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "Ofirmev (acetaminophen) Injection, 10mg/mL", "facility_inspection_source_text": "During a recent inspection of the Baxter Healthcare manufacturing facility in Cleveland, MS for this application, our investigator conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Mylan GmbH", "ps_summary": "The Biocon manufacturing facility has repeat inspectional deficiencies requiring resolution, and this is the second CRL citing the same facility for compliance issues. The applicant must address labeling corrections for the insulin pen injector Instructions for Use and ensure satisfactory facility compliance before approval can be granted.", "deficiency_severity_source_text": "labeling issues that should be addressed in your resubmission", "drug_type_multiplier_source_text": "insulin glargine injection 100 units/mL", "facility_inspection_source_text": "this is the second Complete Response letter for this NDA that has identified inspectional observations at this manufacturing facility as a deficiency", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Thomas Chaly PhD FAIC", "ps_summary": "The application lacks adequate and well-controlled clinical trials with significant deficiencies in study design, endpoints, and GCP compliance. The applicant must conduct a new prospective, adequately designed clinical trial with pre-specified protocols, independent blinded readers, and proper documentation of safety monitoring to establish clinical effectiveness of Fluorodopa F 18 PET.", "deficiency_severity_source_text": "Your application contains no data from adequate and well controlled clinical trials. Significant deficiencies have been identified", "drug_type_multiplier_source_text": "Fluorodopa F 18 Injection", "facility_inspection_source_text": "deficiencies were conveyed to you for failure to prepare and maintain adequate case histories and for inadequate investigational drug disposition records", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Sedor Pharma LLC", "ps_summary": "Critical particulate matter contamination has been identified in the fosphenytoin sodium injectable product that poses a direct safety risk. The applicant must characterize the particles, identify the root cause, implement a comprehensive Risk Mitigation & Control Plan, and provide data demonstrating prevention of particle reoccurrence before approval.", "deficiency_severity_source_text": "the drug product does not contain foreign particles. Information provided to date has not adequately addressed this drug product quality issue", "drug_type_multiplier_source_text": "Sesquient (fosphenytoin sodium) injection, 100 mg and 500 mg phenytoin sodium equivalents/ml", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Dr Reddy\u2019s Labs Ltd", "ps_summary": "Manufacturing facility deficiencies for the cyclophosphamide injection product must be satisfactorily resolved before approval. The applicant must ensure Current Good Manufacturing Practices compliance and provide a safety update with all relevant nonclinical and clinical data for this life-threatening indication drug.", "deficiency_severity_source_text": "our field investigator conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "Cyclophosphamide Injection, 500mg/mL, 1g/2mL, and 2g/4mL", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Shilpa Medicare Ltd", "ps_summary": "The pemetrexed injection application has unresolved facility inspectional deficiencies and missing product quality data regarding deliverable volume/dose. The applicant must submit the requested dose data and achieve satisfactory resolution of manufacturing facility compliance issues before approval.", "deficiency_severity_source_text": "Your response to the May 30, 2021, information request related to deliverable volume (dose) data was not submitted", "drug_type_multiplier_source_text": "Pemetrexed Injection, for intravenous use", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Sun Pharma Advanced Research Co Ltd", "ps_summary": "The Sun Pharmaceutical manufacturing facility has inspectional deficiencies requiring resolution, and carton/container labeling must be corrected to properly indicate topical ophthalmic use. The applicant must revise product specifications for impurity limits and update all labeling in compliance with regulations before approval.", "deficiency_severity_source_text": "submit revised labels for all presentations where these words are replaced with 'For Topical Use in the Eye'", "drug_type_multiplier_source_text": "Xelpros (latanoprost ophthalmic emulsion) 0.005%", "facility_inspection_source_text": "our field investigators conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Azurity Pharma Inc", "ps_summary": "Multiple facility inspectional deficiencies at manufacturing sites and an outstanding FDA inspection requirement prevent approval of the zonisamide oral suspension. The applicant must resolve identified deficiencies at both facilities and complete the required FDA inspection before the application can be approved.", "deficiency_severity_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "drug_type_multiplier_source_text": "Zonisade (zonisamide) oral suspension, 20 mg/mL", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Astellas Pharma US Inc", "ps_summary": "The solifenacin succinate oral suspension has inadequate raw material controls and product quality deficiencies resulting in out-of-specification batches, plus unresolved facility inspectional issues. The applicant must establish enhanced raw material specifications, validate additional quality tests, and resolve facility compliance deficiencies before approval.", "deficiency_severity_source_text": "The quality of [REDACTED] as currently supplied by [REDACTED] is not adequately controlled, resulting in drug product batches that do not meet the proposed drug product specification", "drug_type_multiplier_source_text": "solifenacin succinate oral suspension", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "United Therapeutics Corp", "ps_summary": "The manufacturing facility for treprostinil inhalation powder has been classified as Official Action Indicated due to serious CGMP violations, representing a systemic compliance failure. The applicant must comprehensively address all facility deficiencies to resolve the OAI classification before this life-threatening indication drug can be approved.", "deficiency_severity_source_text": "our field investigator conveyed deficiencies to the representative of the facility. As a result of this inspection, FDA has classified this facility as Official Action Indicated (OAI)", "drug_type_multiplier_source_text": "treprostinil inhalation powder", "facility_inspection_source_text": "FDA has classified this facility as Official Action Indicated (OAI) on [REDACTED] for drug CGMP", "outcome_severity_source_text": "FDA has classified this facility as Official Action Indicated (OAI)"}, {"company_name": "Braeburn Pharma Inc", "ps_summary": "The application raises significant nonclinical safety concerns regarding N-methyl-2-pyrrolidone (NMP) exposure, including potential teratogenicity and developmental toxicity risks, with required postmarketing studies on elemental impurities and leachables from the container closure system. The applicant must conduct fertility, early embryonic, and pre/post-natal development studies in rats via subcutaneous route, and a clinical trial evaluating safe initiation of buprenorphine at higher doses to assess risk of precipitated withdrawal. A REMS is required to prevent intravenous self-administration of this injectable formulation.", "deficiency_severity_source_text": "safety signal gaps, teratogenicity, serious embryo-fetal developmental, and/or post-natal developmental adverse events, or cancer due to exposure to NMP", "drug_type_multiplier_source_text": "extended-release injection for subcutaneous use", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "tentatively approved under 21 CFR 314.105"}, {"company_name": "Accord Healthcare Inc", "ps_summary": "The application for Carmustine injection lacks adequate leachable studies under worst-case conditions and justified analytical evaluation thresholds and provisional daily exposure limits. The applicant must conduct comprehensive leachable studies with proper justification of safety thresholds and submit updated prescribing information before resubmission. Safety updates incorporating all nonclinical and clinical data are required for this oncology agent.", "deficiency_severity_source_text": "missing test methods, leachable study using worst case scenario conditions", "drug_type_multiplier_source_text": "Carmustine for injection, oncology indication", "facility_inspection_source_text": "No inspection deficiencies cited in letter", "outcome_severity_source_text": "Complete Response letter, we cannot approve this application in its present form"}, {"company_name": "Ardelyx Inc", "ps_summary": "The application demonstrates inadequate clinical efficacy with a treatment effect of unclear clinical significance for reducing serum phosphorus in CKD dialysis patients. The applicant must conduct an additional well-controlled trial demonstrating clinical relevance of treatment effects on serum phosphorus or clinical outcomes related to hyperphosphatemia. Updated prescribing information and safety data are required in the resubmission.", "deficiency_severity_source_text": "magnitude of the treatment effect is small and of unclear clinical significance, no precedent for accepting treatment effects of the magnitude seen in this development program", "drug_type_multiplier_source_text": "tenapanor hydrochloride tablets, oral formulation, chronic kidney disease on dialysis", "facility_inspection_source_text": "No facility inspection deficiencies cited in letter", "outcome_severity_source_text": "Complete Response letter, we cannot approve this application in its present form"}, {"company_name": "Accord BioPharma Inc", "ps_summary": "The biosimilar product manufacturing facility has unresolved inspection deficiencies that must be satisfactorily addressed before approval can be granted. The applicant must work with the facility to resolve all cited deficiencies, provide documentation of facility responses to FDA Form 483, and submit updated prescribing information and labeling. Re-inspection may be required to assess compliance with quality standards.", "deficiency_severity_source_text": "FDA conveyed deficiencies to the representative of the facility, outstanding items still unresolved", "drug_type_multiplier_source_text": "biologics license application for biosimilar product", "facility_inspection_source_text": "deficiencies to the representative of the facility, outstanding items still unresolved, must resolve before approval", "outcome_severity_source_text": "Complete Response letter, we cannot approve this application in its present form"}, {"company_name": "Hikma Pharma USA Inc", "ps_summary": "The application for naloxone nasal spray has critical product quality deficiencies related to elemental impurities, leachable studies with inadequate worst-case scenario testing, and unvalidated analytical methods. The applicant must conduct comprehensive extractable/leachable studies for all formulation-contact materials, complete facility inspection, resolve human factors validation deficiencies, and ensure the manufacturing facility is fully compliant with GMP requirements before resubmission.", "deficiency_severity_source_text": "elemental impurities, extractable leachable assessment to address Chemistry, Manufacturing, and Controls deficiencies, leachable and extractable studies for all product-contact materials", "drug_type_multiplier_source_text": "naloxone nasal spray, 8 mg, intranasal formulation", "facility_inspection_source_text": "the facility was not ready for inspection, Satisfactory inspection is required before this NDA may be approved", "outcome_severity_source_text": "Complete Response letter, we cannot approve this application in its present form"}, {"company_name": "Ascendis Pharma Bone Diseases A/S", "ps_summary": "The combination product has critical device/quality deficiencies with unacceptable dose variability that could cause erratic dosing leading to episodic hypocalcemia or hypercalcemia in patients. The applicant must either redesign the device to achieve consistent delivered dose specifications or provide comprehensive verification testing demonstrating the device reliably meets proposed dose delivery specifications at release and stability. Updated labeling reflecting quality improvements and postmarketing studies on hypocalcemia/hypercalcemia and pregnancy exposure are required.", "deficiency_severity_source_text": "Significant variability of the delivered dose, Lack of adequate data to support feasibility of revised assay and delivered volume specification, high-level of batch failure with proposed specifications", "drug_type_multiplier_source_text": "palopegteriparatide injection, injectable formulation", "facility_inspection_source_text": "No facility inspection deficiencies cited in letter", "outcome_severity_source_text": "Complete Response letter, we cannot approve this application in its present form"}, {"company_name": "Shandong Luye Pharma Co Ltd", "ps_summary": "The injectable risperidone formulation presents serious safety concerns with unexplained concentration spikes up to 5-fold higher than average in approximately 6% of patients, risking dangerously elevated exposures and adverse effects. The applicant must conduct a comprehensive root-cause analysis explaining the concentration spikes and implement preventive measures, resolve biopharmaceutic deficiencies related to drug release specifications and biowaiver support, complete facility inspection, and address human factors/use-related risk analysis for the reconstituted product.", "deficiency_severity_source_text": "unexplained, abnormally high drug concentration spikes, concentrations up to ~100 ng/mL (up to five times higher than average), potential safety issues with the proposed drug product", "drug_type_multiplier_source_text": "risperidone extended-release injectable suspension for intramuscular injection", "facility_inspection_source_text": "the field investigator conveyed deficiencies to the representative of the facility, Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "Complete Response letter, we cannot approve this application in its present form"}, {"company_name": "Amgen Inc", "ps_summary": "The biologics application reveals a critical cardiovascular safety signal with romosozumab demonstrating higher incidence of serious adverse cardiovascular events compared to active control, with similar concerns observed in a second trial. The applicant must submit final analyses of both studies with an integrated assessment of cardiovascular risk, provide all relevant narratives and datasets, and establish a clear benefit/risk profile demonstrating that benefits outweigh identified cardiovascular risks before resubmission.", "deficiency_severity_source_text": "higher incidence of cardiovascular serious adverse events with romosozumab compared to alendronate, similar signal in Study 20110174, may increase cardiovascular risk", "drug_type_multiplier_source_text": "romosozumab, osteoporosis indication", "facility_inspection_source_text": "No facility inspection deficiencies cited in letter", "outcome_severity_source_text": "Complete Response letter, we cannot approve this application in its present form"}, {"company_name": "Braintree Labs Inc", "ps_summary": "The SUTAB formulation has unresolved manufacturing facility inspection deficiencies that must be satisfactorily addressed before approval. The applicant must resolve all cited facility deficiencies, submit updated prescribing information and carton/container labeling per regulatory guidelines, and demonstrate manufacturing compliance with GMP requirements before resubmission.", "deficiency_severity_source_text": "recent inspection of the Braintree Laboratories, Inc., MA manufacturing facility, deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "SUTAB tablets, oral formulation, bowel preparation indication", "facility_inspection_source_text": "During a recent inspection, field investigator conveyed deficiencies to the representative of the facility, Satisfactory resolution required before NDA may be approved", "outcome_severity_source_text": "Complete Response letter, we cannot approve this application in its present form"}, {"company_name": "Revance Therapeutics Inc", "ps_summary": "The daxibotulinumtoxinA biologics application has critical unresolved manufacturing facility deficiencies that prevent approval. The applicant must satisfactorily resolve all facility inspection deficiencies, submit updated prescribing information and labeling with required pharmacist/patient medication guide statements, and ensure manufacturing compliance before resubmission.", "deficiency_severity_source_text": "During a recent inspection, field investigator conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "daxibotulinumtoxinA for injection, cosmetic indication", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility, Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "Complete Response letter, we cannot approve this application in its present form"}, {"company_name": "SQ Innovation Inc", "ps_summary": "The application for subcutaneous furosemide injection cannot be approved due to multiple product quality deficiencies and labeling issues that require resolution. The sponsor must address all identified deficiencies including drug product specifications, device components, and prescribing information before resubmission. Comprehensive safety updates incorporating all nonclinical and clinical data are required with the resubmission.", "deficiency_severity_source_text": "Submit draft carton and container labeling based on our proposed revisions", "drug_type_multiplier_source_text": "furosemide injection, for subcutaneous use", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "ResQ Pharma", "ps_summary": "The lipid emulsion application lacks adequate safety data establishing bioequivalence between the proposed Nutrilipid formulation and the Intralipid reference product for treating local anesthetic systemic toxicity. Statistically significant physicochemical differences exist that could affect in vivo performance, and human factors validation identified critical use errors requiring design and labeling improvements. Additional comparative efficacy data and risk mitigation controls must be provided before approval can be considered.", "deficiency_severity_source_text": "absence of data for Nutrilipid 20% and paucity of data for other lipid emulsions", "drug_type_multiplier_source_text": "for intravenous infusion", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Pfizer Inc", "ps_summary": "The trastuzumab biosimilar application contains significant product quality deficiencies including insufficient Working Cell Bank stability data, inadequate fill weight validation, and missing critical analytical methods for ADCC activity and iso Asp102 control. Shipping validation studies lack adequate environmental stress simulation, and multiple process validation gaps exist that must be resolved. Comprehensive quality and stability data demonstrating consistent product performance are essential before approval.", "deficiency_severity_source_text": "Missing or unvalidated analytical test methods", "drug_type_multiplier_source_text": "Trazimera (PF-05280014), a biosimilar to trastuzumab used in oncology", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Alvotech USA Inc", "ps_summary": "The AVTO5 biosimilar application cannot be approved until the manufacturing facility resolves all deficiencies identified during pre-license inspection. The facility must provide satisfactory written responses to the FDA Form 483 observations before the application can be considered for approval. Re-inspection of the facility may be required following receipt of the complete response.", "deficiency_severity_source_text": "Following pre-license inspection of [facility], FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "AVTO5 biosimilar product for cancer/life-threatening indication", "facility_inspection_source_text": "FDA conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Outlook Therapeutics Inc", "ps_summary": "The bevacizumab-vikg biosimilar application lacks sufficient evidence of efficacy as the NORSE EIGHT trial failed to demonstrate non-inferiority to ranibizumab for treating wet-AMD. Confirmatory evidence of effectiveness must be submitted to demonstrate the product will have the intended therapeutic effect. Additional clinical efficacy data are required before regulatory approval can be granted.", "deficiency_severity_source_text": "NORSE EIGHT did not meet the primary efficacy endpoint of mean change from baseline in ETDRS BCVA score at the Week 8 visit in comparison to ranibizumab", "drug_type_multiplier_source_text": "bevacizumab-vikg injection for wet age-related macular degeneration (oncology-related anti-angiogenic therapy)", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Alvotech USA Inc", "ps_summary": "The AVTO5 biosimilar application cannot be approved until manufacturing facility deficiencies from pre-license inspection are satisfactorily resolved. The facility must provide written responses to FDA Form 483 observations with documentation of corrective actions. Re-inspection may be required to verify resolution of all cited deficiencies.", "deficiency_severity_source_text": "Following pre-license inspection of [facility], FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "AVTO5 biosimilar product for cancer/life-threatening indication", "facility_inspection_source_text": "FDA conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Dr Reddy\u2019s Labs Inc", "ps_summary": "The AVT03 biosimilar application cannot be approved without satisfactory resolution of manufacturing facility deficiencies identified during pre-license inspection. The facility must provide documented responses to FDA Form 483 observations before the application will be considered approvable. A REMS strategy is required to manage the risk of severe hypocalcemia in advanced chronic kidney disease patients.", "deficiency_severity_source_text": "Following pre-license inspection of [facility], FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "AVT03 biosimilar for chronic kidney disease treatment", "facility_inspection_source_text": "FDA conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "MEDRx USA Inc", "ps_summary": "The lidocaine topical system application contains nonclinical deficiencies requiring resolution before approval can be granted. Comprehensive safety updates incorporating all clinical and nonclinical data must be submitted with the resubmission. Draft labeling for prescribing information and carton/container labeling must be revised to address FDA comments.", "deficiency_severity_source_text": "[REDACTED] nonclinical deficiency", "drug_type_multiplier_source_text": "lidocaine topical system", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "CooperSurgical Inc", "ps_summary": "The Paragard supplemental application cannot be approved until the manufacturing facility is ready for and passes a satisfactory FDA inspection. Multiple critical labeling and placement guide deficiencies exist for the new inserter device, including missing critical instructions for proper device loading, deployment, and thread trimming. Comprehensive revisions to carton labeling, container labeling, and insertion procedure instructions are required to ensure safe and effective product use.", "deficiency_severity_source_text": "The proposed inserter has some unique task differences compared with other similar US products", "drug_type_multiplier_source_text": "intrauterine copper contraceptive device", "facility_inspection_source_text": "our field investigator could not complete the inspection because the facility was not ready for inspection", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Mylan Labs Ltd", "ps_summary": "The acetaminophen injection application cannot be approved due to unresolved manufacturing facility deficiencies and outstanding regulatory issues. Satisfactory resolution of facility inspection findings and patent certification for the new neonatal/infant dosing regimen are required. Updated letters from the drug source manufacturer confirming supply availability and additional safety data must be submitted with resubmission.", "deficiency_severity_source_text": "During a recent inspection of the Mylan Laboratories Limited [Specialty Formulation Facility] manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "Acetaminophen for Injection for neonates and infants", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Orexo AB", "ps_summary": "The naloxone nasal powder device has critical human factors failures where users fail to depress the plunger, believing they have administered a dose when they have not, creating serious risk of treatment failure and potential mortality in opioid overdose patients. The applicant must redesign the user interface to prevent these use errors and provide validation data demonstrating safe and effective use before resubmission.", "deficiency_severity_source_text": "user interface does not support the safe and effective use of the proposed product", "drug_type_multiplier_source_text": "nasal powder route of administration", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Venatorx Pharma Inc", "ps_summary": "The cefepime and taniborbactam combination injection has unvalidated analytical test methods and pharmacokinetic concerns regarding higher taniborbactam exposures in hemodialysis patients that create inadequate safety characterization. The applicant must conduct additional dosing analyses and clinical pharmacology studies to establish safe and effective dosing for all patient populations before resubmission.", "deficiency_severity_source_text": "identified deficiencies that precluded further discussion of labeling", "drug_type_multiplier_source_text": "packaged for intravenous use", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Hikma Pharma USA Inc", "ps_summary": "The naloxone 4 mg nasal spray has higher systemic exposure than approved comparators, creating inadequate safety data to support nonprescription use and increased risk of severe precipitated opioid withdrawal in opioid-dependent individuals. The applicant must either reformulate to achieve lower comparable exposures or conduct additional clinical safety studies in relevant populations to establish safety before resubmission.", "deficiency_severity_source_text": "higher systemic exposure of the proposed product is a safety concern. We are concerned that higher naloxone doses and exposures may result in increased risk, severity, and duration of precipitated opioid withdrawal", "drug_type_multiplier_source_text": "nasal spray nonprescription route", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "OWP Pharma Inc", "ps_summary": "The lamotrigine oral suspension application has facility deficiencies with a non-operational manufacturing facility that must be resolved and inspected before approval. The applicant must ensure the manufacturing facility is operational and ready for inspection, with satisfactory resolution of any deficiencies conveyed by the field investigator.", "deficiency_severity_source_text": "The drug substance manufacturing facility [REDACTED] is not operational. A satisfactory inspection may be required before this application may be approved.", "drug_type_multiplier_source_text": "oral suspension formulation", "facility_inspection_source_text": "The drug substance manufacturing facility [REDACTED] Proposed to support the application is not operational", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "SYDNEXIS Inc", "ps_summary": "The atropine 0.01% ophthalmic solution lacks substantial evidence of effectiveness for myopia treatment in children, with minimal and declining clinical benefit that does not justify chronic daily eye drop use. The applicant must provide robust clinical evidence demonstrating clinically meaningful efficacy or conduct additional well-controlled studies in the U.S. pediatric population before resubmission.", "deficiency_severity_source_text": "the clinical study contained and the referenced literature in this submission do not support the effectiveness of atropine sulfate ophthalmic solution, 0.01% for the treatment of myopia in children", "drug_type_multiplier_source_text": "ophthalmic solution topical route", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Mylan Pharma Inc", "ps_summary": "The abacavir and lamivudine tablets have facility inspection deficiencies with objectionable conditions that must be resolved before approval, along with prescribing information labeling revisions. The applicant must correct the facility deficiencies conveyed by the inspector and revise all labeling to comply with regulatory format requirements before resubmission.", "deficiency_severity_source_text": "Your proposed Prescribing Information (Pl) must conform to the content and format regulations", "drug_type_multiplier_source_text": "tablet for oral suspension containing abacavir and lamivudine anti-infective", "facility_inspection_source_text": "our field investigator observed objectionable conditions at the facility and conveyed that information to the representative of the facility", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Baxter Healthcare Corp", "ps_summary": "The injectable product has unvalidated analytical test methods and product quality deficiencies that must be addressed with revised prescribing information and labeling. The applicant must provide complete product quality data and ensure all labeling conforms to regulatory requirements before resubmission.", "deficiency_severity_source_text": "PRODUCT QUALITY deficiencies identified but content [REDACTED]", "drug_type_multiplier_source_text": "injection route of administration", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Spes Pharma Inc", "ps_summary": "The fosaprepitant injection has multiple facility inspection deficiencies conveyed by field investigators at two manufacturing facilities that must be satisfactorily resolved before approval. The applicant must address all deficiencies identified at both Pharmaceutics International facilities and provide evidence of resolution before resubmission.", "deficiency_severity_source_text": "During a recent inspection of the Pharmaceutics International, Inc. (FEI 3006503102) manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "injection route for fosaprepitant intravenous administration", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Emory Partners LLC", "ps_summary": "The amphetamine extended-release tablets have facility inspection deficiencies with mandatory resolution requirements and prescribing information labeling issues. The applicant must resolve facility deficiencies conveyed by the field investigator and revise all labeling to meet regulatory standards, along with mandatory medication guide requirements before resubmission.", "deficiency_severity_source_text": "We reserve comment on the proposed labeling until the application is otherwise adequate", "drug_type_multiplier_source_text": "Dyanavel XR (amphetamine) extended-release tablets - DEA scheduled controlled substance", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Sun Pharma Industries Ltd", "ps_summary": "The gemcitabine injection has facility inspection deficiencies requiring resolution and carton/container labeling revisions regarding dose banding approximations that could affect drug safety and efficacy. The applicant must resolve facility deficiencies, provide justification that dose banding instructions do not compromise safety and efficacy, and revise all carton and container labeling before resubmission.", "deficiency_severity_source_text": "Submit draft carton and container labeling revised as follows", "drug_type_multiplier_source_text": "INFUGEM (gemcitabine injection) - oncology anti-cancer life-threatening indication", "facility_inspection_source_text": "During recent inspections of the Sun Pharmaceutical Industries Limited, FEI: 3002809586, manufacturing facility for this NDA, our field investigator conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Xbrane Biopharma AB", "ps_summary": "The BLA for a biologic product received a Complete Response Letter citing labeling deficiencies, prescribing information formatting issues, and facility inspection findings that must be resolved. The applicant must address facility inspection deficiencies documented on FDA Form 483 and revise all labeling to comply with regulatory requirements before resubmission. Safety updates incorporating all nonclinical and clinical study data must accompany the complete response.", "deficiency_severity_source_text": "Please submit draft labeling that is responsive to our electronic communication", "drug_type_multiplier_source_text": "biologics license application for a therapeutic product", "facility_inspection_source_text": "FDA conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Xeris Pharma Inc", "ps_summary": "The supplemental NDA for Gvoke (glucagon) injection for IV administration lacks adequate scientific bridging between the proposed formulation and the reference product due to different inactive ingredients and insufficient bioavailability data. The applicant must conduct comparative bioavailability studies, stability testing with the Gvoke vial formulation, and provide extensive comparative physicochemical data and dose accuracy testing. Injectable products require heightened scrutiny to ensure safety and efficacy equivalence.", "deficiency_severity_source_text": "does not contain an adequate scientific bridge between your proposed to-be-marketed product and the relied-upon listed drug for the proposed indication by IV administration", "drug_type_multiplier_source_text": "intravenous (IV) dose", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Defender Pharma Inc", "ps_summary": "The NDA for scopolamine nasal gel was rejected due to critical human factors validation failures showing use errors that could result in overdosing patients, including failure to wipe nozzle tip and incorrect administration to both nostrils instead of one. The applicant must redesign the user interface with mitigation strategies and conduct additional human factors validation studies to demonstrate safe and effective use. The dose-limiting mental model of existing nasal products presents a significant safety challenge requiring innovative device design.", "deficiency_severity_source_text": "the user interface does not support the safe and effective use of the proposed product. The results of the HF validation study demonstrated several use errors and close calls with critical tasks that may result in harm to the patient", "drug_type_multiplier_source_text": "nasal gel formulation", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in the letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Takeda Pharma USA Inc", "ps_summary": "The NDA for Eohilia (budesonide oral suspension) for eosinophilic esophagitis was rejected due to insufficient evidence of efficacy and lack of demonstrated clinical meaningfulness of the primary endpoints. The applicant must conduct a new adequate and well-controlled study with at least 24 weeks of treatment duration followed by 52 weeks total to establish durability of effect and include a food effect study given the concentration-dependent adverse events associated with corticosteroid exposure.", "deficiency_severity_source_text": "neither the data submitted in the NDA, nor the data submitted to the NDA during review of the application, are adequate to support the demonstration of efficacy of BOS for the treatment of EoE", "drug_type_multiplier_source_text": "oral suspension corticosteroid formulation", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in the letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Fera Pharma LLC", "ps_summary": "The NDA for Avaclyr (acyclovir ophthalmic ointment) lacks adequate scientific bridging with the reference product, particularly regarding petrolatum characterization, viscosity profiling, acyclovir particle size analysis, and polymorphic form comparison. The applicant must conduct comprehensive comparative quality and performance testing including in vitro release testing, particle size analysis with D10/D50/D90 reporting, and polymorphism characterization to ensure equivalence to the reference product.", "deficiency_severity_source_text": "The information submitted to your application on July 24, 2013, March 12 and 25, 2014, is insufficient to establish a scientific \"bridge\" between the proposed product and the product used in the published clinical trials", "drug_type_multiplier_source_text": "ophthalmic ointment formulation", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Lupin Ltd (Biotech Division)", "ps_summary": "The BLA for LUBT004 received a Complete Response Letter due to unresolved facility inspection deficiencies that must be addressed before approval. The applicant must coordinate with the manufacturing facility to resolve all inspection findings documented on FDA Form 483 and provide evidence of satisfactory responses. Facility compliance with CGMP is essential before approval can be granted.", "deficiency_severity_source_text": "FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "biologics license application", "facility_inspection_source_text": "Following pre-license inspection, FDA conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Unicycive Therapeutics Inc", "ps_summary": "The NDA for oxylanthanum carbonate tablets was rejected due to CGMP and pre-approval inspection deficiencies at the manufacturing facility that must be resolved before approval. The applicant must ensure satisfactory facility responses to FDA Form 483 findings and coordinate potential CGMP and PAI reinspections to confirm compliance. Manufacturing facility compliance is critical before the application can be approved.", "deficiency_severity_source_text": "Following a Current Good Manufacturing Practices (CGMP) inspection and pre-approval inspection (PAI), FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "oxylanthanum carbonate tablets oral formulation", "facility_inspection_source_text": "FDA conveyed deficiencies to the representative of the facility. The facility should provide satisfactory responses to these deficiencies", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Amgen Inc", "ps_summary": "The BLA for Kanjinti (ABP 980), an oncology biosimilar, received a Complete Response Letter due to facility inspection deficiencies and manufacturing process control issues including sterilization validation, media fill simulations, and process validation gaps. The applicant must resolve all facility inspection findings and implement necessary equipment modifications to meet manufacturing standards. Oncology biosimilars require rigorous facility compliance given the serious health implications of treatment failures.", "deficiency_severity_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "drug_type_multiplier_source_text": "Kanjinti (ABP 980) is an oncology product", "facility_inspection_source_text": "During a recent inspection of the manufacturing facility, our field investigator conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Chemo Research SL", "ps_summary": "The NDA for dienogest and ethinyl estradiol tablets was rejected due to an unacceptable benefit-risk profile with markedly increased venous thromboembolism risk compared to other combination oral contraceptives. Safety data from clinical studies and European postmarketing surveillance demonstrate significantly elevated VTE rates that make approval inappropriate for contraceptive use. The applicant is advised that approval of this specific product combination is not possible.", "deficiency_severity_source_text": "clearly demonstrates a markedly increased risk of venous thromboembolism (VTE) rate", "drug_type_multiplier_source_text": "oral contraceptive tablets", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "we cannot approve this application"}, {"company_name": "Bio-Thera Solutions Ltd", "ps_summary": "The BLA for BAT1706, a bevacizumab biosimilar, received a Complete Response Letter due to critical pharmacokinetic bridging failures, analytical method validation deficiencies, and pending facility inspection requirements. The applicant must repeat selectivity experiments for the bioanalytical method, conduct shipping validation studies, resolve microbiolog
