const explanations = [{"company_name": "CMP Development LLC", "ps_summary": "The applicant must resolve facility inspection deficiencies and address labeling concerns for sildenafil oral suspension before approval. The facility must demonstrate satisfactory correction of cited deficiencies, and the applicant must revise prescribing information and submit a safety update including all nonclinical and clinical data.", "deficiency_severity_source_text": "our field investigator conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "sildenafil oral suspension, 10 mg/ml", "facility_inspection_source_text": "Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "AuroMedics Pharma LLC", "ps_summary": "The applicant must address critical product quality issues including inadequate analytical methods for visible particulate matter detection and facility inspection deficiencies for cyclophosphamide solution. Manufacturing three new registration batches with improved inspection procedures and comprehensive stability data are required before approval.", "deficiency_severity_source_text": "the detection capability of the original inspection method for visible particulate matter is not sufficient to detect all the particulate matter", "drug_type_multiplier_source_text": "Cyclophosphamide Solution, 500 mg/2.5 mL and 1 g/5 mL", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Sedor Pharma LLC", "ps_summary": "The applicant must provide validated analytical methods for fosphenytoin sodium injection and demonstrate stability across the proposed concentration range and diluents. Critical d s rejected because the device component (Implantable System for Remodulin) remains not approvable and sufficient human factors validation data has not been provided to ensure safe and effective use. The applicant must obtain device approval and conduct comprehensive human factors validation studies before the combination product can be approved.", "deficiency_severity_source_text": "Sufficient human factors (HF) data has not been provided to demonstrate that the Implantable System for Remodulin user interface supports safe and effective use", "drug_type_multiplier_source_text": "Implantable System for Remodulin (treprostinil) for pulmonary hypertension", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "AbbVie Inc", "ps_summary": "The application was rejected due to extensive device design verification deficiencies for the Vyafuser infusion pump component, including inadequate testing of flow accuracy under various environmental conditions, insufficient battery performance testing, incomplete alarm validation, and unresolved software anomalies. The applicant must conduct comprehensive performance testing, verify all alarms function reliably, resolve software issues, and validate the device operates safely throughout its intended use conditions.", "deficiency_severity_source_text": "testing provided does not adequately demonstrate that the infusion system functions as intended throughout the anticipated delivery time and when exposed to factors that impact flow accuracy", "drug_type_multiplier_source_text": "foscarbidopa and foslevodopa solution for intravenous infusion", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Fresenius Kabi USA LLC", "ps_summary": "The application was rejected due to labeling deficiencies requiring revision of the established name and alignment with regulatory guidance documents. Most substantive deficiencies appear to be redacted, but labeling formatting must be corrected to comply with FDA requirements before resubmission.", "deficiency_severity_source_text": "We recommend you revise the established name for from \"amino acids, dextrose and lipid injectable emulsion\" to \"amino acids, dextrose, and lipid injectable emulsion\"", "drug_type_multiplier_source_text": "amino acids, dextrose and lipid injectable emulsion", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "GeNO LLC", "ps_summary": "The application was refused to file because the applicant improperly designated the drug substance and failed to provide complete chemistry, manufacturing, and control information for the nitric oxide drug product and manufacturing facility certification. The applicant must properly designate the drug substance, provide comprehensive manufacturing information, and obtain facility GMP certification before resubmission can be considered.", "deficiency_severity_source_text": "application is not sufficiently complete to permit a substantive review", "drug_type_multiplier_source_text": "nitric oxide for inhalation", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "REFUSAL TO FILE"}, {"company_name": "Eli Lilly and Co", "ps_summary": "The application for Rezvoglar (insulin glargine-aglr) interchangeability designation cannot be approved due to regulatory exclusivity restrictions under section 351(k)(6) of the Public Health Service Act, as a prior interchangeable biosimilar has already received designation. Additionally, labeling deficiencies must be addressed and safety data updates are required before resubmission.", "deficiency_severity_source_text": "We reserve comment on the proposed labeling at this time", "drug_type_multiplier_source_text": "insulin lytical data provided to demonstrate that Theragrastim is highly similar to US-licensed Neupogen. Furthermore, the data provided in the submission do not support process validation and DS and DP quality at release and on stability", "drug_type_multiplier_source_text": "Theragrastim (filgrastim) for hematologic malignancies and severe chronic neutropenia represents life-threatening conditions", "facility_inspection_source_text": "During a recent inspection of the Kashiv BioSciences, LLC manufacturing facility for this BLA, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Adamis Pharma Corp", "ps_summary": "ZIMHI (Naloxone) prefilled syringe cannot be approved due to inadequate device safety design failing to protect layperson users from needlestick injuries and bloodborne pathogen transmission. The applicant must redesign the needle safety device to include automatic deployment, conduct human factors validation studies, and provide comprehensive use-related risk analysis before resubmission.", "deficiency_severity_source_text": "Your product, if approved, is anticipated to be widely used in community settings by laypersons who are not familiar with the use of the product at all. Your current user interface is not adequate to mitigate potential risks of needlestick injury and prevent risks of transmission of bloodborne pathogens from opioid-overdose patients to the intended users", "drug_type_multiplier_source_text": "Naloxone HCI injection is administered via intramuscular or subcutaneous injection for emergency opioid overdose treatment", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_na _text": "no inspection deficiencies identified in correspondence", "outcome_severity_source_text": "provisionally determined that your 351(k) application meets the interchangeability criteria"}, {"company_name": "Elevar Therapeutics Inc", "ps_summary": "The applicant cannot proceed with approval of rivoceranib until the combination drug partner SHR-1210 receives regulatory approval, as safety and effectiveness have only been established in the combination therapy. The applicant should coordinate approval timelines with SHR-1210 sponsors and update labeling accordingly.", "deficiency_severity_source_text": "the safety and effectiveness of (rivoceranib) has only been established in combination with SHR-1210, we will not approve rivoceranib until a regulatory approval action is issued for SHR-1210", "drug_type_multiplier_source_text": "rivoceranib tablets", "facility_inspection_source_text": "no facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Clarus Therapeutics Inc", "ps_summary": "Jatenzo demonstrates clinically significant increases in blood pressure that create unacceptable cardiovascular risks without sufficient mitigation strategies. The applicant must develop comprehensive labeling revisions including boxed warnings, contraindications, and a REMS program to ensure safe use and favorable benefit-risk profile.", "deficiency_severity_source_text": "Jatenzo causes clinically meaningful increases in blood pressure...These BP changes, with a chronically administered drug such as Jatenzo, will increase the risk of major cardiovascular adverse events", "drug_type_multiplier_source_text": "testosterone undecanoate (TU) (oral)", "facility_inspection_source_text": "no facility inspection deficiencies identified", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Astellas Pharma US Inc", "ps_summary": "Facility inspection deficiencies remain unresolved, preventing approval of IMAB362. The applicant must work with the manufacturing facility to provide satisfactory responses to all cited deficiencies and may require re-inspection before approval can be considered.", "deficiency_severity_source_text": "Following the pre-license inspection of a listed in this application, FDA conveyed deficiencies to the facility's representative. FDA has reviewed the facility's responses to the referenced deficiencies, and all deficiencies have not been satisfactorily resolved", "drug_type_multiplier_source_text": "IMAB362 injection for intravenous use", "facility_inspection_source_text": "all deficiencies have not been satisfactorily resolved. Satisfactory responses to these deficiencies should be provided", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Antares Pharma Inc", "ps_summary": "Manufacturing facility observations must be satisfactorily resolved before NDA approval. The applicant must coordinate with the manufacturing site to address all deficiencies and submit evidence of resolution with the complete response.", "deficiency_severity_source_text": "The drug product manufacturing site observations are required to be resolved before this NDA may be approved", "drug_type_multiplier_source_text": "hydrocortisone sodium phosphate injection", "facility_inspection_source_text": "Satisfactory resolution of the observations is required before this NDA may be approved", "outcome_severity_source_text": "Complete Response"}, {"company_name": "CSL Behring LLC", "ps_summary": "Critical deficiencies exist in the manufacturing process design for maintaining sterility and consistent product quality, including insufficient process validation, inadequate filling controls, and unresolved facility inspection findings. The applicant must provide complete process validation data, establish adequate control strategies, and obtain facility compliance before approval.", "deficiency_severity_source_text": "The manufacturing process for CSL312 se g materials according to FDA guidance to address these deficiencies and facilitate eventual approval.", "deficiency_severity_source_text": "We reserve further comment on the proposed labeling until the application is otherwise adequate", "drug_type_multiplier_source_text": "terlipressin injection for intravenous use", "facility_inspection_source_text": "the facility was not ready for inspection", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Santen Inc", "ps_summary": "The NDA for Omlonti was rejected due to critical safety concerns including significant corneal endothelial cell loss observed in clinical studies and unresolved facility manufacturing deficiencies. The applicant must conduct a controlled clinical study comparing omidenepag isopropyl to a concurrent control without the drug and resolve all facility inspection deficiencies to address these serious safety issues.", "deficiency_severity_source_text": "Study 1171504 demonstrated significant endothelial cell loss in both omidenepag isopropyl ophthalmic solution monotherapy arms particularly between Weeks 12 and 26", "drug_type_multiplier_source_text": "Omlonti (omidenepag isopropyl ophthalmic solution), 0.002%", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Minerva Neurosciences Inc", "ps_summary": "The roluperidone application was rejected due to insufficient evidence of effectiveness for treating negative symptoms of schizophrenia and critical safety concerns regarding QTc prolongation requiring CYP2D6 genotyping. The applicant must conduct additional adequate and well-controlled clinical trials demonstrating efficacy and safety with appropriate pharmacogenomic stratification strategies.", "deficiency_severity_source_text": "You have not established substantial evidence of effectiveness (SEE) for the effects of roluperidone on the negative symptoms of schizophrenia. Study MINI-101C07 (Study C07) was a negative study using the pre-specified statistical analyses", "drug_type_multiplier_source_text": "treatment of negative symptoms of schizophrenia", "facility_inspection_source_text": "no inspection deficiencies mentioned", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Acacia Pharma Ltd", "ps_summary": "The intravenous injectable amisulpride application was not approved due to unresolved facility inspection deficiencies related to manufacturing and quality control. The applicant must achieve satisfactory resolution of all manufacturing facility deficiencies before resubmission to address these quality and safety concerns.", "deficiency_severity_source_text": "During a recent inspection of the manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "drug_type_multiplier_source_text": "Barhemsys (amisulpride) injection, for intravenous use", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Zealand Pharma US Inc", "ps_summary": "The glepaglutide application for short bowel syndrome was rejected due to insufficient efficacy data from the single phase 3 trial with multiple reliability concerns and serious safety signals including unreported adverse events at clinical sites. The applicant must conduct a new double-blinded, placebo-controlled trial of at least 52 weeks duration with robust data collection and verification procedures to address efficacy uncertainties and safety concerns.", "deficiency_severity_source_text": "Study ZP1848-15073 used wet weight of ostomy output/diarrhea and urinary output as pharmacodynamic (PD) markers of change in absorptive capacity. The results showed inconsistent dose response", "drug_type_multiplier_source_text": "treatment of short bowel syndrome (SBS), a serious disease with an unmet medical need", "facility_inspection_source_text": "FDA inspection of one clinical investigator site identified several concerning observations, including numerous unreported adverse events in 6 out of 9 enrolled subjects", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Zhejiang Novus Pharma Co Ltd", "ps_summary": "The vancomycin hydrochloride injection application was not approved due to missing or unvalidated analytical test methods for drug substance quality control. The applicant must develop and validate appropriate analytical methods according to FDA/ICH standards to ensure product quality and safety in the manufacturing process.", "deficiency_severity_source_text": "[REDACTED] Product quality deficiency regarding missing or unvalidated analytical test methods", "drug_type_multiplier_source_text": "Vancomycin Hydrochloride for Injection", "facility_inspection_source_text": "no facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Hospira Inc", "ps_summary": "The diazepam injection application was rejected due to product quality and analytical testing deficiencies. The applicant must address unspecified product quality issues and validate all analytical methods to ensure the safety and efficacy of the injectable formulation.", "deficiency_severity_source_text": "[REDACTED] Product quality deficiency regarding missing or unvalidated analytical test methods", "drug_type_multiplier_source_text": "Diazepam Injection", "facility_inspection_source_text": "no facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Bioprojet Pharma", "ps_summary": "The pitolisant application for cataplexy was rejected due to insufficient clinical evidence from an inadequate post-hoc analysis lacking prospective Type-I error control and questionable study design. The applicant must conduct a new randomized, double-blind, placebo-controlled trial enrolling a meaningful fraction of U.S. patients to establish substantial evidence of effectiveness for the cataplexy indication.", "deficiency_severity_source_text": "The subgroup of interest was defined post hoc based on event(s) that occurred post-randomization, which violates the randomization principle", "drug_type_multiplier_source_text": "Wakix (pitolisant) tablets for treatment of cataplexy in adult patients with narcolepsy", "facility_inspection_source_text": "no facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Evofem Inc", "ps_summary": "The Amphora vaginal gel application was rejected due to insufficient efficacy data failing to meet prespecified non-inferiority criteria and unresolved facility inspection deficiencies. The applicant must conduct a new non-inferiority trial comparing Amphora to a nonoxynol-9 reference with primarily U.S. data and resolve all manufacturing facility deficiencies.", "deficiency_severity_source_text": "you have not provided sufficient evidence of efficacy for Amphora gel for the prevention of pregnancy, as this analysis failed to meet your prespecified non-inferiority criterion", "drug_type_multiplier_source_text": "Amphora (lactic acid 1.76 %, citric acid 1%, and potassium bitartrate 0.4%) vaginal gel", "facility_inspection_source_text": "During a recent inspection of the manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Jiangsu Hengrui Pharma Co Ltd", "ps_summary": "The camrelizumab BLA was not approved due to unresolved facility inspection deficiencies identified during re-inspection of the manufacturing facility. The applicant must obtain satisfactory facility responses to all FDA 483 deficiencies and coordinate re-inspection to ensure manufacturing compliance before resubmission.", "deficiency_severity_source_text": "FDA conveyed deficiencies to the representative of the facility. The facility should provide satisfactory responses to these deficiencies to the FDA office indicated on the FDA 483 prior to your complete response", "drug_type_multiplier_source_text": "camrelizumab for oncology indication", "facility_inspection_source_text": "Following the re-inspection of the facility listed in this application, FDA conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Mylan Pharma Inc", "ps_summary": "The NDA for acetaminophen injection contains critical safety deficiencies including unacceptable drug substance impurities with clastogenic and mutagenic potential, inadequate characterization of container leachables exceeding toxicological concern thresholds, and facility inspection deficiencies. The applicant must conduct qualification studies for the impurities, identify and characterize leachables with toxicological risk assessment, resolve facility deficiencies, and submit updated labeling before approval can be considered.", "deficiency_severity_source_text": "drug substance impurity reported to be clastogenic", "drug_type_multiplier_source_text": "acetaminophen for injection", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory inspection reports for all facilities must be received before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Adello Biologics LLC", "ps_summary": "The BLA for Theragrastim (filgrastim-ayow) biosimilar contains substantial product quality deficiencies including inadequate analytical similarity data for charge variants and impurities compared to US-licensed Neupogen, unqualified reference standards, and insufficient characterization of product-related species. The applicant must conduct comparative analyses, implement adequately qualified in-house reference standards, resolve facility inspection deficiencies, and provide comprehensive stability and microbial control data before approval.", "deficiency_severity_source_text": "The qualification of your current Theragrastim in-house primary reference standard Lot is inadequate because its potency and protein concentration were not accurately assigned", "drug_type_multiplier_source_text": "filgrastim for granulocyte colony-stimulating factor indication", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "InnoPharma Licensing LLC", "ps_summary": "The acetaminophen injection NDA lacks adequate nonclinical safety justification for the proposed formulation with missing local toxicity NOAEL and absent saline control. The applicant must conduct a repeat 14-day intravenous rat local tolerance study with appropriate controls and active comparator arms, resolve facility inspection deficiencies, and address patent certification requirements.", "deficiency_severity_source_text": "submitted 28-day intravenous rat repeat-dose toxicology study did not establish a NOAEL with respect to local toxicity and the lacked a saline control arm", "drug_type_multiplier_source_text": "Acetaminophen Injection", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "LEO Pharma A/S", "ps_summary": "The tralokinumab injection BLA contains critical product quality deficiencies related to inadequate needle safety device testing on the final finished combination product. The applicant must provide testing demonstrating 95%/99% confidence and reliability for needle safety activation and lockout after aging, drop testing, and simulated shipping to prevent accidental needle stick injuries.", "deficiency_severity_source_text": "testing did not include testing of your final finished combination product or testing after the requested representative preconditioning", "drug_type_multiplier_source_text": "injection, 150 mg/ML", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in this section of the letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "3M Health Care (Infection Prevention Division)", "ps_summary": "The SoluPrep NDA contains multiple critical deficiencies including failure to demonstrate replicative efficacy in the inguinal site clinical study, excessive related impurities exceeding ICH limits with accumulation throughout shelf-life, and inadequate container closure integrity testing with low defect detection rates. The applicant must conduct a repeat inguinal efficacy study, provide qualification studies for degradants, implement validated container closure integrity testing, and resolve facility quality control deficiencies.", "deficiency_severity_source_text": "exceed ICH Q3B (R2) limits (i.e., <1%)", "drug_type_multiplier_source_text": "2% chlorhexidine gluconate and 70% isopropyl alcohol film-forming solution", "facility_inspection_source_text": "product/process controls, lab controls, and QA functions for the facility were found unacceptable for this NDA. Our field investigator observed issues at the facility and conveyed that information to the representative of the facility", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Regeneron Pharma Inc", "ps_summary": "The odronextamab BLA contains facility compliance deficiencies identified during CGMP inspection requiring satisfactory responses and potential re-inspection, along with labeling and medication guide requirements. The applicant must coordinate with the manufacturing facility to resolve CGMP deficiencies, provide updated prescribing information and medication guide, and ensure facility readiness for pre-license inspection before application approval.", "deficiency_severity_source_text": "Following a CGMP inspection deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "oncology indication for odronextamab", "facility_inspection_source_text": "Following a CGMP inspection deficiencies conveyed to the representative of the facility. The facility should provide satisfactory responses to these deficiencies. Following resolution of the CGMP inspection, FDA may need to conduct a pre-license inspection (PLI)", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "ViiV Healthcare Co", "ps_summary": "The VOCABRIA tablet NDA cannot be approved independently due to contingent approval requirements on the CABENUVA co-pack formulation. The applicant must address product quality deficiencies in the CABENUVA NDA, provide updated prescribing information and carton labeling, resubmit the proprietary name, and submit comprehensive safety updates before approval consideration.", "deficiency_severity_source_text": "approval of the VOCABRIA (cabotegravir) NDA is contingent on the approval of the CABENUVA NDA", "drug_type_multiplier_source_text": "cabotegravir for HIV anti-infective indication", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Rosemont Pharma Holdings Inc", "ps_summary": "The valacyclovir oral suspension NDA cannot be approved due to unresolved CGMP inspection deficiencies at the manufacturing facility requiring satisfactory corrective responses and potential re-inspection. The applicant must coordinate with the facility to address compliance deficiencies, provide dated FDA Form 483 responses, and ensure pre-approval inspection readiness before proceeding.", "deficiency_severity_source_text": "Following a CGMP inspection of facility, FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "valacyclovir for oral suspension", "facility_inspection_source_text": "Following a CGMP inspection deficiencies to the representative of the facility. The facility should provide satisfactory responses requiring re-inspection", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Cipla USA Inc", "ps_summary": "The NDA contains redacted product quality deficiencies that must be addressed before approval consideration. The applicant should provide complete responses addressing all quality specifications and analytical method requirements, submit updated prescribing information and carton labeling per regulatory guidance, and ensure compliance with all outstanding deficiencies identified during review.", "deficiency_severity_source_text": "PRODUCT QUALITY section contains [REDACTED] deficiency details", "drug_type_multiplier_source_text": "oral formulation", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Bausch Health Ireland Ltd", "ps_summary": "The manufacturer failed to demonstrate compliance with current good manufacturing practice (cGMP) regulations during a facility inspection, with objectionable conditions observed that must be resolved before approval. The applicant must address facility deficiencies and provide a comprehensive safety update including all nonclinical and clinical study data to support the fluorescein sodium and benoxinate hydrochloride ophthalmic solution application.", "deficiency_severity_source_text": "objectionable conditions at the facility and conveyed that information to the representative of the facility", "drug_type_multiplier_source_text": "ophthalmic solution", "facility_inspection_source_text": "During a recent inspection of [REDACTED] manufacturing facility, our field investigator observed objectionable conditions at the facility and conveyed that information to the representative of the facility at the close of the inspection. Satisfactory resolution of the observations is required before this NDA may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Fresenius Kabi USA LLC", "ps_summary": "The application lacks adequate nonclinical safety data to support approval of the lipid emulsion product. The applicant must submit comprehensive nonclinical studies, address missing analytical test methods, and provide updated safety data from all clinical studies to demonstrate product safety and efficacy.", "deficiency_severity_source_text": "Nonclinical section redacted in document", "drug_type_multiplier_source_text": "emulsion (injectable formulation)", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Shilpa Medicare Ltd", "ps_summary": "The bortezomib injection application has multiple product quality deficiencies including missing analytical test methods and leachable studies that must be resolved. Facility inspection deficiencies were conveyed and require satisfactory resolution, along with updated stability data and comprehensive safety updates, before approval can be granted.", "deficiency_severity_source_text": "Perform a risk assessment analysis for [REDACTED] in the drug product. If risks of [REDACTED] are identified, conduct confirmatory testing as needed, using sensitive and appropriately validated methods", "drug_type_multiplier_source_text": "bortezomib injection", "facility_inspection_source_text": "Following surveillance inspection of the [REDACTED] manufacturing facility listed in this application, FDA conveyed deficiencies to the representative of the facility. Satisfactory resolution of the observations is required before this NDA may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Aldeyra Therapeutics Inc", "ps_summary": "The Reproxalap ophthalmic solution application failed to demonstrate efficacy with multiple failed clinical trials showing inconsistent results that raise serious concerns about product reliability. The applicant must conduct additional adequate and well-controlled studies to identify effective patient populations or conditions and provide comprehensive safety updates before resubmission.", "deficiency_severity_source_text": "lack of substantial evidence consisting of adequate and well-controlled investigations...multiple failed trials", "drug_type_multiplier_source_text": "Ophthalmic Solution for dry eye disease", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "CELLTRION Inc", "ps_summary": "Multiple manufacturing facilities demonstrated significant cGMP compliance deficiencies during inspections that must be resolved before application approval. The applicant must obtain satisfactory facility responses to FDA Form 483 observations, coordinate facility corrective actions, and provide updated safety data including potential immunogenicity concerns for the biosimilar product.", "deficiency_severity_source_text": "FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "biosimilar product for life-threatening indication", "facility_inspection_source_text": "Following a CGMP inspection and a pre-license inspection (PLI) of [REDACTED] listed in this submission, FDA conveyed deficiencies to the representative of the facility. The facility should provide satisfactory responses to these deficiencies to the FDA office indicated on the FDA 483 prior to your complete response to your application", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Valeant Pharma Ireland", "ps_summary": "The tetracaine hydrochloride ophthalmic solution application cannot be approved due to significant facility manufacturing deficiencies that violate cGMP regulations. The manufacturer must achieve full compliance with cGMP requirements and provide updated labeling and comprehensive safety data before resubmission and approval.", "deficiency_severity_source_text": "objectionable conditions at the facility", "drug_type_multiplier_source_text": "ophthalmic solution", "facility_inspection_source_text": "During a recent inspection of the Bausch & Lomb Inc. (FEI 1000113778) manufacturing facility for this application, our field investigators conveyed observations to the representative of the facility. These observations were not consistent with current good manufacturing practice regulations", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "AVEO Pharma Inc", "ps_summary": "The tivozanib application demonstrates a critical safety concern with a potential 25% increase in overall mortality that makes the application unacceptable despite positive progression-free survival results. The applicant must conduct additional adequate and well-controlled clinical trials powered to detect both efficacy and ensure no adverse effects on overall survival before resubmission.", "deficiency_severity_source_text": "potential 25% decrease in overall survival (OS)...This potential increase in the risk of death is not acceptable", "drug_type_multiplier_source_text": "tivozanib for advanced renal cell carcinoma", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Orphan Therapeutics LLC", "ps_summary": "The terlipressin injection application has critical safety deficiencies including insufficient efficacy evidence and serious adverse events occurring more frequently in treated subjects compared to controls. Manufacturing facility deficiencies were identified requiring resolution, and the applicant must conduct additional well-controlled studies with adequate safety monitoring and complete product quality specifications before resubmission.", "deficiency_severity_source_text": "many important serious adverse events tended to occur more frequently, or earlier (i.e., death), in terlipressin-treated subjects, compared to subjects in the respective control groups", "drug_type_multiplier_source_text": "terlipressin injection", "facility_inspection_source_text": "During a recent inspection of the [REDACTED] and [REDACTED] manufacturing facilities for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Tanvex BioPharma USA Inc", "ps_summary": "The TX01 biosimilar application cannot be approved due to significant facility manufacturing deficiencies that must be satisfactorily resolved before approval. The applicant must address facility inspection findings, conduct manufacturing process impact studies as recommended, and provide comprehensive safety data including immunogenicity and updated clinical information from the biosimilar studies.", "deficiency_severity_source_text": "FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "biosimilar biological product", "facility_inspection_source_text": "During a recent inspection of the [REDACTED] manufacturing facility for this BLA, our field investigators conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "IntelGenx Corp", "ps_summary": "The RizaFilm (rizatriptan) oral film application has critical manufacturing and analytical deficiencies preventing approval, including objectionable facility conditions and inability to validate product shelf life from existing stability data. The applicant must manufacture new compliant batches, conduct validated stability testing, resolve facility deficiencies, and address multiple carton and container labeling formatting issues to ensure medication safety.", "deficiency_severity_source_text": "stability data obtained from testing of the existing exhibit batches cannot be used as primary data for establishment of product shelf life", "drug_type_multiplier_source_text": "oral film", "facility_inspection_source_text": "During a recent inspection of the [REDACTED] drug substance manufacturing facility for this NDA, our field investigator observed objectionable conditions at the facility and conveyed that information to the representative of the facility at the close of the inspection. Satisfactory resolution of the observations is required before this NDA may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Outlook Therapeutics Inc", "ps_summary": "The applicant failed to demonstrate substantial evidence of bevacizumab-vikg effectiveness for wet-AMD treatment, as one clinical trial met primary endpoints while another did not meet non-inferiority margins. Applicants must conduct additional confirmatory efficacy studies and provide comprehensive safety updates incorporating new nonclinical and clinical data before resubmission.", "deficiency_severity_source_text": "lack of substantial evidence consisting of adequate and well-controlled investigations", "drug_type_multiplier_source_text": "wet-AMD indication is a serious ocular condition requiring treatment", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "CLASS 2 RESUBMISSION", "ps_summary": "The manufacturing facility for Romidepsin Injection failed a CGMP inspection with deficiencies that must be resolved before approval. The applicant must address facility deficiencies and ensure satisfactory resolution is documented with FDA before resubmission for this injectable oncology product.", "deficiency_severity_source_text": "our field investigator conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "Romidepsin Injection solution is administered intravenously", "facility_inspection_source_text": "Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Accord Healthcare Inc", "ps_summary": "Two CGMP inspections of paclitaxel drug product and substance manufacturing facilities identified deficiencies requiring resolution before approval. The applicant must coordinate facility responses to FDA Form 483 deficiencies and undergo successful post-approval inspections to ensure manufacturing compliance for this injectable cancer treatment.", "deficiency_severity_source_text": "the FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "paclitaxel protein-bound particles for injectable suspension", "facility_inspection_source_text": "Satisfactory outcomes of both the PAI and the CGMP surveillance inspections will be needed prior to an approval", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Pierre Fabre Pharma Inc", "ps_summary": "Tabelecleucell failed to demonstrate substantial evidence of effectiveness due to critical methodological flaws including unplanned efficacy analyses, high attrition rates, selection bias, and inadequate control populations. The applicant must redesign clinical studies with appropriate controls and address efficacy data interpretability issues before resubmission.", "deficiency_severity_source_text": "the single arm trial (ALLELE study) is not an adequate and well-controlled study due to deficiencies in study design, conduct and analysis", "drug_type_multiplier_source_text": "relapsed or refractory EBV+ PTLD is a serious life-threatening condition in immunocompromised patients", "facility_inspection_source_text": "inspectional issues at this facility have been adequately addressed", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Biogen Inc", "ps_summary": "The supplemental NDA for Spinraza proposing higher dosing regimens and pediatric labeling updates requires revised prescribing information and labeling corrections. The applicant must provide compliant draft labeling in SPL format and address formatting deficiencies to facilitate review.", "deficiency_severity_source_text": "Submit draft labeling that is responsive to our electronic communication", "drug_type_multiplier_source_text": "Spinraza treats spinal muscular atrophy, a serious neurological condition", "facility_inspection_source_text": "No inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Proximagen LLC", "ps_summary": "The UCB manufacturing facility inspection identified quality system deficiencies in management responsibility, design controls, and purchasing controls for this combination product that must be resolved. The applicant must provide comprehensive quality system documentation demonstrating facility compliance with CGMP requirements before approval can be granted.", "deficiency_severity_source_text": "our field investigator conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "Nayzilam midazolam nasal spray is a non-injectable sedative", "facility_inspection_source_text": "Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Biohaven Therapeutics Ltd", "ps_summary": "Troriluzole failed to demonstrate substantial evidence of effectiveness for spinocerebellar ataxia due to multiple critical methodological flaws in the externally controlled study including residual biases, missing data, timing discrepancies, and lack of pre-specification. The applicant must provide data from an adequate and well-controlled study with clinically meaningful endpoints before resubmission.", "deficiency_severity_source_text": "Study 206-RWE cannot be considered an adequate and well-controlled investigation due to design flaws and fundamental methodological limitations", "drug_type_multiplier_source_text": "spinocerebellar ataxia is a rare serious neurological condition", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Tanvex BioPharma USA Inc", "ps_summary": "The biosimilar application for TX01 (filgrastim) contains unreliable comparative analytical data due to facility inspection findings including unqualified assays, data documentation issues, and undocumented method changes that undermine the demonstration of biosimilarity. The applicant must conduct a comprehensive independent audit of all comparative analytical data and resolve facility deficiencies before resubmission.", "deficiency_severity_source_text": "issues were raised regarding data analysis and management, and the suitability of the comparative analytical assays", "drug_type_multiplier_source_text": "TX01 is a granulocyte colony-stimulating factor administered via injection", "facility_inspection_source_text": "our field investigators conveyed deficiencies to the representatives of the facility", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Accord Healthcare Inc", "ps_summary": "Three manufacturing facilities for bendamustine hydrochloride injection failed CGMP inspections with deficiencies requiring satisfactory resolution and re-inspection before approval. The applicant must coordinate facility responses to FDA 483 deficiencies and document successful compliance verification before resubmission.", "deficiency_severity_source_text": "FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "bendamustine hydrochloride injection is administered intravenously for cancer treatment", "facility_inspection_source_text": "Satisfactory outcomes of both the PAI/PLI and the CGMP surveillance inspections will be needed prior to an approval", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Alvotech USA Inc", "ps_summary": "The Alvotech manufacturing facility in Iceland identified deficiencies during inspection that must be satisfactorily resolved before AVTO2 biosimilar approval. The applicant must address facility compliance issues and ensure corrective actions are documented before resubmission of this bevacizumab biosimilar for oncology indications.", "deficiency_severity_source_text": "the FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "AVTO2 is a biosimilar to Avastin used for treating serious oncologic conditions", "facility_inspection_source_text": "Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Mylan GmbH", "ps_summary": "The insulin glargine injection application failed to provide adequate bridging data for manufacturing process changes from Process V to Process VI, critical safety concerns regarding facility deficiencies, and missing analytical method validation data. The applicant must conduct additional clinical studies demonstrating safety and efficacy of the to-be-marketed product, resolve all facility inspection deficiencies, and provide comprehensive method suitability data for endotoxin, sterility, and antimicrobial effectiveness testing.", "deficiency_severity_source_text": "additional clinical safety and efficacy bridging data, including an assessment of immunogenicity, are needed", "drug_type_multiplier_source_text": "insulin glargine injection 100 units/mL", "facility_inspection_source_text": "objectionable conditions at the facility and conveyed that information to the representative of the facility at the close of the inspection. Satisfactory resolution of the observations is required", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Bayer HealthCare LLC", "ps_summary": "The naproxen sodium capsule application lacks adequate nonclinical data to support safety claims and has unresolved facility inspection deficiencies that adversely impact manufacturing capability. The applicant must provide comprehensive nonclinical safety data and ensure the manufacturing facility provides satisfactory responses to all FDA Form 483 observations prior to resubmission.", "deficiency_severity_source_text": "You have not provided adequate nonclinical data to su[pport]", "drug_type_multiplier_source_text": "Naproxen sodium capsule (oral/topical/standard)", "facility_inspection_source_text": "FDA conveyed deficiencies to [the] representative of the facility. FDA conducted an expedited, risk-based review of the available information from the inspection and determined that the deficiencies represent significant issues that adversely impact the facility's ability to perform the designated functions", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Disc Medicine Inc", "ps_summary": "The bitopertin application relies on a surrogate endpoint (PPIX reduction) with uncertain clinical relevance, as clinical trial data failed to demonstrate correlation between PPIX reduction and clinical outcomes. The applicant must conduct adequate clinical endpoint-driven trials demonstrating actual clinical benefit of bitopertin in patients with the proposed indication before approval can be granted.", "deficiency_severity_source_text": "The percent change in PPIX was relatively modest (about 40% reduction from baseline to Day 121 for the higher 60 mg dose) and whether that magnitude of change in whole blood metal-free PPIX is reasonably likely to predict clinical benefit is unknown", "drug_type_multiplier_source_text": "bitopertin oral tablets (oral/topical/standard)", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Ultragenyx Pharma Inc", "ps_summary": "Three separate pre-license inspections of Ultragenyx manufacturing facilities identified systemic GMP failures that the applicant has inadequately addressed through cursory corrective actions. The applicant must conduct comprehensive facility remediation addressing root causes of systemic manufacturing deficiencies and demonstrate sustained compliance through successful follow-up inspections before approval consideration.", "deficiency_severity_source_text": "CBER conducted a pre-license inspection (PLI) of Ultragenyx Pharmaceutical Inc. in [REDACTED], and issued a Form FDA 483, List of Inspectional Observations. CBER has reviewed your responses to the Form FDA 483 received through [REDACTED], which do not sufficiently address the deficiencies noted during the inspection. Your corrective actions do not appear to be comprehensive enough to address the systemic issues observed during the inspection", "drug_type_multiplier_source_text": "rebisufligene etisparvovec for [REDACTED] indication (life-threatening/genetic disorder)", "facility_inspection_source_text": "Your corrective actions do not appear to be comprehensive enough to address the systemic issues observed during the inspection. Additionally, your represented corrections may require additional review and verification during a follow-up inspection and therefore remain unresolved. Pursuant to 21 CFR 601.20(a) and (d)", "outcome_severity_source_text": "we cannot grant final approval because of the deficiencies outlined below"}, {"company_name": "Pharmaxis Ltd", "ps_summary": "The mannitol inhalation powder application demonstrates unfavorable safety-efficacy balance with high hemoptysis rates in pediatric patients and inadequate efficacy from pivotal trials. The applicant must conduct new clinical trials with lower doses, more conservative tolerance testing criteria, resolve all facility CGMP deficiencies, and demonstrate adequate safety margins in pediatric populations before resubmission.", "deficiency_severity_source_text": "subjects treated with mannitol 400 mg had a high occurrence of hemoptysis, particularly in pediatric patients, which is concerning and does not balance favorably with the submitted efficacy data, especially in the pediatric population", "drug_type_multiplier_source_text": "inhaled mannitol inhalation powder (oral/topical/standard)", "facility_inspection_source_text": "During an inspection on [REDACTED] of the [REDACTED] packaging and labeling facility for this application, our field investigator conveyed current Good Manufacturing Practices (CGMP) deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Sentynl Therapeutics Inc", "ps_summary": "The copper histidinate application cannot proceed without resolving significant CGMP deficiencies at the manufacturing facility. The applicant must coordinate with the facility to obtain satisfactory FDA Form 483 responses, potentially undergo re-inspection, and successfully complete a pre-approval inspection before the application can be approved.", "deficiency_severity_source_text": "Following a CGMP inspection of [REDACTED] listed in this application, FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "copper histidinate (oral/topical/standard)", "facility_inspection_source_text": "The facility should provide satisfactory responses to these deficiencies to the FDA office indicated on the FDA 483 prior to your complete response. The facility's satisfactory responses are dependent on FDA's determination that the facility has come into compliance with CGMP and may require re-inspection of the facility", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Dr Reddy\u2019s Labs Ltd-", "ps_summary": "The bortezomib injection application contains critical deficiencies in the referenced Drug Master File regarding drug substance identity and drug product composition that must be resolved. The applicant must obtain DMF amendments addressing all deficiencies and either provide bioequivalence data for the IV route or submit a justified biowaiver request supported by adequate identity data.", "deficiency_severity_source_text": "Your application referenced the Drug Master File (DMF) 23996. This DMF was found inadequate to support your submission and a deficiency letter was sent to the DMF holder on December 4, 2014. These deficiencies must be adequately addressed before this application can be approved", "drug_type_multiplier_source_text": "bortezomib for injection intravenous (IV route)", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve these application(s) in their present form"}, {"company_name": "Laurus Generics Inc", "ps_summary": "The darunavir and ritonavir tablet application contains critical product quality deficiencies related to stability testing methodology. The applicant must provide comprehensive stability data addressing in-use stability concerns and ensure compliance with all product quality specifications before resubmission.", "deficiency_severity_source_text": "[REDACTED] in the-use stabili[ty]", "drug_type_multiplier_source_text": "Darunavir and Ritonavir Tablets for [REDACTED] indication (antiretroviral/life-threatening)", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot tentatively approve this application in its present form"}, {"company_name": "Mylan Labs Ltd", "ps_summary": "The acetaminophen injection application has unacceptable elemental impurities and extractables from container materials that exceed toxicological concern thresholds. The applicant must identify all unknown extractables, conduct toxicological risk assessments for all leachables exceeding safety thresholds, and provide comprehensive safety justification for the final drug product before approval.", "deficiency_severity_source_text": "as much as approximately [REDACTED] (mcg/day) of unknown material could be present [REDACTED] This exceeds the threshold of toxicological concern of [REDACTED]ng/day and, therefore, requires adequate safety justification based on a toxicological risk assessment for the identified materials", "drug_type_multiplier_source_text": "Acetaminophen for Injection (IV route)", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "International Medication Systems Ltd", "ps_summary": "The epinephrine injection application contains suboptimal formulation deficiencies and inadequate drug product stability data that do not meet ICH Q8 pharmaceutical development standards. The applicant must provide batch analysis data and long-term/accelerated stability data using the proposed commercial manufacturing process and ensure proper patent certifications are submitted.", "deficiency_severity_source_text": "Your proposal [REDACTED] which suggests a suboptimal formulation [REDACTED] is unacceptable as per ICH Guidance for Industry - Q8 (R2) Pharmaceutical Development (2009)", "drug_type_multiplier_source_text": "Epinephrine Injection USP (IM/IV/SC route)", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Genzyme Corp", "ps_summary": "The application was rejected due to substantial safety concerns regarding severe drug-induced liver injury with tolebrutinib, identified in clinical trials at rates comparable to drugs withdrawn from market. The applicant must conduct additional safety analyses and design studies to identify patient populations where benefits would outweigh the serious hepatotoxicity risk, and revise the REMS strategy to adequately mitigate DILI risk.", "deficiency_severity_source_text": "serious risk of severe drug-induced liver injury (DILI), which was identified during the conduct of your clinical trials, cannot be adequately mitigated", "drug_type_multiplier_source_text": "multiple sclerosis (MS)", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Chiesi USA", "ps_summary": "The BLA was rejected due to unresolved manufacturing facility deficiencies and questions about accelerated approval appropriateness given availability of competing therapy (Fabrazyme). The applicant must resolve outstanding facility issues and demonstrate either therapeutic advantage over available therapy or establish that Gb3 reduction predicts clinical benefit to support approval.", "deficiency_severity_source_text": "issues with the manufacturing facility named in your application", "drug_type_multiplier_source_text": "Fabry disease enzyme replacement therapy", "facility_inspection_source_text": "Satisfactory resolution of the remaining issues is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Aquestive Therapeutics Inc", "ps_summary": "Critical use errors identified in human factors validation study pose serious safety risks including inability to administer doses, incorrect placement, and premature removal due to tolerability issues. The applicant must redesign container closure, revise user interface and labeling, conduct another validated human factors study with matching placebo formulation, and evaluate pharmacokinetics under various error conditions.", "deficiency_severity_source_text": "Participants demonstrated difficulty opening the pouch, were unable to open the pouch, or tore the film while opening the pouch. Resulting delays in dose administration, inability to administer a dose, or underdosing raises significant safety concerns in the setting of anaphylaxis.", "drug_type_multiplier_source_text": "dibutepinephrine sublingual film for anaphylaxis", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Capricor Inc", "ps_summary": "The application lacks substantial evidence of effectiveness as the primary study failed its endpoints and post-hoc analyses of exploratory cardiac endpoints cannot substitute for adequate pre-specified efficacy studies. The applicant must conduct new randomized controlled trials specifically designed to evaluate cardiac outcomes in DMD cardiomyopathy patients.", "deficiency_severity_source_text": "HOPE-2 study failed to demonstrate efficacy for its prespecified primary efficacy endpoint", "drug_type_multiplier_source_text": "Duchenne muscular dystrophy (DMD) cardiomyopathy treatment", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot grant final approval because of the deficiencies outlined below"}, {"company_name": "Sun Pharma Global FZE", "ps_summary": "The application failed bioequivalence in fed state conditions with substantial differences in plasma concentration-time profiles compared to the reference product, raising safety and efficacy concerns. The applicant must conduct in vivo studies demonstrating similar pharmacokinetic profiles in fed state and addressing alcohol interaction potential through either reformulation or clinical studies.", "deficiency_severity_source_text": "a substantial percent of patients have plasma concentration-time curves that differ significantly between your product and Keppra XR", "drug_type_multiplier_source_text": "levetiracetam extended-release tablet for epilepsy", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Recro Pharma Inc", "ps_summary": "The IV meloxicam injection demonstrated inadequate onset of action (2-3 hours) and end-of-dose failure inappropriate for acute pain management, and proposed higher-dose labeling lacks adequate safety data to support increased exposures. The applicant must provide long-term safety data and adequately characterize exposure-response relationships to support proposed dosing changes.", "deficiency_severity_source_text": "Meloxicam Injection has an onset of action in the range of 2 to 3 hours (possibly longer if patients receiving early rescue had been excluded from this analysis). The delayed onset fails to adequately meet prescriber expectations for intravenous (IV) drugs.", "drug_type_multiplier_source_text": "intravenous (IV) drugs", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "AFT Pharma Inc", "ps_summary": "The application cannot be approved until a required manufacturing facility inspection is conducted and any deficiencies are assessed for CGMP compliance. Once travel restrictions are lifted, the FDA must complete the facility inspection to evaluate manufacturing capability before approval can be granted.", "deficiency_severity_source_text": "An inspection of the facility is required before this application can be approved as the FDA must assess the ability of that facility to conduct the listed manufacturing operations in compliance with CGMP", "drug_type_multiplier_source_text": "acetaminophen and ibuprofen combination tablets", "facility_inspection_source_text": "An inspection of the facility is required before this application can be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Impax Labs LLC", "ps_summary": "The application failed to establish an adequate scientific bridge for carbidopa safety exposure between Crexont and reference products, with substantially higher carbidopa levels in Crexont. The applicant must provide long-term safety data from 100 patients at the highest doses for 12 months and conduct a thorough QT study to assess cardiac safety.", "deficiency_severity_source_text": "the safety information from your Clinical trials must be adequate to support the safety of chronic exposure to the higher levels of carbidopa that patients would receive with Crexont compared with these two listed drugs", "drug_type_multiplier_source_text": "carbidopa and levodopa extended release for Parkinson's disease", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "InnoPharma Licensing LLC", "ps_summary": "The application lacks adequate elemental impurity safety data and has unresolved manufacturing facility deficiencies. The applicant must submit a comprehensive risk assessment for elemental impurities per ICH Q3D guidance, resolve facility inspection findings, and provide proper patent certifications and patent owner consent statements.", "deficiency_severity_source_text": "You have not provided adequate nonclinical data to support the safety of elemental impurities in your drug formulation", "drug_type_multiplier_source_text": "acetaminophen injection for pain management", "facility_inspection_source_text": "During a recent inspection of the manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Nobelpharma Co Ltd", "ps_summary": "The application has unresolved manufacturing process and specifications deficiencies requiring establishment of validated set points/ranges for all manufacturing parameters, plus a required facility inspection. The applicant must revise manufacturing parameters with supporting data, update the master batch record, and await completion of FDA facility inspection before approval can be granted.", "deficiency_severity_source_text": "if the API assay for a batch of sirolimus falls outside of the specification, it fails to meet the drug substance specification and cannot be used in the manufacture of the commercial drug product", "drug_type_multiplier_source_text": "sirolimus topical gel for dermatologic use", "facility_inspection_source_text": "An inspection of the TOYO PHARMACEUTICAL CO. LTD. facility is required before this application can be approved. FDA must assess the ability of that facility to conduct the listed manufacturing operations in compliance with CGMP.", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "3M Health Care (Infection Prevention Division)", "ps_summary": "The applicant failed to provide adequate nonclinical qualification data for drug product impurities, specifically lacking sufficient tissue assessment and animal-to-human exposure margins for systemic toxicity. The applicant must conduct an extended dose animal study, provide maximal use trial data, or control impurity levels to an approved product comparator to demonstrate safe systemic exposure of proposed impurities.", "deficiency_severity_source_text": "Missing safety studies, nonclinical concerns, safety signal gaps - The dermal rabbit study does not include a sufficient tissue battery to assess systemic toxicity and doses administered do not appear to support proposed impurity specifications", "drug_type_multiplier_source_text": "topical solution (2% chlorhexidine gluconate and 70% isopropyl alcohol) for skin preparation", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE - we cannot approve this application in its present form"}, {"company_name": "CMP Development LLC", "ps_summary": "Manufacturing facility deficiencies and objectionable conditions identified during FDA inspection and records review must be satisfactorily resolved before application approval. The applicant should coordinate with the facility to promptly address all identified deficiencies and schedule a preapproval inspection to verify compliance with current good manufacturing practices.", "deficiency_severity_source_text": "Facility deficiencies conveyed to facility representative - FDA noted objectionable conditions during records review and deficiencies were conveyed during recent inspection", "drug_type_multiplier_source_text": "Oral suspension tadalafil - standard oral formulation with no additional risk multiplier", "facility_inspection_source_text": "Satisfactory resolution of objectionable conditions and inspection deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE - we cannot approve this application in its present form"}, {"company_name": "Hospira Inc", "ps_summary": "Bortezomib for Injection received tentative approval pending resolution of patent litigation and expiration of patent protection periods. The applicant should submit a request for final approval two to six months prior to patent expiration or upon favorable court determination, along with updated safety information and any changes to manufacturing or labeling.", "deficiency_severity_source_text": "Tentative approval letter with no deficiencies cited - administrative and patent-related review items only", "drug_type_multiplier_source_text": "Bortezomib for Injection for treatment of patients with multiple myeloma - oncology/anti-cancer life-threatening indication", "facility_inspection_source_text": "No inspection issues mentioned in letter", "outcome_severity_source_text": "TENTATIVELY APPROVED - This determination is based upon information available to the Agency at this time"}, {"company_name": "Liqmeds Worldwide Ltd", "ps_summary": "The applicant must develop and submit a comprehensive REMS program to mitigate serious risks of first trimester pregnancy loss and congenital malformations associated with mycophenolate mofetil exposure. The proposed REMS must include all elements specified in the FDA's June 22 and October 17, 2022 communications to ensure safe use of this immunosuppressant drug.", "deficiency_severity_source_text": "Risk evaluation and mitigation strategy (REMS) requirements necessary to ensure benefits outweigh risks of first trimester pregnancy loss and congenital malformations - missing safety mitigation strategy", "drug_type_multiplier_source_text": "Mycophenolate mofetil oral suspension - oral formulation without additional risk multiplier", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE - we cannot approve this application in its present form"}, {"company_name": "Sandoz Inc", "ps_summary": "Pre-license inspection of the manufacturing facility identified deficiencies that must be satisfactorily resolved before BLA approval. The applicant must coordinate with the facility to submit timely responses to all FDA Form 483 observations and may be subject to re-inspection to verify compliance with current good manufacturing practices.", "deficiency_severity_source_text": "Facility inspection deficiencies conveyed to the representative of the facility - pre-license inspection identified deficiencies that must be resolved", "drug_type_multiplier_source_text": "Biosimilar - intravenous biologic product for standard indication without additional risk multiplier", "facility_inspection_source_text": "Satisfactory responses to FDA Form 483 deficiencies required before application approval - The facility should provide satisfactory responses to these deficiencies to the FDA office indicated on the FDA 483", "outcome_severity_source_text": "COMPLETE RESPONSE - we cannot approve this application in its present form"}, {"company_name": "Bridge Regulatory Affairs LLC", "ps_summary": "The applicant must address manufacturing facility CGMP deficiencies and provide compliant prescribing information before approval can be granted. The facility must achieve compliance with CGMP requirements and may require both pre-approval and post-inspection assessments to verify resolution of identified manufacturing issues.", "deficiency_severity_source_text": "Prescribing information deficiency - Submit draft labeling responsive to electronic communication and correct formatting errors using SRPI checklist", "drug_type_multiplier_source_text": "Octreotide hydrochloride extended-release injection - injectable route (IM) applied to deficiency base deductions", "facility_inspection_source_text": "CGMP inspection identified deficiencies - Satisfactory responses from the facility are needed before this application can be approved", "outcome_severity_source_text": "COMPLETE RESPONSE - we cannot approve this application in its present form"}, {"company_name": "Therakind Ltd", "ps_summary": "Manufacturing facility objectionable conditions and product quality deficiencies including missing analytical test methods, inadequate stability data supporting the proposed 18-month expiration date, and lack of in-use stability data must be resolved. The applicant must conduct preapproval facility inspection, provide complete stability data, and implement all required analytical methods in the drug product specifications.", "deficiency_severity_source_text": "Product quality - missing test methods - Include the test for Deliverable Volume per USP <698> in the drug product specifications and provide in-use stability data", "drug_type_multiplier_source_text": "Methotrexate oral solution - oral formulation with standard risk profile", "facility_inspection_source_text": "Satisfactory resolution of objectionable conditions is required (e.g., preapproval inspection and/or adequate facility responses addressing these conditions) before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE - we cannot approve this application in its present form"}, {"company_name": "CELLTRION Inc", "ps_summary": "Manufacturing facility inspection deficiencies and critical product quality issues including incomplete fill volume control strategy, overly broad acceptance criteria for a potency-impacting critical quality attribute, and insufficient process validation must be resolved. The applicant must provide comprehensive fill weight/volume control data, tighten specifications for critical quality attributes, and demonstrate facility compliance before approval.", "deficiency_severity_source_text": "Product quality - missing test methods and specifications - Insufficient information on overfill volume derivation, fill weight control strategy, acceptance criteria for critical quality attributes that impact potency", "drug_type_multiplier_source_text": "CT-P6 (trastuzumab biosimilar) for treatment of multiple myeloma - oncology/anti-cancer life-threatening indication", "facility_inspection_source_text": "During a recent inspection of the Celltrion, Inc. manufacturing facility, the field investigator conveyed deficiencies to the representative of the facility - Satisfactory resolution of the deficiencies is required before this BLA may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE - we cannot approve this application in its present form"}, {"company_name": "Sarfez Pharma Inc", "ps_summary": "Manufacturing facility inspections identified objectionable conditions that must be satisfactorily resolved before NDA approval. The applicant should coordinate with the facility to promptly address all inspection observations and implement corrective measures to achieve compliance with current good manufacturing practices.", "deficiency_severity_source_text": "Facility inspection deficiencies - During a recent inspection our field investigator observed objectionable conditions at the facility and conveyed that information to the representative of the facility", "drug_type_multiplier_source_text": "Torsemide oral tablets (20 mg and 60 mg) - oral formulation with no additional risk multiplier", "facility_inspection_source_text": "During a recent inspection our field investigator observed objectionable conditions at the facility and conveyed that information to the representative of the facility - Satisfactory resolution of the observations is required before this NDA may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE - we cannot approve this application in its present form"}, {"company_name": "Regeneron Pharma Inc", "ps_summary": "Pre-license inspection of the manufacturing facility identified deficiencies demonstrating non-compliance with current good manufacturing practice regulations that must be satisfactorily resolved before BLA approval. The applicant must work with the facility to address all manufacturing and process control deficiencies and submit evidence of facility compliance verification.", "deficiency_severity_source_text": "The methods to be used in, and the facilities and controls used for, the manufacture, processing, packing, or holding of the drug substance or the drug product do not comply with the current good manufacturing practice regulations - FDA conveyed deficiencies to the representative of the drug product manufacturing facility", "drug_type_multiplier_source_text": "Aflibercept injection (Eylea HD) - intravenous injectable biologic for ophthalmology", "facility_inspection_source_text": "Satisfactory resolution of the observations is required before this BLA submission may be approved - FDA conveyed deficiencies following a pre-license inspection of the facility", "outcome_severity_source_text": "COMPLETE RESPONSE - we cannot approve this application in its present form"}, {"company_name": "Novitium Pharma LLC", "ps_summary": "The application lacks a
