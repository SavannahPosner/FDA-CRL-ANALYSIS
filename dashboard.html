ry resolution of facility inspection observations conveyed by field investigators.", "deficiency_severity_source_text": "our field investigators conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required", "drug_type_multiplier_source_text": "ophthalmic emulsion, topical route of administration", "facility_inspection_source_text": "Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Braeburn Inc", "ps_summary": "BRIXADI buprenorphine injectable has critical manufacturing deficiencies at two Pharmaceutics International facilities and unqualified leachables exceeding safety thresholds. The applicant must resolve facility inspection deficiencies, complete container closure system toxicology assessments, and conduct postmarketing studies for accelerated dosing initiation and elemental impurity safety.", "deficiency_severity_source_text": "our field investigator conveyed deficiencies to the representatives of each facility. Satisfactory resolution of these deficiencies is required", "drug_type_multiplier_source_text": "extended-release injection for subcutaneous use", "facility_inspection_source_text": "Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Amryt Pharma DAC", "ps_summary": "Filsuvez birch triterpenes gel lacks adequate clinical evidence of effectiveness for epidermolysis bullosa wounds. Study design limitations including inadequate secondary endpoints and lack of mechanism of action data undermine approval. The applicant must submit additional confirmatory clinical evidence or targeted studies in specific EB subpopulations.", "deficiency_severity_source_text": "The submitted data do not provide substantial evidence of effectiveness for the use of Filsuvez", "drug_type_multiplier_source_text": "topical gel product", "facility_inspection_source_text": "no facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Zydus Worldwide DMCC", "ps_summary": "Sitagliptin tablets for type 2 diabetes received tentative approval pending patent litigation resolution. No facility inspection or safety deficiencies were identified. Final approval is subject to expiration of patent protection and may proceed upon court decision regarding patent validity.", "deficiency_severity_source_text": "resubmission formatting, administrative corrections only", "drug_type_multiplier_source_text": "oral tablet, standard diabetes medication", "facility_inspection_source_text": "no facility inspection issues mentioned in letter", "outcome_severity_source_text": "It is tentatively approved"}, {"company_name": "Shandong Luye Pharma Co Ltd", "ps_summary": "Rykindo risperidone extended-release injectable has unexplained pharmacokinetic concentration spikes indicating potential dose-dumping safety concerns. The applicant's explanation that cocaine use explains the spikes is inadequate based on available data. Comprehensive pharmacokinetic data from all clinical trials and real-world use data must be submitted to rule out dose-dumping risk.", "deficiency_severity_source_text": "the potential for dose dumping cannot be ruled out based on your root-cause analysis", "drug_type_multiplier_source_text": "extended-release injectable suspension for intramuscular injection", "facility_inspection_source_text": "no facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Xellia Pharma ApS", "ps_summary": "Vancomycin injection lacks qualification of leachables from the stopper system, with inadequate toxicological assessment of identified leachables exceeding safety thresholds. The applicant must provide comprehensive nonclinical toxicity data and risk assessments for all leachables detected above 5 mcg/day to ensure product safety.", "deficiency_severity_source_text": "Qualify all applicable leachables for the proposed vancomycin drug product", "drug_type_multiplier_source_text": "Vancomycin Injection, intravenous anti-infective", "facility_inspection_source_text": "no facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Kala Pharma Inc", "ps_summary": "Eysuvis loteprednol etabonate ophthalmic suspension failed to demonstrate efficacy in two pivotal trials for dry eye disease symptoms. The lack of substantial evidence of superiority over vehicle control prevents approval. The applicant must submit data from at least one additional well-controlled clinical trial demonstrating efficacy for signs and symptoms of dry eye disease.", "deficiency_severity_source_text": "Study (Trial KPI-121-C-002) failed to demonstrate superiority of loteprednol etabonate ophthalmic suspension, 0.25% for its primary symptom endpoint", "drug_type_multiplier_source_text": "ophthalmic suspension, topical ocular route", "facility_inspection_source_text": "no facility inspection issues mentioned in letter", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "Mylan Pharma Inc a Viatris Co", "ps_summary": "Abacavir and lamivudine oral suspension has unresolved manufacturing deficiencies from surveillance inspection of Mylan Laboratories Limited Unit-8 facility in India. For this critical HIV treatment, the applicant must demonstrate complete resolution of facility observations and provide updated labeling before approval can be granted.", "deficiency_severity_source_text": "FDA conveyed deficiencies to the representatives of the facility. Satisfactory resolution of the observations is required", "drug_type_multiplier_source_text": "anti-infective antiretroviral (HIV treatment)", "facility_inspection_source_text": "Satisfactory resolution of the observations is required before this NDA may be approved", "outcome_severity_source_text": "we cannot approve this application in its present form"}, {"company_name": "lpsen BioPharma Inc", "ps_summary": "The applicant failed to establish adequate efficacy for palovarotene in preventing heterotopic ossification in FOP patients, with major concerns regarding post-hoc analyses, external control group acceptability, and inconsistent efficacy data between studies. The applicant must conduct additional clinical data analyses, comparative effectiveness studies, and address safety signals regarding increased flare-ups before resubmission.", "deficiency_severity_source_text": "You have not provided adequate support for the efficacy of palovarotene", "drug_type_multiplier_source_text": "treatment of pediatric and adult patients with fibrodysplasia ossificans progressiva (FOP)", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Agile Therapeutics Inc", "ps_summary": "The application failed to demonstrate adequate efficacy from the two submitted phase 3 studies, with substantial problems in study conduct including low completion rates and data collection issues. A new phase 3 trial is required, and the applicant is strongly encouraged to meet with FDA before resubmission to understand all deficiencies.", "deficiency_severity_source_text": "the two phase 3 studies submitted in your NDA failed to demonstrate acceptable evidence of efficacy", "drug_type_multiplier_source_text": "transdermal delivery system for levonorgestrel and ethinyl estradiol contraceptive", "facility_inspection_source_text": "No facility inspection deficiencies mentioned", "outcome_severity_source_text": "Acknowledge Incomplete Response"}, {"company_name": "Samsung Bioepis Co Ltd", "ps_summary": "Critical product quality deficiencies were identified including inadequately qualified reference standards, insufficient cell culture controls, and filling control strategy gaps that could result in product underfilling or overfilling. The applicant must requalify reference materials, implement enhanced controls for cell culture consistency, and revise filling specifications with real-time monitoring before approval.", "deficiency_severity_source_text": "the primary reference standard (PRS) was not appropriately qualified with respect to biological activity (i.e., TNF-\u03b1 binding activity and TNF-\u03b1 neutralization activity) and protein concentration", "drug_type_multiplier_source_text": "SB4 is a biosimilar to Enbrel, used for rheumatoid arthritis and other inflammatory conditions", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Sunovion Pharma Inc", "ps_summary": "The human factors validation study identified use errors and close calls on critical tasks, and the final market packaging was not evaluated in the study, raising concerns about patient ability to open packaging given motor impairments. Additionally, oropharyngeal adverse events occurred in over 25% of patients versus 4% on placebo, requiring comprehensive characterization and dermatologist review. The applicant must conduct a new human factors study with the final market packaging and provide detailed analysis of oropharyngeal adverse events.", "deficiency_severity_source_text": "human factors (HF) validation study does not provide sufficient evidence to demonstrate that the proposed product can be used safely and effectively by intended users", "drug_type_multiplier_source_text": "Kynmobi (apomorphine) for acute treatment of OFF episodes in Parkinson's disease", "facility_inspection_source_text": "No facility inspection issues mentioned in letter", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Gan & Lee Pharma", "ps_summary": "Pre-license inspection identified deficiencies that must be resolved before approval, and product quality issues remain under review. The applicant must work with the manufacturing facility to address the inspection findings and provide evidence of resolution prior to resubmission.", "deficiency_severity_source_text": "Following pre-license inspection of [facility], FDA conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "insulin lispro, a rapid-acting insulin for diabetes management", "facility_inspection_source_text": "FDA conveyed deficiencies to the representative of the facility", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Coherus BioSciences Inc", "ps_summary": "Critical viral safety deficiencies exist in the manufacturing control strategy, with inadequate virus testing for unprocessed bulks and shared equipment between US and non-US product lines creating cross-contamination risks. The applicant must implement comprehensive virus testing programs, replace multi-use materials, sterilize shared equipment, and exclude previously manufactured batches from US distribution until adequate controls are implemented.", "deficiency_severity_source_text": "no adventitious virus testing is performed for unprocessed bulks (UPBs) in the manufacturing process to produce toripalimab and other product(s) for non-US market. Those processes share common equipment and/or materials with toripalimab manufacturing for the US market", "drug_type_multiplier_source_text": "toripalimab is a PD-1 inhibitor for nasopharyngeal carcinoma, an oncology indication", "facility_inspection_source_text": "No facility inspection deficiencies explicitly mentioned in letter", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Phathom Pharma Inc", "ps_summary": "An unacceptable impurity was identified in the drug substance and tablets, with inadequate analytical methods to control its formation. The applicant must revise acceptance criteria, conduct root cause investigation, and provide long-term stability data for representative batches demonstrating control of the impurity before approval.", "deficiency_severity_source_text": "finding of [impurity] in the vonoprazan fumarate drug substance and vonoprazan tablets", "drug_type_multiplier_source_text": "vonoprazan is an oral potassium-competitive acid blocker for gastroesophageal reflux disease", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Heron Therapeutics Inc", "ps_summary": "Nonclinical safety data gaps exist regarding reproductive and developmental toxicity of excipients (triacetin and DMSO) when administered via the wound infiltration route, which differs from the oral route of referenced studies. The applicant must either provide systemic exposure data for excipients via the proposed route, conduct appropriate route-specific reproductive/developmental studies, reduce specifications to tested levels, or provide scientific justification that excipient levels do not contribute to local tissue toxicity.", "deficiency_severity_source_text": "You have not provided adequate data to support your request for a waiver of reproductive and developmental studies for triacetin", "drug_type_multiplier_source_text": "Zynrelef is a local infiltration anesthetic solution with bupivacaine and meloxicam (injectable)", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Evoke Pharma Inc", "ps_summary": "Critical quality deficiencies exist in the drug product specification and analytical methods, particularly for droplet size distribution, which inadequately control for observed pharmacokinetic variability and inconsistent drug delivery. The applicant must demonstrate robust analytical methods and acceptance criteria validated against commercial manufacturing batches, and investigate root causes for inconsistent delivery of metoclopramide.", "deficiency_severity_source_text": "Your proposed specification for the drug product is inadequate since insufficient evidence has been provided to ensure that the quality control and essential performance characteristics of the combination product do not contribute to the observed clinical variability and lack of efficacy", "drug_type_multiplier_source_text": "Gimoti is a nasal spray formulation of metoclopramide for gastroesophageal reflux", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Fennec Pharma Inc", "ps_summary": "A recent facility inspection identified deficiencies requiring resolution before approval, and clinical safety data shows increased incidence of Grade 3-4 hypophosphatemia and hyponatremia in sodium thiosulfate-treated patients. The applicant must resolve all facility inspection findings and provide detailed analysis of electrolyte abnormalities to determine if these adverse events should be included in product labeling.", "deficiency_severity_source_text": "During a recent inspection of [facility], our field investigators conveyed deficiencies to the representative of the facility", "drug_type_multiplier_source_text": "PEDMARK (sodium thiosulfate injection) is used for cisplatin-induced ototoxicity prevention in pediatric oncology patients", "facility_inspection_source_text": "During a recent inspection of [facility], our field investigators conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this NDA can be approved.", "outcome_severity_source_text": "Complete Response"}, {"company_name": "Innocoll Pharma", "ps_summary": "The applicant failed to adequately characterize systemic safety of bupivacaine exposures, with human pharmacokinetic data showing twice the AUC of the reference product and inadequate toxicology coverage. The application cannot be approved due to nonclinical safety data gaps, extractables/leachables evaluation deficiencies, and missing analytical methods. The applicant must conduct adequate toxicology studies in two species covering proposed human exposures and provide comprehensive extractables/leachables assessments with validated detection methods.", "deficiency_severity_source_text": "You have not provided an adequate characterization of the systemic safety of bupivacaine exposures via your drug product formulation", "drug_type_multiplier_source_text": "bupivacaine hydrochloride collagen-matrix implants", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Braintree Labs Inc", "ps_summary": "The manufacturing facility inspection identified deficiencies that must be resolved before approval. The applicant must address facility inspection findings and submit responsive prescribing information and carton/container labeling. Satisfactory resolution of all manufacturing facility deficiencies is required for application approval.", "deficiency_severity_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required", "drug_type_multiplier_source_text": "Suflave (polyethylene glycol 3350, sodium sulfate, potassium chloride, magnesium sulfate, and sodium chloride) for oral solution", "facility_inspection_source_text": "During a recent inspection of the manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Tris Pharma Inc", "ps_summary": "Manufacturing facility inspection deficiencies were identified and must be resolved before approval of the controlled substance amphetamine formulation. The applicant must address facility inspection findings, correct carton and container labeling regarding relative sizes of established and proprietary names, and ensure medication guide requirements are met. Deficiencies must be fully addressed for application approval.", "deficiency_severity_source_text": "Decrease the size of the established name so that it is 1/2 the size of the proprietary name and carton and container labeling revisions", "drug_type_multiplier_source_text": "amphetamine extended-release tablets", "facility_inspection_source_text": "During a recent inspection of the Tris Pharma, Inc. (FEI: 3004712471) manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Fabre-Kramer Pharma Inc", "ps_summary": "Gepirone ER failed to demonstrate substantial evidence of effectiveness for major depressive disorder treatment, with only 2 positive trials among 12 studies and evidence of inferiority to active comparators in 3 trials. The applicant must provide new clinical data demonstrating clinically meaningful effectiveness compared to standard antidepressant therapies and address chemistry/manufacturing deficiencies regarding impurity specifications and stability data for the commercial drug product.", "deficiency_severity_source_text": "failed to provide substantial evidence for the effectiveness of gepirone ER in the short-term or longer-term treatment of major depressive disorder", "drug_type_multiplier_source_text": "Gepirone Hydrochloride Extended Release tablets for major depressive disorder", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "application is not approvable under section 505(d) of the Act"}, {"company_name": "Shanghai Auzone Biological Technology Co Ltd", "ps_summary": "The application contains unspecified nonclinical and product quality deficiencies that must be addressed before approval of edaravone injection. The applicant must resolve all identified deficiencies related to product quality, submit responsive prescribing information and carton/container labeling, and provide a comprehensive safety update including worldwide experience data.", "deficiency_severity_source_text": "We reserve comment on the proposed labeling until the application is otherwise adequate", "drug_type_multiplier_source_text": "edaravone injection", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Eli Lilly and Co", "ps_summary": "Pre-license inspection of the Eli Lilly manufacturing facility identified deficiencies requiring satisfactory resolution before approval. The applicant must address facility inspection findings, submit responsive prescribing information, medication guide, and instructions for use. A drug product lot manufactured using validated processes must be available for commercial release prior to approval.", "deficiency_severity_source_text": "Following pre-license inspection of the ELI LILLY AND COMPANY, Indianapolis, Indiana (FEI 1819470), manufacturing facility listed in this application, FDA conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required", "drug_type_multiplier_source_text": "LY3074828 injection for moderately to severely active ulcerative colitis", "facility_inspection_source_text": "Following pre-license inspection of the ELI LILLY AND COMPANY, Indianapolis, Indiana (FEI 1819470), manufacturing facility listed in this application, FDA conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Hugel Inc", "ps_summary": "Manufacturing and testing facility inspection identified deficiencies at Hugel, Inc. that must be satisfactorily resolved before application approval. The applicant must address all facility inspection findings for both drug substance and drug product manufacturing, and submit responsive prescribing information and carton/container labeling. Deficiencies must be fully resolved for the injectable biologic product to be approved.", "deficiency_severity_source_text": "During a recent inspection of the Hugel, Inc. (FEI 3012163998) manufacturing and testing facility of drug substance and drug product for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required", "drug_type_multiplier_source_text": "letibotulinumtoxinA injection", "facility_inspection_source_text": "During a recent inspection of the Hugel, Inc. (FEI 3012163998) manufacturing and testing facility of drug substance and drug product for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Teva Pharma Inc", "ps_summary": "Remote Regulatory Assessment identified manufacturing facility deficiencies that must be resolved with possible follow-up onsite pre-license inspection required. The injectable biologic TVB-009 carries risk of severe hypocalcemia in advanced chronic kidney disease patients requiring REMS implementation. The applicant must resolve all facility deficiencies, submit responsive labeling, and provide a comprehensive REMS strategy to ensure benefits outweigh risks.", "deficiency_severity_source_text": "FDA identified deficiencies that were conveyed to the representative of the facility. The facility should provide satisfactory responses to these deficiencies to the FDA office that conducted the Remote Regulatory Assessment prior to your complete response to this letter", "drug_type_multiplier_source_text": "TVB-009 injection", "facility_inspection_source_text": "As part of the facility evaluation, a Remote Regulatory Assessment was performed. FDA identified deficiencies that were conveyed to the representative of the facility. The facility should provide satisfactory responses to these deficiencies to the FDA office that conducted the Remote Regulatory Assessment prior to your complete response to this letter. FDA may need to perform an onsite pre-license inspection (PLI) before this application may be approved", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Eli Lilly and Co", "ps_summary": "Pre-license inspection of the manufacturing facility identified unresolved deficiencies with data reliability concerns impacting comparability between commercial and clinical materials. The applicant must engage an independent third party to conduct a comprehensive assessment of impacted data, resolve all facility inspection deficiencies, and provide reliable data supporting manufacturing process validation. Systemic facility failures must be corrected before application approval.", "deficiency_severity_source_text": "the Agency has identified concerns regarding the reliability of data generated at [REDACTED] in your BLA submission. The concerns impact data that supports comparability between commercial and clinical materials", "drug_type_multiplier_source_text": "lebrikizumab injection", "facility_inspection_source_text": "Following the PLI, FDA conveyed deficiencies to the representative of the facility. FDA has reviewed the responses from the facility, and all deficiencies have not been satisfactorily resolved", "outcome_severity_source_text": "Complete Response Letter"}, {"company_name": "Corcept Therapeutics", "ps_summary": "Relacorilant failed to demonstrate substantial evidence of effectiveness with inadequate clinical trial design and enriched populations that overestimate drug effects. The drug is associated with drug-induced liver injury including four probable DILI cases with one subject experiencing ALT elevation of 1952 U/L. The applicant must provide new controlled clinical trial data demonstrating clinically meaningful effectiveness and propose comprehensive DILI risk mitigation strategies including enhanced monitoring and pharmacovigilance.", "deficiency_severity_source_text": "relacorilant is associated with drug induced liver injury (DILI). While no subjects met the traditional Hy's law criteria for severe DILI, four cases were assessed as probable DILI due to relacorilant, with one subject experiencing a significant alanine aminotransferase (ALT) elevation of 1952 U/L", "drug_type_multiplier_source_text": "relacorilant capsules for Cushing's Syndrome", "facility_inspection_source_text": "No facility inspection deficiencies mentioned in letter", "outcome_severity_source_text": "Corrected Complete Response Letter"}, {"company_name": "Mapi Pharma Ltd", "ps_summary": "The glatiramer acetate depot formulation failed to demonstrate adequate efficacy with serious data quality concerns including unvalidated relapse assessment processes and data integrity errors. Major safety signals were identified including elevated injection site abscess rates (4.3% vs 0% placebo) and unexpected systemic reactions not seen with the reference product Copaxone. The applicant must conduct new clinical trials with rigorous methodology, resolve facility inspection deficiencies, and comprehensively address the safety profile differences before resubmission.", "deficiency_severity_source_text": "Phase 3 trial did not provide interpretable or persuasive findings of efficacy; substantial concerns regarding quality and integrity of relapse data", "drug_type_multiplier_source_text": "monthly depot injection", "facility_inspection_source_text": "FDA conveyed deficiencies to the representative of the facility. Satisfactory resolution of the observations is required before this NDA may be approved.", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Clearside Biomedical Inc", "ps_summary": "The XIPERE ophthalmic suspension application contains critical deficiencies related to inadequate testing of the final commercial delivery system and unresolved manufacturing facility inspection observations. The applicant must conduct clinical validation studies with the marketed device configuration and resolve facility compliance issues before approval can be considered.", "deficiency_severity_source_text": "Clinical use data should be submitted to support the use of the final to-be-marketed SCS Microinjector Delivery System", "drug_type_multiplier_source_text": "ophthalmic suspension for suprachoroidal injection", "facility_inspection_source_text": "our field investigator observed objectionable conditions at the facility and conveyed that information to the representative of the facility at the close of the inspection. Satisfactory resolution of the observations is required before this NDA may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Dr Reddy\u2019s Labs Ltd", "ps_summary": "The Cyclophosphamide injection application cannot be approved due to unresolved manufacturing facility inspection deficiencies. As a critical oncology drug, facility compliance with cGMP standards is essential to ensure product quality, purity, and patient safety. The applicant must address all facility observations and demonstrate full compliance before resubmission.", "deficiency_severity_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "drug_type_multiplier_source_text": "Cyclophosphamide for oncology indication", "facility_inspection_source_text": "During a recent inspection of the manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Fera Pharma LLC", "ps_summary": "This letter rescinded a previously issued Complete Response determination, indicating the Avaclyr application was incorrectly denied. The application has been reopened for continued review with no current regulatory concerns identified.", "deficiency_severity_source_text": "This application is now under review", "drug_type_multiplier_source_text": "acyclovir ophthalmic ointment", "facility_inspection_source_text": "no inspection issues mentioned in letter", "outcome_severity_source_text": "This application is now under review. Once our review is complete, we will issue an action letter."}, {"company_name": "B Braun Medical Inc", "ps_summary": "The Acetaminophen PAB container application has been rejected due to unresolved manufacturing facility inspection deficiencies. Facility compliance with cGMP standards must be demonstrated before approval consideration. The applicant should address all facility observations and resubmit documentation of corrective actions.", "deficiency_severity_source_text": "During a recent inspection of B. Braun Medical Inc. (FEI 2021236), drug product manufacturer for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "drug_type_multiplier_source_text": "acetaminophen injection", "facility_inspection_source_text": "our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Agile Therapeutics Inc", "ps_summary": "The Twirla transdermal contraceptive failed to demonstrate acceptable efficacy with Pearl Index values substantially exceeding approved hormonal contraceptives, indicating inadequate pregnancy prevention. Multiple product quality deficiencies and facility manufacturing changes require a new pivotal phase 3 study with rigorous controls and resolution of manufacturing process discrepancies before resubmission.", "deficiency_severity_source_text": "The Pearl Index in the larger 13-cycle study (ATI-CL12) was 7.50 with an upper bound of the 95% confidence interval of 9.97...substantially higher than that seen in the registration trials for any of the approved hormonal contraceptives", "drug_type_multiplier_source_text": "transdermal contraceptive system", "facility_inspection_source_text": "During the facility inspection, it was noted that different equipment was used for the manufacture of clinical trial supplies as compared to that proposed for the commercial product", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Antares Pharma Inc", "ps_summary": "The testosterone enanthate subcutaneous injection presents significant uncharacterized cardiovascular and psychiatric safety risks. Clinical data shows clinically meaningful blood pressure increases with 60% of patients experiencing systemic elevations up to 20 mmHg, plus identified suicidality signals. Additional ABPM studies in hypogonadal populations with psychiatric monitoring are required before approval consideration.", "deficiency_severity_source_text": "your ambulatory blood pressure monitoring (ABPM) assessments showed mean increases in systolic and diastolic blood pressure of approximately 4 mmHg and 2 mmHg; approximately 60% of the patients had an increase in systolic blood pressure, with increases of up to 20 mmHg", "drug_type_multiplier_source_text": "testosterone enanthate subcutaneous injection", "facility_inspection_source_text": "no inspection issues mentioned in letter", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "AuroMedics Pharma LLC", "ps_summary": "The Cyclophosphamide injection application cannot proceed due to unresolved manufacturing facility deficiencies. As a critical oncology therapeutic, facility cGMP compliance is essential to ensure consistent product quality and patient safety. The applicant must resolve all facility observations and document corrective actions before resubmission.", "deficiency_severity_source_text": "During a recent inspection of the drug substance manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "drug_type_multiplier_source_text": "Cyclophosphamide injection for oncology", "facility_inspection_source_text": "During a recent inspection of the drug substance manufacturing facility for this application, our field investigator conveyed deficiencies to the representative of the facility. Satisfactory resolution of these deficiencies is required before this application may be approved.", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "Braeburn Pharma Inc", "ps_summary": "The BRIXADI buprenorphine extended-release injection has critical safety deficiencies including inadequate characterization of leachable compounds from the container closure system and unresolved facility inspection observations. Comprehensive extractables and leachables studies with appropriate toxicological risk assessments, plus facility compliance resolution, are required before this controlled substance can be approved.", "deficiency_severity_source_text": "You have not provided adequate extractables studies to fully characterize the potential leachables profile of the proposed container closure system", "drug_type_multiplier_source_text": "buprenorphine extended-release subcutaneous injection", "facility_inspection_source_text": "During a recent inspection of the Pharmaceutics International, Inc. (Pii), Hunt Valley (FEI: 1000513101) testing facility for this application, our field investigator conveyed deficiencies to the facility", "outcome_severity_source_text": "COMPLETE RESPONSE"}, {"company_name": "AFT Pharma Ltd", "ps_summary": "The application for Combogesic (ibuprofen/acetaminophen combination) was issued a Complete Response Letter due to multiple critical deficiencies including inadequate exposure data, dataset quality issues from manual Excel derivation causing calculation errors, missing elemental impurity analysis per ICH guidance, and unacceptable facility inspection findings. The applicant must address deficiencies in nonclinical safety justification for drug substance specifications, provide legible analytical method chromatograms, tighten impurity specifications, perform commercial-scale process validation, and achieve satisfactory resolution of facility inspection observations before resubmission and approval can proceed.", "deficiency_severity_source_text": "You have not adequately described the exposure to your product; datasets you provided for Study AFT-MX-6 were not of sufficient quality to allow for a thorough review of efficacy; You have not provided adequate justification for the proposed drug substance specification; Your application does not address the potential presence of elemental impurities in your drug product in accordance with ICH guidance document: 03D Elemental Impurities; The chromatograms example included in the analytical procedure document are illegible", "drug_type_multiplier_source_text": "COMBOGESIC (ibuprofen 97.5 mg/acetaminophen 325 mg) Film-Coated Tablets", "facility_inspection_source_text": "During a recent inspection of [facility] product/process controls, lab controls, and QA functions for the facility were found unacceptable for this NDA; Satisfactory resolution of the observations is required before this NDA may be approved", "outcome_severity_source_text": "COMPLETE RESPONSE; we cannot approve this application in its present form"}, {"company_name": "AFT Pharma Inc", "ps_summary": "The application remains in Complete Response status primarily due to the inability to conduct a required facility inspection due to travel restrictions, which is necessary to assess CGMP compliance before approval. Additionally, the applicant must revise carton and container labeling to include clearly defined linear barcode representations, standardized expiration date formatting to minimize medication errors, and ensure consistency between carton statements and prescribing information.", "deficiency_severity_source_text": "Submit draft carton and container labeling revised; It is unclear if the placeholders are intended to be linear barcodes; As currently presented, the format for the expiration date is not defined; Add the following bolded statement or appropriate alternative to the carton and container labels", "drug_type_multiplier_source_text": "Combogesic (acetaminophen and ibuprofen) tablets", "facility_inspection_source_text": "An inspection of the [facility] facility is required before this application can be approved; FDA must assess the ability of that facility to conduct the listed manufacturing operations in compliance with CGMP", "outcome_severity_source_text": "COMPLETE RESPONSE; we cannot approve this application in its present form"}, {"company_name": "Acer Therapeutics Inc", "ps_summary": "The application for sodium phenylbutyrate cannot be approved due to facility inspection incompleteness, labeling deficiencies, and unresolved nonclinical safety concerns regarding talc-related testicular weight findings in animal studies. The applicant must complete facility inspection, submit revised prescribing information and carton/container labeling, and provide additional data clarifying the testicular weight findings or conduct additional animal studies to establish safety margins.", "deficiency_severity_source_text": "Submit draft labeling that is responsive to our electronic communication dated June 15, 2022.", "drug_type_multiplier_source_text": "sodium phenylbutyrate is an oral drug product for urea cycle disorder", "facility_inspection_source_text": "the facility was not ready for inspection. Satisfactory inspection is required before this application may be approved.", "outcome_severity_source_text": "COMPLETE RESPONSE"}];

// Render rollup map
Plotly.newPlot('rollup-chart', rollupFig.data, rollupFig.layout, {
    responsive: true,
    displayModeBar: true,
    modeBarButtonsToRemove: ['lasso2d', 'select2d']
});

// Render individual 3D scatter
Plotly.newPlot('individual-chart', indFig.data, indFig.layout, {
    responsive: true,
    displayModeBar: true
});

// Populate dropdown
const dropdown = document.getElementById('company-dropdown');
companies.forEach(function(c) {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    dropdown.appendChild(opt);
});

// Render explanation table
function renderTable(companyFilter) {
    const tbody = document.getElementById('exp-body');
    const filtered = companyFilter === 'All'
        ? explanations
        : explanations.filter(function(e) { return e.company_name === companyFilter; });

    let html = '';
    for (let i = 0; i < filtered.length; i++) {
        const e = filtered[i];
        html += '<tr>'
            + '<td>' + e.company_name + '</td>'
            + '<td>' + e.ps_summary + '</td>'
            + '<td>' + e.deficiency_severity_source_text + '</td>'
            + '<td>' + e.drug_type_multiplier_source_text + '</td>'
            + '<td>' + e.facility_inspection_source_text + '</td>'
            + '<td>' + e.outcome_severity_source_text + '</td>'
            + '</tr>';
    }
    tbody.innerHTML = html;
}

renderTable('All');

// Dropdown handler — filters both chart and table
dropdown.addEventListener('change', function() {
    const selected = this.value;

    // Update 3D scatter visibility
    const totalTraces = indFig.data.length;
    var visibility;
    if (selected === 'All') {
        visibility = [true];
        for (var i = 0; i < companies.length; i++) { visibility.push(false); }
    } else {
        visibility = [];
        for (var i = 0; i < totalTraces; i++) { visibility.push(false); }
        var idx = companies.indexOf(selected);
        visibility[idx + 1] = true;
    }
    Plotly.restyle('individual-chart', { visible: visibility });

    // Update table
    renderTable(selected);
});
</script>
